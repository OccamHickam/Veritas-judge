<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veritas - Game Session</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0f;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ═══ PARTICLES ═══ */
        #particles {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }
        .particle {
            position: absolute; width: 2px; height: 2px;
            background: #00a7b5; border-radius: 50%; opacity: 0.3;
            animation: float 20s infinite linear;
        }
        @keyframes float {
            from { transform: translateY(100vh) translateX(0); }
            to   { transform: translateY(-100vh) translateX(100px); }
        }

        /* ═══ LAYOUT ═══ */
        #game-session {
            position: relative; z-index: 1;
            max-width: 1200px; margin: 0 auto;
            padding: 90px 20px 40px;
        }

        /* ═══ STATUS BAR ═══ */
        .status-bar {
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(10,10,15,0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #00a7b5;
            padding: 12px 20px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100;
        }
        .timer {
            font-size: 22px; font-weight: bold;
            color: #00a7b5; font-family: 'Courier New', monospace;
        }
        .dispute-counter {
            background: rgba(255,107,107,0.2);
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
            padding: 6px 14px; border-radius: 20px;
            font-size: 13px; font-weight: bold;
        }
        .debug-info { font-size: 12px; color: #666; font-family: monospace; }
        .end-session-btn {
            background: rgba(10,10,15,0.9);
            border: 2px solid #00a7b5; color: #00a7b5;
            padding: 8px 20px; border-radius: 25px;
            font-size: 13px; text-transform: uppercase;
            letter-spacing: 2px; cursor: pointer;
            transition: all 0.3s; backdrop-filter: blur(10px);
        }
        .end-session-btn:hover { background: #00a7b5; color: white; }

        /* ═══ QUICK ACTIONS ═══ */
        .quick-actions-bar {
            display: flex; gap: 10px; margin-bottom: 25px;
            flex-wrap: wrap; justify-content: center;
        }
        .quick-action-btn {
            background: rgba(0,167,181,0.1);
            border: 1px solid #00a7b5; color: #00a7b5;
            padding: 9px 18px; border-radius: 20px;
            cursor: pointer; font-size: 13px; transition: all 0.3s;
        }
        .quick-action-btn:hover {
            background: #00a7b5; color: white; transform: translateY(-2px);
        }

        /* ═══ LISTENING ═══ */
        .listening-container {
            text-align: center; padding: 35px;
            background: rgba(0,0,0,0.3); border-radius: 20px;
            margin-bottom: 25px; border: 2px solid transparent;
            transition: all 0.3s;
        }
        .listening-container.active {
            border-color: #00a7b5;
            box-shadow: 0 0 30px rgba(0,167,181,0.2);
        }
        .listening-pulse {
            width: 80px; height: 80px; border-radius: 50%;
            background: rgba(0,167,181,0.15);
            margin: 0 auto 16px;
            display: flex; align-items: center; justify-content: center;
        }
        .listening-container.active .listening-pulse { animation: pulse 2s infinite; }
        @keyframes pulse {
            0%,100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
        }
        .mic-icon { font-size: 32px; color: #00a7b5; }
        .status-text { font-size: 22px; color: #00a7b5; margin-bottom: 8px; }
        .status-subtext { font-size: 13px; color: #666; }

        /* ═══ LOG ═══ */
        .log-container {
            background: rgba(0,0,0,0.5); border-radius: 10px;
            padding: 20px; max-height: 260px; overflow-y: auto;
            margin-top: 20px;
        }
        .log-entry {
            padding: 9px 12px; margin-bottom: 8px; border-radius: 5px;
            font-size: 13px; animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-15px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        .log-entry.player  { background: rgba(0,167,181,0.1);  border-left: 3px solid #00a7b5; }
        .log-entry.system  { background: rgba(255,255,255,0.04); border-left: 3px solid #555; font-style: italic; color: #888; }
        .log-entry.ruling  { background: rgba(78,205,196,0.1);  border-left: 3px solid #4ecdc4; }

        /* ═══ CONFIDENCE ═══ */
        .confidence-indicator {
            position: fixed; bottom: 20px; right: 20px;
            background: rgba(10,10,15,0.9); border: 1px solid #333;
            padding: 12px 16px; border-radius: 10px;
            display: none; z-index: 100; font-size: 13px;
        }
        .confidence-indicator.show { display: block; }
        .confidence-indicator.high   { border-color: #4ecdc4; box-shadow: 0 0 16px rgba(78,205,196,0.4); }
        .confidence-indicator.medium { border-color: #ffe66d; box-shadow: 0 0 16px rgba(255,230,109,0.4); }
        .confidence-indicator.low    { border-color: #ff6b6b; box-shadow: 0 0 16px rgba(255,107,107,0.4); }

        /* ═══ RULING OVERLAY ═══ */
        .ruling-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.88);
            display: none; align-items: center; justify-content: center;
            z-index: 1000; padding: 20px;
        }
        .ruling-overlay.show { display: flex; }
        .ruling-content {
            background: linear-gradient(135deg, #111122 0%, #14152a 100%);
            border: 1px solid #00a7b5;
            border-radius: 20px; padding: 36px;
            max-width: 820px; width: 100%;
            max-height: 90vh; overflow-y: auto;
            position: relative;
            box-shadow: 0 0 60px rgba(0,167,181,0.2);
            animation: rulingAppear 0.3s ease;
        }
        @keyframes rulingAppear {
            from { opacity: 0; transform: scale(0.97) translateY(10px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }
        .close-btn {
            position: absolute; top: 16px; right: 18px;
            background: none; border: none; color: #555;
            font-size: 22px; cursor: pointer; transition: color 0.2s;
        }
        .close-btn:hover { color: #00a7b5; }

        /* ═══ RULING CONTENT TYPES ═══ */

        /* — Keyword — */
        .ruling-keyword-badge {
            display: inline-block;
            background: rgba(0,167,181,0.15);
            border: 1px solid #00a7b5;
            color: #00a7b5; font-size: 11px;
            letter-spacing: 2px; text-transform: uppercase;
            padding: 3px 10px; border-radius: 20px;
            margin-bottom: 12px;
        }
        .ruling-title {
            font-size: 30px; font-weight: 700;
            color: #fff; margin-bottom: 6px; letter-spacing: 1px;
        }
        .ruling-rule-ref {
            font-family: 'Courier New', monospace;
            font-size: 12px; color: #4ecdc4;
            margin-bottom: 20px; opacity: 0.8;
        }
        .ruling-plain {
            font-size: 17px; line-height: 1.75;
            color: #d0d0d0; margin-bottom: 24px;
        }
        .ruling-plain strong { color: #fff; }
        .ruling-example-box {
            background: rgba(255,230,109,0.06);
            border-left: 3px solid #ffe66d;
            padding: 16px 20px; border-radius: 0 10px 10px 0;
            margin-bottom: 20px;
        }
        .ruling-example-box .ex-label {
            color: #ffe66d; font-size: 12px;
            text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 8px; font-weight: 600;
        }
        .ruling-example-box p { font-size: 14px; line-height: 1.6; color: #c8c8c8; }

        /* — Interaction chips — */
        .ruling-also {
            margin-top: 16px; padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        .ruling-also-label {
            font-size: 11px; color: #555;
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;
        }
        .keyword-chips { display: flex; flex-wrap: wrap; gap: 8px; }
        .keyword-chip {
            background: rgba(0,167,181,0.08);
            border: 1px solid rgba(0,167,181,0.3);
            color: #4ecdc4; padding: 5px 12px;
            border-radius: 20px; font-size: 12px; cursor: pointer;
            transition: all 0.2s;
        }
        .keyword-chip:hover { background: rgba(0,167,181,0.2); }

        /* — Interaction answer — */
        .ruling-answer-tag {
            display: inline-block;
            padding: 4px 14px; border-radius: 20px;
            font-size: 12px; font-weight: 700;
            letter-spacing: 1px; text-transform: uppercase;
            margin-bottom: 14px;
        }
        .ruling-answer-tag.yes { background: rgba(78,205,196,0.2); color: #4ecdc4; border: 1px solid #4ecdc4; }
        .ruling-answer-tag.no  { background: rgba(255,107,107,0.2); color: #ff6b6b; border: 1px solid #ff6b6b; }
        .ruling-answer-tag.depends { background: rgba(255,230,109,0.15); color: #ffe66d; border: 1px solid #ffe66d; }
        .ruling-answer-tag.info { background: rgba(0,167,181,0.15); color: #00a7b5; border: 1px solid #00a7b5; }

        .ruling-answer-body {
            font-size: 16px; line-height: 1.8; color: #d0d0d0; margin-bottom: 22px;
        }
        .ruling-answer-body .highlight { color: #fff; font-weight: 600; }
        .ruling-answer-body .teal { color: #4ecdc4; }
        .ruling-answer-body .gold { color: #ffe66d; }
        .ruling-answer-body .red  { color: #ff8080; }

        .ruling-nuance {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 10px; padding: 16px 18px;
            font-size: 13px; color: #999; line-height: 1.6;
            margin-bottom: 16px;
        }
        .ruling-nuance .nuance-title {
            color: #00a7b5; font-size: 11px;
            text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 6px; font-weight: 600;
        }

        /* — Card — */
        .card-ruling-grid {
            display: grid; grid-template-columns: 240px 1fr;
            gap: 28px; align-items: start;
        }
        .card-img-wrap {
            background: rgba(0,0,0,0.4);
            border-radius: 12px; padding: 16px; text-align: center;
        }
        .card-image {
            max-width: 100%; border-radius: 10px;
            box-shadow: 0 8px 28px rgba(0,0,0,0.5);
        }
        .card-details h2 { color: #00a7b5; font-size: 26px; margin-bottom: 4px; }
        .card-type { color: #777; font-style: italic; margin-bottom: 18px; font-size: 14px; }
        .oracle-box {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            padding: 16px; border-radius: 10px;
            margin-bottom: 16px; line-height: 1.65; font-size: 14px;
            white-space: pre-wrap;
        }
        .rulings-box { background: rgba(0,167,181,0.04); padding: 16px; border-radius: 10px; }
        .rulings-box h4 { color: #4ecdc4; margin-bottom: 10px; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        .rulings-box li { margin-bottom: 8px; font-size: 13px; color: #aaa; list-style: none; padding-left: 16px; position: relative; }
        .rulings-box li::before { content: '→'; position: absolute; left: 0; color: #4ecdc4; }

        /* — Multi-keyword — */
        .multi-kw-item {
            padding: 18px; margin-bottom: 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 12px;
        }
        .multi-kw-item h3 { color: #00a7b5; margin-bottom: 6px; font-size: 18px; }
        .multi-kw-item .rule-ref { font-family: monospace; font-size: 11px; color: #4ecdc4; margin-bottom: 8px; }
        .multi-kw-item p { font-size: 14px; color: #bbb; line-height: 1.6; }

        /* — Compare — */
        .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 20px 0; }
        .compare-col { background: rgba(255,255,255,0.03); border-radius: 10px; padding: 18px; border: 1px solid rgba(255,255,255,0.06); }
        .compare-col h4 { color: #00a7b5; margin-bottom: 10px; font-size: 16px; }
        .compare-col ul { padding-left: 16px; }
        .compare-col li { font-size: 13px; color: #bbb; line-height: 1.8; }
        .compare-verdict {
            background: rgba(0,167,181,0.07);
            border: 1px solid rgba(0,167,181,0.25);
            border-radius: 10px; padding: 14px 18px; font-size: 14px; color: #ccc; line-height: 1.6;
        }
        .compare-verdict strong { color: #4ecdc4; }

        /* ═══ DISPUTE FLAG ═══ */
        .dispute-flag {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255,107,107,0.12);
            border: 1px solid rgba(255,107,107,0.5);
            border-radius: 10px; padding: 12px 16px;
            margin-bottom: 20px;
            animation: disputeFlash 0.4s ease;
        }
        @keyframes disputeFlash {
            0%   { background: rgba(255,107,107,0.35); }
            100% { background: rgba(255,107,107,0.12); }
        }
        .dispute-flag-icon { font-size: 18px; }
        .dispute-flag-text { font-size: 13px; color: #ff8080; line-height: 1.4; }
        .dispute-flag-text strong { color: #ff6b6b; font-size: 14px; display: block; margin-bottom: 2px; }

        .ruling-content.dispute-mode {
            border-color: #ff6b6b;
            box-shadow: 0 0 60px rgba(255,107,107,0.25);
        }

        /* ═══ RESPONSIVE ═══ */
        @media (max-width: 600px) {
            .card-ruling-grid { grid-template-columns: 1fr; }
            .compare-grid { grid-template-columns: 1fr; }
            .ruling-content { padding: 24px 18px; }
            .ruling-title { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div id="particles"></div>

    <!-- Status Bar -->
    <div class="status-bar">
        <div class="timer" id="session-timer">00:00:00</div>
        <div class="dispute-counter" id="dispute-counter">Disputes: 0</div>
        <div class="debug-info" id="debug-info">Ready</div>
        <button class="end-session-btn" onclick="endSession()">← End Session</button>
    </div>

    <!-- Main -->
    <div id="game-session">
        <div class="quick-actions-bar">
            <button class="quick-action-btn" onclick="togglePause()">⏯ Pause/Resume</button>
            <button class="quick-action-btn" onclick="repeatLastRuling()">🔄 Repeat Last</button>
            <button class="quick-action-btn" onclick="showManualSearch()">🔍 Manual Search</button>
            <button class="quick-action-btn" onclick="showRuleReference()">📚 Keywords</button>
            <button class="quick-action-btn" onclick="testManually()">🧪 Test</button>
        </div>

        <div class="confidence-indicator" id="confidence-indicator">
            Dispute detected — <span id="confidence-level">-</span> confidence
        </div>

        <div class="listening-container active" id="listening-container">
            <div class="listening-pulse"><div class="mic-icon">🎤</div></div>
            <div class="status-text" id="status-text">Listening…</div>
            <div class="status-subtext" id="status-subtext">Ask about a rule, keyword, or card name</div>
        </div>

        <div class="log-container" id="log-container"></div>
    </div>

    <!-- Ruling Overlay -->
    <div class="ruling-overlay" id="ruling-overlay" onclick="closeRuling(event)">
        <div class="ruling-content" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeRuling()">✕</button>
            <div id="ruling-body"></div>
        </div>
    </div>

    <script>
    // ═══════════════════════════════════════════════════════════════
    // KEYWORD MATCH HELPER
    // Uses word boundaries for single-word keys to prevent false matches
    // on verb forms like 'destroying', 'scrying', 'milling'
    // Multi-word keys (e.g. 'first strike') use plain includes
    // ═══════════════════════════════════════════════════════════════
    function matchKw(kw, lower) {
        if (kw.includes(' ')) return lower.includes(kw);
        const re = new RegExp('\\b' + kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'i');
        return re.test(lower);
    }

    // ═══════════════════════════════════════════════════════════════
    // KEYWORD DATABASE — 50+ entries, context-aware plain English
    // ═══════════════════════════════════════════════════════════════
    const KEYWORDS = {
        // ── Evasion ──
        'flying': {
            rule: '702.9b', category: 'Evasion',
            plain: '<strong>Flying creatures can only be blocked by other flying creatures or creatures with reach.</strong> If no blocker has flying or reach, they simply cannot block it — the damage goes through.',
            nuances: [
                'A creature can have both flying and reach, but that\'s redundant.',
                'Flying doesn\'t help you block non-flying creatures — you can still do that normally.',
                'Some spells give flying temporarily (like Giant Growth variants), which matters for blocking.'
            ],
            example: 'Your 3/3 flier attacks into a board of 10/10 ground creatures. None can block unless they have flying or reach.',
            related: ['reach','shadow','skulk','fear','intimidate']
        },
        'reach': {
            rule: '702.17b', category: 'Evasion',
            plain: '<strong>Reach lets a ground creature block flying creatures.</strong> That\'s it — it doesn\'t give the creature flying itself, so it can\'t block shadow or other special evasion, and it can\'t attack as if it had flying.',
            nuances: ['Reach only matters when blocking, not when attacking.','A creature with reach can still be blocked by ground creatures normally.'],
            example: 'Giant Spider (reach) can block your opponent\'s Dragon. But your opponent\'s flying creature cannot be blocked by most of your ground creatures unless they also have reach.',
            related: ['flying']
        },
        'menace': {
            rule: '702.110b', category: 'Evasion',
            plain: '<strong>A creature with menace requires at least two blockers.</strong> Your opponent must block it with two or more creatures, or let it through entirely. They can\'t legally assign just one blocker.',
            nuances: ['If your opponent only has one creature, it can\'t block menace at all — it must let it through.','Menace doesn\'t help if the blocker is removed after being declared.'],
            example: 'You attack with a 4/4 with menace. Your opponent has a 3/3 and a 1/1. They must commit both or neither.',
            related: ['trample','intimidate','fear']
        },
        'trample': {
            rule: '702.19b', category: 'Evasion',
            plain: '<strong>With trample, you only need to assign lethal damage to blockers — the rest goes to the player.</strong> You don\'t have to waste all your damage on a single 1/1 blocker.',
            nuances: [
                'You must assign at least lethal damage to each blocker before damage can trample over.',
                'If a blocker has deathtouch, 1 damage is "lethal" to it — so 1 tramples over to the player.',
                'Trample doesn\'t interact with the player\'s life total directly — it still counts as combat damage.',
                'If all blockers are removed before damage, trample doesn\'t matter — all damage goes through anyway.'
            ],
            example: 'Your 8/8 trampler is blocked by a 2/2. Assign 2 damage to the blocker (lethal), 6 tramples to the player.',
            related: ['deathtouch','first strike','double strike']
        },
        'shadow': {
            rule: '702.27b', category: 'Evasion',
            plain: '<strong>Shadow creatures can only be blocked by other shadow creatures, and can only block shadow creatures.</strong> They exist in a parallel dimension — ignoring most of the board in both directions.',
            nuances: ['Unlike flying, shadow is two-directional — you can\'t block non-shadow creatures with it either.'],
            example: 'Your 2/1 shadow slips past their entire army unless they also have shadow creatures.',
            related: ['flying','fear','intimidate']
        },
        'fear': {
            rule: '702.36b', category: 'Evasion',
            plain: '<strong>Fear creatures can only be blocked by artifact creatures or black creatures.</strong> Against most decks, this is unblockable. Against black or artifact-heavy decks, it does nothing.',
            nuances: ['Fear is an older mechanic mostly replaced by intimidate and menace in newer cards.'],
            example: 'Black Knight with fear attacks into a white weenie deck — nothing can block it.',
            related: ['intimidate','menace','protection']
        },
        'intimidate': {
            rule: '702.13b', category: 'Evasion',
            plain: '<strong>Intimidate creatures can only be blocked by artifact creatures or creatures that share a color with it.</strong> It\'s a color-based version of fear.',
            nuances: ['A multicolored creature can be blocked if the blocker shares any of its colors.'],
            example: 'Your green intimidate creature can only be blocked by green or artifact creatures.',
            related: ['fear','menace']
        },
        'skulk': {
            rule: '702.116b', category: 'Evasion',
            plain: '<strong>A skulk creature can only be blocked by creatures with power equal to or less than its own power.</strong> Small skulk creatures often slip past big creatures — they only get stopped by similarly small ones.',
            nuances: ['The comparison is the skulk creature\'s power vs the blocker\'s power.','Skulk doesn\'t help against 0-power creatures.'],
            example: 'Your 1/1 skulk can only be blocked by 0/x or 1/x creatures. Their 4/4 can\'t legally block it.',
            related: ['flying','shadow']
        },

        // ── Combat ──
        'first strike': {
            rule: '702.7b', category: 'Combat',
            plain: '<strong>First strike creates an extra combat damage step.</strong> Creatures with first strike deal their combat damage before creatures without it. If the first-striker kills the blocker, the blocker never gets to deal damage back.',
            nuances: [
                'Both first strike and double strike fight in the first combat damage step.',
                'If the creature dies in the first damage step, it won\'t deal damage in the second.',
                'First strike doesn\'t help in non-combat damage situations.'
            ],
            example: 'Your 2/2 first striker blocks their 3/3. Your creature deals 2 damage first — killing the 3/3 before it can deal its 3 damage. Your creature survives.',
            related: ['double strike','deathtouch','trample']
        },
        'double strike': {
            rule: '702.8b', category: 'Combat',
            plain: '<strong>Double strike deals damage in both the first strike step AND the normal damage step.</strong> Effectively, it attacks twice in one combat.',
            nuances: [
                'A 2/2 with double strike deals 4 total combat damage — 2 in each step.',
                'It triggers "deals damage" effects twice.',
                'Combined with deathtouch, it kills two creatures in combat.',
                'Combined with lifelink, you gain life twice.'
            ],
            example: 'Your 3/3 double striker attacks. In the first step it deals 3, then 3 more in the second step — 6 total to split as needed.',
            related: ['first strike','lifelink','deathtouch']
        },
        'deathtouch': {
            rule: '702.2b', category: 'Combat',
            plain: '<strong>Any amount of damage from a deathtouch creature is lethal.</strong> A 1/1 with deathtouch kills a 10/10 — even 1 damage is enough to destroy it.',
            nuances: [
                'Deathtouch only applies to creatures, not players or planeswalkers.',
                'Indestructible creatures are immune — deathtouch makes damage lethal, but indestructible ignores "destroy" effects.',
                'You can assign exactly 1 damage to each blocker when trample+deathtouch are both present.',
                'Regeneration saves a creature from deathtouch damage.'
            ],
            example: 'Your 1/1 deathtouch blocks their 8/8. Both die — your creature from the 8 combat damage, theirs from the 1 deathtouch damage.',
            related: ['trample','indestructible','first strike','lifelink']

    function buildInteractionAnswer(text) {
        const lower = text.toLowerCase();
        // Check for known keyword pairs
        const foundKws = Object.keys(KEYWORDS).filter(k => matchKw(k, lower)).sort((a,b) => b.length - a.length);

        if (foundKws.length >= 2) {
            const [a, b] = foundKws;
            const interactions = getKnownInteraction(a, b);
            if (interactions) return interactions;

            return {
                tag: 'depends', tagLabel: 'Depends on Specifics',
                title: `${capitalize(a)} + ${capitalize(b)}`,
                body: `<p>Both keywords are in play. Here\'s what matters:</p><br>
                <p>• <span class="highlight">${capitalize(a)}:</span> ${KEYWORDS[a].plain}</p><br>
                <p>• <span class="highlight">${capitalize(b)}:</span> ${KEYWORDS[b].plain}</p><br>
                <p>For the exact interaction, the order of events (timestamps) and which abilities are static vs triggered matters most.</p>`,
                nuance: null,
                example: '',
                rule: 'Various',
                related: [a, b]
            };
        }

        return {
            tag: 'info', tagLabel: 'Interaction',
            title: 'Card Interaction',
            body: `<p>Interactions in Magic depend on:</p><br>
            <p>• <span class="highlight">Timestamps</span> — which effect was applied first</p>
            <p>• <span class="highlight">Layer system</span> — continuous effects apply in a specific order (type, color, P/T, etc.)</p>
            <p>• <span class="highlight">Dependency</span> — if A changes what B does, B applies after A</p>
            <p>• <span class="highlight">Static vs triggered</span> — static effects are always on, triggered effects use the stack</p>`,
            nuance: { title: 'Quick rule', text: 'If in doubt: static effects are always active, triggered abilities use the stack, and the most recent effect wins for same-layer conflicts.' },
            example: 'Ask me about a specific keyword pair or card name and I\'ll give you the precise interaction.',
            rule: '613.1',
            related: ['layers','timestamps','static','triggered']
        };
    }

            'hexproof': { survives: ['target','doom blade','path to exile targeting'], dies: ['wrath','board wipe','sacrifice','non-targeting'] },

                    title: `Blocking ${capitalize(kw)}`,
                    body: `<p>${data.plain}</p>`,

                    example: data.example,
                    rule: data.rule,
                    related: data.related

                <p>• <span class="teal">Hexproof</span> stops targeted spells and abilities from opponents</p>

                <p>What still works against this combination: <span class="highlight">exile</span>, <span class="highlight">sacrifice effects</span>, <span class="highlight">toughness reduction to 0</span>, and <span class="highlight">non-targeting board effects</span>.</p>`,
                nuance: { title: 'The weakness', text: 'Toxic Deluge (-X/-X to toughness) or "sacrifice a creature" effects (like Dictate of Erebos) are the cleanest answers. Neither targets, and sacrifice bypasses indestructible.' },
                example: '',
                rule: '702.11c + 702.12b',
                related: ['hexproof','indestructible','exile','sacrifice']
            }
        };

        const key1 = `${a}+${b}`;
        const key2 = `${b}+${a}`;
        return known[key1] || known[key2] || null;
    }

    // ═══════════════════════════════════════════════════════════════
    // QUESTION ANALYZER
    // ═══════════════════════════════════════════════════════════════
    function analyzeInput(text) {
        const lower = text.toLowerCase().trim();

        // 1. Try semantic question patterns first
        for (const qp of QUESTION_PATTERNS) {
            if (qp.id === 'keyword_explain') continue; // skip fallthrough
            for (const pattern of qp.patterns) {
                if (pattern.test(text)) {
                    const result = qp.respond(text.match(pattern), text);
                    if (result) return { type: 'semantic', data: result };
                }
            }
        }

        // Sort by length descending so 'flashback' matches before 'flash', 'double strike' before 'strike' etc
        const foundKws = Object.keys(KEYWORDS).filter(k => matchKw(k, lower)).sort((a,b) => b.length - a.length);
        if (foundKws.length >= 2) {
            const interaction = getKnownInteraction(foundKws[0], foundKws[1]);
            if (interaction) return { type: 'semantic', data: interaction };
            return { type: 'multi_keyword', keywords: foundKws };
        }

        // 3. Single keyword lookup
        if (foundKws.length === 1) {
            return { type: 'keyword', keyword: foundKws[0] };
        }

        // 4. Card name lookup
        return { type: 'card', text: text };
    }

    // ═══════════════════════════════════════════════════════════════
    // RULING RENDERER
    // ═══════════════════════════════════════════════════════════════
    function renderRuling(data) {
        // Keyword ruling
        if (data.type === 'keyword') {
            const kw = data.keyword;
            const d = KEYWORDS[kw];
            return renderKeywordRuling(kw, d);
        }
        // Multi-keyword
        if (data.type === 'multi_keyword') {
            return renderMultiKeyword(data.keywords);
        }
        // Semantic / context-aware
        if (data.type === 'semantic') {
            return renderSemanticAnswer(data.data);
        }
        return null;
    }

    function renderKeywordRuling(kw, d) {
        const relatedChips = (d.related || []).filter(r => KEYWORDS[r]).map(r =>
            `<span class="keyword-chip" onclick="quickLookup('${r}')">${r}</span>`
        ).join('');

        const nuancesHtml = (d.nuances || []).map(n =>
            `<p style="margin-bottom:6px; font-size:13px; color:#aaa;">• ${n}</p>`
        ).join('');

        return `
            <div>
                <div class="ruling-keyword-badge">${d.category}</div>
                <div class="ruling-title">${kw.toUpperCase()}</div>
                <div class="ruling-rule-ref">Comprehensive Rules — ${d.rule}</div>
                <div class="ruling-plain">${d.plain}</div>
                ${nuancesHtml ? `<div class="ruling-nuance"><div class="nuance-title">Key Nuances</div>${nuancesHtml}</div>` : ''}
                <div class="ruling-example-box">
                    <div class="ex-label">📖 In Play</div>
                    <p>${d.example}</p>
                </div>
                ${relatedChips ? `<div class="ruling-also"><div class="ruling-also-label">Related Keywords</div><div class="keyword-chips">${relatedChips}</div></div>` : ''}
            </div>`;
    }

    function renderSemanticAnswer(d) {
        const tagColors = { yes: 'yes', no: 'no', depends: 'depends', info: 'info' };
        const tagHtml = d.tagLabel ? `<div class="ruling-answer-tag ${tagColors[d.tag] || 'info'}">${d.tagLabel}</div>` : '';

        // Compare mode
        if (d.compareMode) {
            const colAItems = d.colA.map(i => `<li>${i}</li>`).join('');
            const colBItems = d.colB.map(i => `<li>${i}</li>`).join('');
            return `<div>
                ${tagHtml}
                <div class="ruling-title">${d.title}</div>
                <div class="ruling-rule-ref">Rules — ${d.rule}</div>
                <div class="compare-grid">
                    <div class="compare-col"><h4>${d.labelA}</h4><ul>${colAItems}</ul></div>
                    <div class="compare-col"><h4>${d.labelB}</h4><ul>${colBItems}</ul></div>
                </div>
                <div class="compare-verdict">${d.verdict}</div>
                ${renderRelated(d.related)}
            </div>`;
        }

        const nuanceHtml = d.nuance ? `
            <div class="ruling-nuance">
                <div class="nuance-title">${d.nuance.title}</div>
                ${d.nuance.text}
            </div>` : '';

        const exampleHtml = d.example ? `
            <div class="ruling-example-box">
                <div class="ex-label">📖 Example</div>
                <p>${d.example}</p>
            </div>` : '';

        return `<div>
            ${tagHtml}
            <div class="ruling-title">${d.title}</div>
            <div class="ruling-rule-ref">Rules — ${d.rule}</div>
            <div class="ruling-answer-body">${d.body || ''}</div>
            ${nuanceHtml}
            ${exampleHtml}
            ${renderRelated(d.related)}
        </div>`;
    }

    function renderRelated(related) {
        if (!related || related.length === 0) return '';
        const chips = related.filter(r => KEYWORDS[r]).map(r =>
            `<span class="keyword-chip" onclick="quickLookup('${r}')">${r}</span>`
        ).join('');
        if (!chips) return '';
        return `<div class="ruling-also"><div class="ruling-also-label">Related</div><div class="keyword-chips">${chips}</div></div>`;
    }

    function renderMultiKeyword(kwList) {
        const items = kwList.slice(0, 4).map(kw => {
            const d = KEYWORDS[kw];
            return `<div class="multi-kw-item">
                <h3>${kw.toUpperCase()}</h3>
                <div class="rule-ref">${d.category} — Rule ${d.rule}</div>
                <p>${d.plain.replace(/<[^>]+>/g,'')}</p>
            </div>`;
        }).join('');
        return `<div>
            <div class="ruling-answer-tag info">Multiple Keywords</div>
            <div class="ruling-title" style="margin-bottom:20px;">Keywords Detected</div>
            ${items}
        </div>`;
    }

    // ═══════════════════════════════════════════════════════════════
    // CONVERSATION CONTEXT WINDOW
    // Tracks the rolling table conversation — last 10 utterances
    // Each entry: { text, timestamp, keywords: [] }
    // ═══════════════════════════════════════════════════════════════
    const conversationBuffer = [];
    const BUFFER_SIZE = 10;

    function bufferAdd(text) {
        const lower = text.toLowerCase();
        const foundKws = Object.keys(KEYWORDS).filter(k => matchKw(k, lower)).sort((a,b) => b.length - a.length);
        conversationBuffer.push({ text, lower, keywords: foundKws, timestamp: Date.now() });
        if (conversationBuffer.length > BUFFER_SIZE) conversationBuffer.shift();
    }

    // Scan buffer (newest first) for any keyword mentions in last N utterances
    function recentKeywordsFromBuffer(lookback = 3) {
        const recent = conversationBuffer.slice(-lookback);
        const seen = new Set();
        const kws = [];
        for (let i = recent.length - 1; i >= 0; i--) {
            for (const kw of recent[i].keywords) {
                if (!seen.has(kw)) { seen.add(kw); kws.push(kw); }
            }
        }
        return kws;
    }

    // ═══════════════════════════════════════════════════════════════
    // STATE
    // ═══════════════════════════════════════════════════════════════
    let lastRuling = null;
    let isPaused = false;
    let disputeCount = 0;
    let sessionStartTime = Date.now();
    let recognition = null;
    let contradictionFired = false;

    // ═══════════════════════════════════════════════════════════════
    // CONTRADICTION DETECTOR
    // Tight patterns — must be clearly a rule disagreement, not casual speech
    // ═══════════════════════════════════════════════════════════════

    const CONTRADICTION_TRIGGERS = [
        // Must have "it" or "that" + does/doesn't — specific enough to not false-fire
        /\bno[,]? it (does|doesn'?t|did|didn'?t|can|can'?t|is|isn'?t)\b/i,
        /\byes[,]? it (does|doesn'?t|did|didn'?t|can|can'?t|is|isn'?t)\b/i,
        // "that's not how it works" — very specific phrase
        /\bthat'?s? not how (it|that) works?\b/i,
        /\bit (doesn'?t?|does not) work like that\b/i,
        // "you're wrong" / "that's wrong" — needs both words
        /\byou'?re? (wrong|incorrect)\b/i,
        /\bthat'?s? (wrong|incorrect|not right)\b/i,
        // "that's not what the rule says / the card says"
        /\bthat'?s? not what (the rule|the card|it) (says?|does|means?)\b/i,
        // "you can't do that" — only fire if a rule-specific object is named
        /\byou can'?t (block|tap|sacrifice|target|cast|equip|trigger) (that|it|with that)\b/i,
        // Explicit calls to Veritas
        /\bask veritas\b/i,
        /\bcheck the ruling\b/i,
        /\bread the card\b/i
    ];

    // Require at least 3 words in the partial transcript before checking
    // Avoids firing on single words like "no" or "actually"
    function checkForContradiction(text) {
        const wordCount = text.trim().split(/\s+/).length;
        if (wordCount < 3) return false;
        return CONTRADICTION_TRIGGERS.some(p => p.test(text));
    }

    // Resolve contradiction topic — NEVER does a card lookup
    // Only returns keyword rules and semantic answers
    function resolveContradictionTopic(text) {
        const lower = text.toLowerCase();

        // 1. Keywords in current sentence
        const inSentence = Object.keys(KEYWORDS).filter(k => matchKw(k, lower)).sort((a,b) => b.length - a.length);
        if (inSentence.length >= 2) {
            const interaction = getKnownInteraction(inSentence[0], inSentence[1]);
            if (interaction) return { type: 'semantic', data: interaction };
            return { type: 'multi_keyword', keywords: inSentence };
        }
        if (inSentence.length === 1) return { type: 'keyword', keyword: inSentence[0] };

        // 2. Scan recent buffer for keywords (last 3 utterances)
        const recentKws = recentKeywordsFromBuffer(3);
        if (recentKws.length >= 2) {
            const interaction = getKnownInteraction(recentKws[0], recentKws[1]);
            if (interaction) return { type: 'semantic', data: interaction };
            return { type: 'multi_keyword', keywords: recentKws };
        }
        if (recentKws.length === 1) return { type: 'keyword', keyword: recentKws[0] };

        // 3. Last ruling shown — but only if it's a keyword/semantic, not a card
        if (lastRuling?.analysis?.type === 'keyword') return lastRuling.analysis;
        if (lastRuling?.analysis?.type === 'semantic') return lastRuling.analysis;
        if (lastRuling?.analysis?.type === 'multi_keyword') return lastRuling.analysis;

        return null; // never falls through to card lookup
    }

    // ═══════════════════════════════════════════════════════════════
    // INTERIM HANDLER — fires on partial speech mid-sentence
    // Only checks for contradiction signals, not full questions
    // ═══════════════════════════════════════════════════════════════
    function handleInterim(partialText) {
        if (isPaused || contradictionFired) return;
        if (!checkForContradiction(partialText)) return;

        // Fire immediately
        contradictionFired = true;
        const topic = resolveContradictionTopic(partialText);
        triggerContradictionRuling(topic, partialText);
    }

    // ═══════════════════════════════════════════════════════════════
    // FINAL HANDLER — fires on completed utterances
    // Handles direct questions, card lookups, keyword lookups
    // ═══════════════════════════════════════════════════════════════
    function handleFinal(text) {
        if (isPaused) return;

        bufferAdd(text);
        addLog(text, 'player');

        // If contradiction already fired on interim, skip — reset debounce
        if (contradictionFired) {
            contradictionFired = false;
            return;
        }

        // Only process if it looks like an intentional question or command
        // Ignore ambient table talk (short sentences, no question words, no keywords)
        const lower = text.toLowerCase().trim();
        const hasKeyword = Object.keys(KEYWORDS).some(k => matchKw(k, lower));
        const isQuestion = /\b(what|how|does|do|can|why|when|explain|tell me|define|compare|difference between)\b/i.test(text);
        const isCardSearch = /\b(look up|search|find|show me|show card|card called)\b/i.test(text);
        const hasQuestionMark = text.includes('?');
        // Card name: 1-5 words, none of which are common filler/question words
        // Works with lowercase speech API output e.g. "lightning bolt", "sol ring"
        const fillerWords = new Set(['is','it','not','no','yes','i','my','me','we','you','how','what','why','when','does','do','can','will','its','that','this','if','so','ok','um','uh','wait','hey','was','a','an']);
        const words = lower.split(/\s+/).filter(Boolean);
        const looksLikeCardName = words.length >= 1 && words.length <= 5 && words.every(w => !fillerWords.has(w)) && !/[?!]/.test(text);

        if (!hasKeyword && !isQuestion && !isCardSearch && !hasQuestionMark && !looksLikeCardName) return;

        const analysis = analyzeInput(text);
        const ruling = renderRuling(analysis);

        if (ruling) {
            showRuling(ruling, analysis);
            const speakText = getSpokenText(analysis);
            if (speakText) speak(speakText);
            addLog('Ruling: ' + getRulingLabel(analysis), 'ruling');
        } else if (isCardSearch || hasQuestionMark || looksLikeCardName) {
            // Only do card lookup if they explicitly asked for a card
            const cleaned = extractCardName(text);
            if (cleaned.length > 2) showCardRuling(cleaned);
        }
    }

    // ═══════════════════════════════════════════════════════════════
    // INTERRUPT SOUND — synthesized via Web Audio API, zero latency
    // A short sharp two-tone chime that cuts through table noise
    // ═══════════════════════════════════════════════════════════════
    function playInterruptChime() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();

            function tone(freq, startTime, duration, gainVal) {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, startTime);
                gain.gain.setValueAtTime(0, startTime);
                gain.gain.linearRampToValueAtTime(gainVal, startTime + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
                osc.start(startTime);
                osc.stop(startTime + duration);
            }

            const now = ctx.currentTime;
            tone(880, now,        0.12, 0.4);  // A5 — sharp attack
            tone(1100, now + 0.1, 0.18, 0.3);  // C#6 — rising second tone
        } catch(e) {
            // Audio not available — silent fail
        }
    }

    // ═══════════════════════════════════════════════════════════════
    // CONTRADICTION RULING — interrupt + flag
    // ═══════════════════════════════════════════════════════════════
    function triggerContradictionRuling(topic, triggerText) {
        playInterruptChime();

        disputeCount++;
        document.getElementById('dispute-counter').textContent = `Disputes: ${disputeCount}`;
        addLog(`⚑ Contradiction detected: "${triggerText.slice(0, 60)}…"`, 'ruling');

        // Show confidence indicator
        const confidence = topic ? 'high' : 'low';
        const indicator = document.getElementById('confidence-indicator');
        const levelEl = document.getElementById('confidence-level');
        if (indicator && levelEl) {
            levelEl.textContent = confidence;
            indicator.className = `confidence-indicator show ${confidence}`;
            clearTimeout(indicator._hideTimer);
            indicator._hideTimer = setTimeout(() => {
                indicator.classList.remove('show');
            }, 4000);
        }

        if (topic) {
            const ruling = renderRuling(topic);
            if (ruling) {
                showRuling(ruling, topic, { isDispute: true, confidence });
                return;
            }
        }

        // Nothing found — prompt
        showRuling(`<div>
            <div class="ruling-title" style="margin-top:8px;">What's the dispute about?</div>
            <div class="ruling-answer-body" style="margin-top:14px;font-size:15px;color:#aaa;">
                Veritas heard a disagreement but couldn't identify the rule.<br><br>
                Say the keyword or card name being disputed and Veritas will pull the ruling immediately.
            </div>
        </div>`, {}, { isDispute: true, confidence: 'low' });
        speak('What rule are you disputing?');
    }

    function getSpokenText(analysis) {
        if (analysis.type === 'keyword') {
            const d = KEYWORDS[analysis.keyword];
            return `${analysis.keyword}. ${d.plain.replace(/<[^>]+>/g,'').replace(/&amp;/g,'and')}`;
        }
        if (analysis.type === 'semantic') {
            const d = analysis.data;
            return d.tagLabel + '. ' + (d.body||'').replace(/<[^>]+>/g,'').replace(/&amp;/g,'and').slice(0,200);
        }
        return null;
    }

    function getRulingLabel(analysis) {
        if (analysis.type === 'keyword') return analysis.keyword;
        if (analysis.type === 'semantic') return analysis.data.title;
        if (analysis.type === 'multi_keyword') return analysis.keywords.join(', ');
        return 'card lookup';
    }

    function extractCardName(text) {
        return text
            .replace(/how does|what does|what is|tell me about|explain|search for|look up|how do i use|how do i play/gi, '')
            .replace(/\b(work|works|do|does|mean|means|use|used|played?)\b/gi, '')
            .replace(/\?/g, '')
            .replace(/\s+/g, ' ')
            .trim();
    }

    // ═══════════════════════════════════════════════════════════════
    // RULING OVERLAY
    // ═══════════════════════════════════════════════════════════════
    function showRuling(html, analysis, disputeOpts) {
        const overlay = document.getElementById('ruling-overlay');
        const content = overlay.querySelector('.ruling-content');
        const body = document.getElementById('ruling-body');

        if (disputeOpts?.isDispute) {
            const confidenceLabel = { high: 'High confidence dispute', medium: 'Possible dispute', low: 'Dispute signal detected' };
            const flagHtml = `<div class="dispute-flag">
                <span class="dispute-flag-icon">⚑</span>
                <div class="dispute-flag-text">
                    <strong>${confidenceLabel[disputeOpts.confidence] || 'Dispute Detected'}</strong>
                    Ruling re-confirmed below — this is the official answer.
                </div>
            </div>`;
            body.innerHTML = flagHtml + html;
            content.classList.add('dispute-mode');
        } else {
            body.innerHTML = html;
            content.classList.remove('dispute-mode');
        }

        overlay.classList.add('show');
        if (analysis && Object.keys(analysis).length) lastRuling = { html, analysis };
    }

    function quickLookup(kw) {
        if (KEYWORDS[kw]) {
            const html = renderKeywordRuling(kw, KEYWORDS[kw]);
            showRuling(html, { type: 'keyword', keyword: kw });
            speak(kw + '. ' + KEYWORDS[kw].plain.replace(/<[^>]+>/g,'').slice(0,150));
        }
    }

    function closeRuling(event) {
        if (!event || event.target.id === 'ruling-overlay' || event.target.classList.contains('close-btn')) {
            document.getElementById('ruling-overlay').classList.remove('show');
        }
    }

    async function showCardRuling(cardName) {
        const overlay = document.getElementById('ruling-overlay');
        const body = document.getElementById('ruling-body');
        body.innerHTML = `<div style="text-align:center;padding:40px;color:#666;">🔍 Looking up <em>${cardName}</em>…</div>`;
        overlay.classList.add('show');

        try {
            const res = await fetch(`https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(cardName)}`);
            if (!res.ok) throw new Error('Not found');
            const card = await res.json();

            let rulingsHtml = '';
            try {
                const rRes = await fetch(card.rulings_uri);
                const rData = await rRes.json();
                if (rData.data.length > 0) {
                    rulingsHtml = `<div class="rulings-box"><h4>Official Rulings</h4><ul>
                        ${rData.data.slice(0,3).map(r=>`<li>${r.comment}</li>`).join('')}
                    </ul></div>`;
                }
            } catch(e) {}

            const img = card.image_uris?.normal || card.card_faces?.[0]?.image_uris?.normal || '';
            const cardAnalysis = { type: 'card', name: card.name };
            showRuling(`
                <div class="card-ruling-grid">
                    <div class="card-img-wrap">
                        ${img ? `<img src="${img}" alt="${card.name}" class="card-image">` : '<div style="height:200px;display:flex;align-items:center;justify-content:center;color:#555;">No image</div>'}
                    </div>
                    <div class="card-details">
                        <h2>${card.name}</h2>
                        <div class="card-type">${card.type_line}</div>
                        <div class="oracle-box">${(card.oracle_text || card.card_faces?.[0]?.oracle_text || 'No oracle text.').replace(/\n/g,'<br>')}</div>
                        ${rulingsHtml}
                    </div>
                </div>`, cardAnalysis);

            speak(`${card.name}. ${card.type_line}. ${(card.oracle_text || '').slice(0,100)}`);
            addLog(`Card: ${card.name}`, 'ruling');
        } catch(e) {
            body.innerHTML = `<div style="padding:30px">
                <div class="ruling-answer-tag no">Not Found</div>
                <div class="ruling-title">Card Not Found</div>
                <p style="color:#999;margin-top:12px;">Couldn't find "<em>${cardName}</em>" — check the spelling or try the manual search.</p>
            </div>`;
        }
    }

    // ═══════════════════════════════════════════════════════════════
    // SPEECH
    // ═══════════════════════════════════════════════════════════════
    function speak(text) {
        if (!('speechSynthesis' in window)) return;
        window.speechSynthesis.cancel();
        const clean = text
            .replace(/<[^>]+>/g, '')        // strip HTML tags
            .replace(/\{[^}]+\}/g, '')       // strip mana symbols {W}{U}{2}{T}
            .replace(/&amp;/g, 'and')
            .replace(/\s+/g, ' ')
            .trim();
        if (!clean) return;
        const utt = new SpeechSynthesisUtterance(clean);
        utt.rate = 0.95;
        window.speechSynthesis.speak(utt);
    }

    function setupSpeechRecognition() {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) {
            addLog('Speech recognition not supported — use Chrome or Edge.', 'system');
            return;
        }
        recognition = new SR();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'en-US';
        recognition.maxAlternatives = 1;

        // isRestarting suppresses stale interim events Chrome re-emits
        // from the previous fragment at the start of each new session
        let isRestarting = false;
        let restartTimer = null;

        recognition.onstart = () => {
            isRestarting = false;
            document.getElementById('debug-info').textContent = 'Listening';
        };

        recognition.onresult = (e) => {
            if (isRestarting) return;  // drop stale events during restart gap
            if (!e.results || e.results.length === 0) return;
            const result = e.results[e.results.length - 1];
            if (!result || !result[0]) return;
            const transcript = result[0].transcript;
            if (!transcript || !transcript.trim()) return;

            if (result.isFinal) {
                handleFinal(transcript.trim());
            } else {
                handleInterim(transcript.trim());
            }
        };

        recognition.onerror = (e) => {
            // no-speech is normal silence; aborted is an intentional restart — skip both
            if (e.error !== 'no-speech' && e.error !== 'aborted') {
                addLog('Mic error: ' + e.error, 'system');
            }
        };

        recognition.onend = () => {
            if (isPaused) return;
            isRestarting = true;
            document.getElementById('debug-info').textContent = 'Reconnecting…';
            if (restartTimer) clearTimeout(restartTimer);
            // 150ms gap: short enough not to miss words, long enough to avoid InvalidStateError
            restartTimer = setTimeout(() => {
                if (!isPaused) {
                    try { recognition.start(); } catch(e) {}
                }
            }, 150);
        };

        recognition.start();
    }

    // ═══════════════════════════════════════════════════════════════
    // BUTTONS
    // ═══════════════════════════════════════════════════════════════
    function togglePause() {
        isPaused = !isPaused;
        const container = document.getElementById('listening-container');
        const statusText = document.getElementById('status-text');
        const statusSubtext = document.getElementById('status-subtext');
        if (isPaused) {
            container.classList.remove('active');
            statusText.textContent = 'Paused';
            statusSubtext.textContent = 'Click Pause/Resume to continue';
            if (recognition) recognition.stop();
        } else {
            container.classList.add('active');
            statusText.textContent = 'Listening…';
            statusSubtext.textContent = 'Ask about a rule, keyword, or card name';
            if (recognition) { try { recognition.stop(); } catch(e) {} setTimeout(() => { if (!isPaused) { try { recognition.start(); } catch(e) {} } }, 200); }
        }
    }

    function repeatLastRuling() {
        if (lastRuling) {
            showRuling(lastRuling.html, lastRuling.analysis);
            const spoken = getSpokenText(lastRuling.analysis);
            if (spoken) speak(spoken);
        } else {
            speak('No previous ruling.');
        }
    }

    function showManualSearch() {
        const name = prompt('Enter card name:');
        if (name?.trim()) showCardRuling(name.trim());
    }

    function showRuleReference() {
        const categories = {};
        for (const [kw, d] of Object.entries(KEYWORDS)) {
            if (!categories[d.category]) categories[d.category] = [];
            categories[d.category].push(kw);
        }
        let html = '<div><div class="ruling-title" style="margin-bottom:20px;">Keyword Reference</div>';
        for (const [cat, kws] of Object.entries(categories)) {
            html += `<div style="margin-bottom:18px;">
                <div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#555;margin-bottom:8px;">${cat}</div>
                <div class="keyword-chips">
                    ${kws.map(k=>`<span class="keyword-chip" onclick="quickLookup('${k}');event.stopPropagation();">${k}</span>`).join('')}
                </div>
            </div>`;
        }
        html += '</div>';
        showRuling(html, {});
    }

    function testManually() {
        const tests = [
            'how does trample work',
            'does deathtouch work with first strike',
            'what is the difference between hexproof and shroud',
            'if i sacrifice a creature does blood artist trigger',
            'can my creature survive if it has indestructible',
            'what is the stack',
            'trample and deathtouch together',
            'how do i stop an indestructible creature',
            'does my prowess trigger if i cast an instant',
            'Lightning Bolt'
        ];
        const t = tests[Math.floor(Math.random() * tests.length)];
        addLog(`Test: "${t}"`, 'system');
        handleFinal(t);
    }

    function endSession() {
        if (recognition) { isPaused = true; recognition.stop(); }
        window.location.href = 'index.html';
    }

    function addLog(msg, type = 'system') {
        const c = document.getElementById('log-container');
        const e = document.createElement('div');
        e.className = `log-entry ${type}`;
        e.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        c.appendChild(e);
        c.scrollTop = c.scrollHeight;
    }

    function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

    // ═══════════════════════════════════════════════════════════════
    // PARTICLES & INIT
    // ═══════════════════════════════════════════════════════════════
    function createParticles() {
        const c = document.getElementById('particles');
        for (let i = 0; i < 50; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 20 + 's';
            p.style.animationDuration = (15 + Math.random() * 10) + 's';
            c.appendChild(p);
        }
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeRuling();
        if (e.key === ' ' && e.ctrlKey) { e.preventDefault(); togglePause(); }
        if (e.key === 'r' && e.ctrlKey) { e.preventDefault(); repeatLastRuling(); }
    });

    window.addEventListener('load', () => {
        createParticles();
        setupSpeechRecognition();
        addLog('Veritas is listening. Ask about keywords, rules, or card names.', 'system');
        addLog(`${Object.keys(KEYWORDS).length} keywords loaded.`, 'system');

        setInterval(() => {
            const s = Math.floor((Date.now() - sessionStartTime) / 1000);
            const h = Math.floor(s/3600).toString().padStart(2,'0');
            const m = Math.floor((s%3600)/60).toString().padStart(2,'0');
            const sec = (s%60).toString().padStart(2,'0');
            document.getElementById('session-timer').textContent = `${h}:${m}:${sec}`;
        }, 1000);

        window.addEventListener('beforeunload', () => {
            if (recognition) recognition.stop();
        });
    });
    </script>
</body>
</html>
