// ═══════════════════════════════════════════════════════════════════════
// INTERRUPT CHIME
// ═══════════════════════════════════════════════════════════════════════
function playInterruptChime() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        function tone(freq, start, dur, vol) {
            const osc = ctx.createOscillator(), gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.type = 'sine'; osc.frequency.setValueAtTime(freq, start);
            gain.gain.setValueAtTime(0, start);
            gain.gain.linearRampToValueAtTime(vol, start + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.001, start + dur);
            osc.start(start); osc.stop(start + dur);
        }
        const now = ctx.currentTime;
        tone(880,  now,        0.12, 0.35);
        tone(1108, now + 0.09, 0.18, 0.28);
    } catch(e) {}
}

// ═══════════════════════════════════════════════════════════════════════
// WAKE FLASH
// ═══════════════════════════════════════════════════════════════════════
function wakeFlash() {
    const el = document.getElementById('wake-flash');
    if (!el) return;
    el.classList.remove('fire');
    void el.offsetWidth;
    el.classList.add('fire');
}

// ═══════════════════════════════════════════════════════════════════════
// TRIGGER CONTRADICTION RULING
// ═══════════════════════════════════════════════════════════════════════
function triggerContradictionRuling(topic, triggerText) {
    if (rulingCooldown) return;
    rulingCooldown = true;
    clearTimeout(rulingCooldownTimer);
    rulingCooldownTimer = setTimeout(() => { rulingCooldown = false; }, 3000);

    playInterruptChime();
    wakeFlash();

    disputeCount++;
    const dcEl = document.getElementById('dispute-counter');
    if (dcEl) {
        dcEl.textContent = `${disputeCount} Dispute${disputeCount !== 1 ? 's' : ''}`;
        dcEl.classList.add('active');
    }

    sessionDisputeLog.push({
        topic: topic ? (topic.keyword || (topic.keywords?.join('+')) || topic.type) : 'unknown',
        trigger: (triggerText || '').slice(0, 120),
        timestamp: new Date().toISOString()
    });

    if (topic) {
        const html = renderRuling(topic);
        if (html) {
            showRuling(html, topic, { isDispute: true });
            const spoken = buildSpokenText(topic);
            if (spoken) speak(spoken);
            return;
        }
    }

    // Fallback — prompt
    document.getElementById('bubble-badge').innerHTML = '<div class="dispute-badge">⚑ Dispute Detected</div>';
    document.getElementById('bubble-level').innerHTML = '';
    document.getElementById('bubble-verdict').innerHTML = "Veritas heard a disagreement — say the keyword or card name being disputed.";
    document.getElementById('bubble-analogy').innerHTML = '';
    document.getElementById('bubble-action').innerHTML = '';
    document.getElementById('ruling-details-inner').innerHTML = `<div class="detail-prose" style="color:rgba(255,255,255,0.25);">
        No keyword identified in the recent conversation. Say the rule or card name clearly and Veritas will pull the ruling.
    </div>`;
    document.getElementById('ruling-overlay').scrollTop = 0;
    document.getElementById('ruling-overlay').classList.add('show');
    speak('What rule is being disputed?');
}

function buildSpokenText(analysis) {
    if (!analysis) return null;
    if (analysis.type === 'keyword') {
        const d = window.KEYWORDS[analysis.keyword];
        if (!d) return analysis.keyword;
        return `${analysis.keyword}. ${(d.tableTalk || d.plain.replace(/<[^>]+>/g,'')).slice(0,220)}`;
    }
    if (analysis.type === 'semantic') {
        const d = analysis.data;
        return `${d.tagLabel || ''}. ${(d.body || '').replace(/<[^>]+>/g,'').slice(0,220)}`;
    }
    return null;
}

// ═══════════════════════════════════════════════════════════════════════
// CONVERSATIONAL UNDERSTANDING
//
// Veritas listens to EVERYTHING and responds when it actually understands
// what's being asked or discussed — not just on contradiction triggers.
//
// Priority order:
//  1. Contradiction / dispute detected → interrupt ruling (dispute mode)
//  2. Direct address ("Veritas, ...") → answer from context
//  3. Direct question about a keyword/rule → answer it
//  4. Keyword mentioned in a question-like sentence → answer it
//  5. Card name question → Scryfall lookup
//  6. Keyword mentioned in passing → silently buffer, no response
//  7. Pure chatter with no MTG content → stay silent
// ═══════════════════════════════════════════════════════════════════════

// ── Question signal patterns ─────────────────────────────────────────
// These indicate the speaker WANTS an answer, not just making a statement
const QUESTION_SIGNALS = [
    /\?$/,                                               // ends with ?
    /^(what|how|does|do|can|is|are|will|would|when|why|which)\b/i,
    /\bwhat (does|is|are|happens?)\b/i,
    /\bhow does\b/i,
    /\bcan (i|you|it|they|he|she|we)\b/i,
    /\bdoes (it|that|this|the|a|an)\b/i,
    /\bis (it|that|this|there)\b/i,
    /\bdo (i|you|we|they)\b/i,
    /\bwill (it|that|this)\b/i,
    /\bwould (it|that|this)\b/i,
    /\bexplain\b/i,
    /\btell me\b/i,
    /\bremind me\b/i,
    /\bi (don't|dont|do not) (know|understand|get)\b/i,
    /\bwhat (about|if|happens? (when|if|to))\b/i,
    /\bwait[,.]? (does|is|can|how|what|so)\b/i,  // "wait, does trample..."
    /\bhold on[,.]? (does|is|can|how|what)\b/i,
    /\bso (does|is|can|that means?)\b/i,
    /\bright\??$/i,                                      // "... right?"
    /\bcorrect\??$/i,
    /\bworks? (like|that way|right)\b/i,
];

// ── Statements that mention a keyword in a DECLARATIVE way ───────────
// These are claims being made at the table — fire a ruling if contested
// but DON'T auto-respond to every passing mention
const DECLARATIVE_CLAIM_PATTERNS = [
    /\b(it|that|this) (has|gives?|grants?|means?|works?)\b/i,
    /\b(trample|flying|hexproof|deathtouch|etc) (means?|is|does|lets?|allows?|prevents?|stops?)\b/i,
    /\byou (can|can't|cannot|could|couldn't) (block|attack|target|cast|use)\b/i,
    /\b(the creature|my creature|your creature|this creature) (can|can't|cannot|has|doesn't)\b/i,
];

function isQuestion(text) {
    return QUESTION_SIGNALS.some(p => p.test(text.trim()));
}

function isDirectedAtVeritas(text) {
    return /\bveritas\b/i.test(text);
}

// ── "Does X work here?" / "Can X block Y?" style sentences ──────────
// Extract the subject being asked about
function extractQuestionSubject(text) {
    const lower = text.toLowerCase();

    // "does [keyword] work with [keyword]"
    const withMatch = lower.match(/does (.+?) (work|interact|combine|stack|go|trigger) with (.+?)[\?\.]/);
    if (withMatch) return { a: withMatch[1].trim(), b: withMatch[3].trim(), type: 'interaction' };

    // "can X block Y"
    const blockMatch = lower.match(/can (.+?) (block|be blocked by) (.+?)[\?\.]/);
    if (blockMatch) return { a: blockMatch[1].trim(), b: blockMatch[3].trim(), type: 'blocking' };

    // "does X survive/die to Y"
    const surviveMatch = lower.match(/(does|will) (.+?) (survive|die|get killed|be destroyed by) (.+?)[\?\.]/);
    if (surviveMatch) return { a: surviveMatch[2].trim(), b: surviveMatch[4].trim(), type: 'survival' };

    return null;
}

// ─────────────────────────────────────────────────────────────────────
// INTERIM HANDLER — fast path for contradictions only
// ─────────────────────────────────────────────────────────────────────
function handleInterim(text) {
    if (isPaused || contradictionFired || isSpeaking) return;
    if (!checkForContradiction(text)) return;
    contradictionFired = true;
    clearTimeout(contradictionResetTimer);
    contradictionResetTimer = setTimeout(() => { contradictionFired = false; }, 2000);
    const topic = resolveContradictionTopic(text);
    triggerContradictionRuling(topic, text);
}

// ─────────────────────────────────────────────────────────────────────
// FINAL HANDLER — full conversational understanding
// ─────────────────────────────────────────────────────────────────────
function handleFinal(text) {
    if (isPaused || isSpeaking) return;

    // Always buffer for context tracking
    bufferAdd(text);

    // ── 1. Contradiction already fired on interim → reset and skip ──
    if (contradictionFired) {
        clearTimeout(contradictionResetTimer);
        contradictionFired = false;
        return;
    }

    const lower = text.toLowerCase().trim();

    // ── 2. Contradiction / dispute detected ──
    if (checkForContradiction(text)) {
        const topic = resolveContradictionTopic(text);
        triggerContradictionRuling(topic, text);
        return;
    }

    // ── 3. Directly addressed ("Veritas, how does trample work?") ──
    if (isDirectedAtVeritas(text)) {
        // Strip the wake word and treat the rest as the question
        const stripped = text.replace(/\bveritas[,.]?\s*/gi, '').trim();
        const topic = stripped.length > 2
            ? resolveQuestion(stripped)
            : resolveContradictionTopic(text) || lastRuling?.analysis || null;
        if (topic) {
            triggerDirectRuling(topic, text);
        } else {
            triggerDirectRuling(null, text);
        }
        return;
    }

    // ── 4. Direct question containing keywords ──
    if (isQuestion(text)) {
        const topic = resolveQuestion(text);
        if (topic) {
            triggerDirectRuling(topic, text);
            return;
        }

        // Question but no keyword found in THIS sentence.
        // Only fall back to context if the sentence is clearly a pronoun reference
        // like "can it target?" / "does that work?" / "what does it do?"
        // — meaning "it/that/this" is referring to whatever was JUST discussed.
        // We only look at the single most recent utterance, not a wide buffer.
        if (isPronounReference(text)) {
            const immediate = getImmediateContextKeyword();
            if (immediate) {
                triggerDirectRuling(immediate, text);
                return;
            }
        }

        // Card name question — e.g. "what does Snapcaster Mage do?"
        const cardMatch = text.match(
            /(?:what does|how does|what is|look up|search for|tell me about|what about)\s+([A-Z][a-zA-Z\s',-]{2,40}?)(?:\s+do|\s+work|\s+mean|\?|$)/i
        );
        if (cardMatch) {
            const possibleCard = cardMatch[1].trim();
            const isKnownKw = Object.keys(window.KEYWORDS).some(k => matchKw(k, possibleCard.toLowerCase()));
            if (!isKnownKw && possibleCard.length > 3) {
                showCardRuling(possibleCard);
                return;
            }
        }

        // Question with no keyword and no pronoun reference — stay silent.
        // Do NOT reach into the buffer and guess. That's what caused the wrong answer.
        return;
    }

    // ── 5. Non-question but contains keyword + context that suggests
    //       someone is explaining a rule (declarative claim) ──
    //       e.g. "trample means all damage goes through"
    //       These are table discussions worth tracking but NOT answering
    //       unless it looks like a claim being made confidently about the rule
    const foundKws = Object.keys(window.KEYWORDS)
        .filter(k => matchKw(k, lower))
        .sort((a, b) => b.length - a.length);

    if (foundKws.length > 0 && DECLARATIVE_CLAIM_PATTERNS.some(p => p.test(text))) {
        // Someone is making a declarative claim about a rule.
        // Buffer it — if it's wrong someone will contradict it and Veritas fires.
        // But if they say something factually wrong AND phrased as a rule,
        // check if what they said contradicts the actual ruling.
        const kw = foundKws[0];
        const d = window.KEYWORDS[kw];
        if (d) {
            const claimedWrong = detectIncorrectClaim(text, kw, d);
            if (claimedWrong) {
                // Proactively correct — someone just stated the rule wrong
                triggerDirectRuling({ type: 'keyword', keyword: kw, context: detectContext(lower) }, text, true);
            }
        }
        // Otherwise: buffer silently — let the conversation continue
    }

    // ── 6. Everything else → stay silent, keep building context ──
}

// ─────────────────────────────────────────────────────────────────────
// RESOLVE QUESTION — turn a sentence into an analysis object
// ─────────────────────────────────────────────────────────────────────
function resolveQuestion(text) {
    const lower = text.toLowerCase();
    const ctx = detectContext(lower);

    // Find all matching keywords, longest first
    const foundKws = Object.keys(window.KEYWORDS)
        .filter(k => matchKw(k, lower))
        .sort((a, b) => b.length - a.length);

    if (foundKws.length >= 2) {
        const interaction = getKnownInteraction(foundKws[0], foundKws[1]);
        if (interaction) return interaction;
        return { type: 'multi_keyword', keywords: foundKws };
    }

    if (foundKws.length === 1) {
        return { type: 'keyword', keyword: foundKws[0], context: ctx };
    }

    return null;
}

// ─────────────────────────────────────────────────────────────────────
// DETECT INCORRECT CLAIM
// Basic heuristic: does the sentence say something that contradicts
// the most common mistake for that keyword?
// ─────────────────────────────────────────────────────────────────────
function detectIncorrectClaim(text, kw, d) {
    const lower = text.toLowerCase();

    // Specific known-wrong claim patterns per keyword
    const wrongClaims = {
        'trample': [
            /all (the )?damage goes? (through|to (the )?player)/i,   // wrong: must still assign lethal
            /trample (means?|lets?) (all|every)/i,
        ],
        'hexproof': [
            /hexproof (means?|makes?) (it )?untargetable/i,          // partly wrong — own spells still work
            /nobody can target/i,                                      // wrong — YOU can still target
        ],
        'indestructible': [
            /can'?t be (removed|killed|exiled|destroyed by anything)/i, // wrong — exile still works
            /nothing can (kill|destroy|remove) it/i,
        ],
        'first strike': [
            /deals? damage twice/i,                                    // wrong — that's double strike
            /attacks? twice/i,
        ],
        'deathtouch': [
            /kills? (the )?player/i,                                   // wrong — only creatures
            /any damage (to|kills?) (the )?player/i,
        ],
        'lifelink': [
            /triggers? (separately|twice|again)/i,                    // wrong — multiple instances don't stack
        ],
        'flying': [
            /nothing can block (it|flying)/i,                          // wrong — reach blocks flying
        ],
    };

    const patterns = wrongClaims[kw];
    if (!patterns) return false;
    return patterns.some(p => p.test(lower));
}

// ─────────────────────────────────────────────────────────────────────
// TRIGGER DIRECT RULING — non-dispute answer
// Softer than a contradiction ruling — no chime, no flash, just answers
// ─────────────────────────────────────────────────────────────────────
function triggerDirectRuling(topic, originalText, isCorrection) {
    if (rulingCooldown) return;
    rulingCooldown = true;
    clearTimeout(rulingCooldownTimer);
    rulingCooldownTimer = setTimeout(() => { rulingCooldown = false; }, 2500);

    if (isCorrection) {
        // Gentle chime — softer than dispute
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sine'; osc.frequency.value = 660;
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.18, audioCtx.currentTime + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.22);
            osc.start(); osc.stop(audioCtx.currentTime + 0.22);
        } catch(e) {}
    }

    if (!topic) {
        // No keyword found but was addressed — respond generically
        document.getElementById('bubble-badge').innerHTML = '';
        document.getElementById('bubble-level').innerHTML = '';
        document.getElementById('bubble-verdict').innerHTML = "I heard you — could you name the specific keyword or card you're asking about?";
        document.getElementById('bubble-analogy').innerHTML = '';
        document.getElementById('bubble-action').innerHTML = '';
        document.getElementById('ruling-details-inner').innerHTML = `<div class="detail-prose" style="color:rgba(255,255,255,0.25);">
            Say a keyword name (like "trample", "hexproof", "deathtouch") or a card name and Veritas will pull the ruling.
        </div>`;
        document.getElementById('ruling-overlay').scrollTop = 0;
        document.getElementById('ruling-overlay').classList.add('show');
        speak("Could you name the specific keyword or card?");
        return;
    }

    const html = renderRuling(topic);
    if (html) {
        showRuling(html, topic, { isDispute: false, isCorrection });
        const spoken = buildSpokenText(topic);
        if (spoken) speak(spoken);
    }
}

// ═══════════════════════════════════════════════════════════════════════
// SPEECH RECOGNITION
// ═══════════════════════════════════════════════════════════════════════
function setupSpeechRecognition() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
        addLog('Speech recognition not supported — use Chrome or Edge.', 'system');
        setOrbState('dead');
        return;
    }

    recognition = new SR();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = 'en-US';
    recognition.maxAlternatives = 1;

    recognition.onstart = () => { setOrbState('listening'); };

    recognition.onresult = (e) => {
        if (isPaused || !e.results || e.results.length === 0) return;
        const result = e.results[e.results.length - 1];
        if (!result || !result[0]) return;
        const transcript = result[0].transcript;
        if (!transcript?.trim()) return;
        if (result.isFinal) handleFinal(transcript.trim());
        else handleInterim(transcript.trim());
    };

    recognition.onerror = (e) => {
        if (e.error === 'no-speech' || e.error === 'aborted') return;
        if (e.error === 'not-allowed') { setOrbState('dead'); showMicDenied(); return; }
        addLog('Mic error: ' + e.error, 'system');
    };

    recognition.onend = () => {
        if (isPaused) { setOrbState('paused'); return; }
        setOrbState('reconnecting');
        setTimeout(() => {
            if (!isPaused) {
                try { recognition.start(); } catch(e) {}
            }
        }, 120);
    };

    try { recognition.start(); }
    catch(e) { setTimeout(() => { try { recognition.start(); } catch(e2) {} }, 350); }
}

function startListening() {
    if (!recognition) { setupSpeechRecognition(); return; }
    if (isPaused) return;
    try { recognition.start(); } catch(e) {}
    setOrbState('listening');
}

// ═══════════════════════════════════════════════════════════════════════
// SPEECH SYNTHESIS
// ═══════════════════════════════════════════════════════════════════════
function speak(text) {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const clean = text
        .replace(/<[^>]+>/g, '')
        .replace(/\{[^}]+\}/g, '')
        .replace(/&amp;/g, 'and')
        .replace(/▶/g, '')
        .replace(/\s+/g, ' ')
        .trim();
    if (!clean) return;
    const utt = new SpeechSynthesisUtterance(clean);
    utt.rate = 0.95;
    isSpeaking = true;
    utt.onend = () => { setTimeout(() => { isSpeaking = false; }, 600); };
    window.speechSynthesis.speak(utt);
}

// ═══════════════════════════════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════════════════════════════
function togglePause() {
    isPaused = !isPaused;
    if (isPaused) {
        if (recognition) { try { recognition.abort(); } catch(e) {} }
        setOrbState('paused');
    } else {
        startListening();
        setOrbState('listening');
    }
}

function repeatLastRuling() {
    if (lastRuling) {
        showRuling(lastRuling.html, lastRuling.analysis);
        const spoken = buildSpokenText(lastRuling.analysis);
        if (spoken) speak(spoken);
    } else {
        speak('No previous ruling to repeat.');
    }
}

function showManualSearch() {
    const name = prompt('Enter card name:');
    if (name?.trim()) showCardRuling(name.trim());
}

function showRuleReference() {
    const categories = {};
    for (const [kw, d] of Object.entries(window.KEYWORDS)) {
        const cat = d.category || 'Other';
        if (!categories[cat]) categories[cat] = [];
        categories[cat].push(kw);
    }
    let inner = '<div style="margin-bottom:20px;font-size:20px;font-weight:700;color:#dde;">Keyword Reference</div>';
    for (const [cat, kws] of Object.entries(categories)) {
        inner += `<div style="margin-bottom:18px;">
            <div style="font-size:9px;text-transform:uppercase;letter-spacing:2px;color:#333;margin-bottom:8px;">${cat}</div>
            <div class="chip-row">
                ${kws.map(k=>`<span class="kw-chip" onclick="quickLookup('${k}');event.stopPropagation();">${k}</span>`).join('')}
            </div>
        </div>`;
    }
    // Set the overlay directly without analysis
    document.getElementById('bubble-badge').innerHTML = '';
    document.getElementById('bubble-level').innerHTML = '';
    document.getElementById('bubble-verdict').innerHTML = 'All 60+ keywords — tap any to view the ruling.';
    document.getElementById('bubble-analogy').innerHTML = '';
    document.getElementById('bubble-action').innerHTML = '';
    document.getElementById('ruling-details-inner').innerHTML = inner;
    document.getElementById('ruling-overlay').scrollTop = 0;
    document.getElementById('ruling-overlay').classList.add('show');
}

function testManually() {

// ═══════════════════════════════════════════════════════════════════════
// SESSION MANAGEMENT
// ═══════════════════════════════════════════════════════════════════════
function endSession() {
    isPaused = true;
    if (recognition) { try { recognition.stop(); } catch(e) {} }

    const elapsed = Math.floor((Date.now() - sessionStartTime) / 1000);
    const h = Math.floor(elapsed / 3600).toString().padStart(2,'0');
    const m = Math.floor((elapsed % 3600) / 60).toString().padStart(2,'0');
    const s = (elapsed % 60).toString().padStart(2,'0');
    const topKws = getTopKeywordsFromBuffer();

    document.getElementById('summary-stats').innerHTML = `
        <div class="summary-stat">
            <div class="summary-val">${h}:${m}:${s}</div>
            <div class="summary-key">Duration</div>
        </div>
        <div class="summary-stat">
            <div class="summary-val">${disputeCount}</div>
            <div class="summary-key">Disputes Resolved</div>
        </div>`;

    const chips = topKws.length > 0
        ? topKws.map(k => `<span class="summary-chip">${k}</span>`).join('')
        : '<span style="color:rgba(255,255,255,0.12);font-size:11px;">No keywords detected</span>';
    document.getElementById('summary-keywords').innerHTML = `
        <div class="summary-kws-label">Top Keywords This Session</div>
        <div class="summary-chips">${chips}</div>`;

    document.getElementById('session-summary').classList.add('show');
}

function dismissSummary() {
    document.getElementById('session-summary').classList.remove('show');
    isPaused = false;
    try { recognition.start(); } catch(e) {}
    setOrbState('listening');
}

async function confirmEndSession() {
    const payload = {
        duration_seconds: Math.floor((Date.now() - sessionStartTime) / 1000),
        dispute_count: disputeCount,
        top_keywords: getTopKeywordsFromBuffer(),
        disputes: sessionDisputeLog,
        ended_at: new Date().toISOString()
    };
    try {
        await fetch(BACKEND_URL + '/api/sessions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
    } catch(e) { console.warn('[Veritas] Session save failed:', e); }
    window.location.href = 'index.html';
}

function getTopKeywordsFromBuffer() {
    const counts = {};
    for (const u of conversationBuffer) {
        for (const kw of u.keywords) counts[kw] = (counts[kw] || 0) + 1;
    }
    return Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([k])=>k);
}

function addLog(msg, type) { console.debug('[Veritas]', type, msg); }
function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

// ═══════════════════════════════════════════════════════════════════════
// AMBIENT CANVAS
// ═══════════════════════════════════════════════════════════════════════
function initAmbientCanvas() {
    const canvas = document.getElementById('ambient-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let W, H, particles;

    function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    particles = Array.from({ length: 55 }, () => ({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        r: Math.random() * 1.4 + 0.25,
        vx: (Math.random() - 0.5) * 0.13,
        vy: (Math.random() - 0.5) * 0.13,
        opacity: Math.random() * 0.1 + 0.02,
        phase: Math.random() * Math.PI * 2,
        speed: Math.random() * 0.007 + 0.003
    }));

    function draw() {
        ctx.clearRect(0, 0, W, H);
        const t = Date.now() / 1000;
        particles.forEach(p => {
            p.x += p.vx; p.y += p.vy;
            if (p.x < -5) p.x = W + 5;
            if (p.x > W+5) p.x = -5;
            if (p.y < -5) p.y = H + 5;
            if (p.y > H+5) p.y = -5;
            const alpha = p.opacity * (0.55 + 0.45 * Math.sin(t * p.speed * 60 + p.phase));
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(0,167,181,${alpha})`;
            ctx.fill();
        });
        requestAnimationFrame(draw);
    }
    draw();
}

// ═══════════════════════════════════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
    if (e.key === 'Escape')                   closeRuling();
    if (e.key === ' ' && e.ctrlKey)           { e.preventDefault(); togglePause(); }
    if ((e.key === 'r' || e.key === 'R') && e.ctrlKey) { e.preventDefault(); repeatLastRuling(); }
});

// INIT
// ═══════════════════════════════════════════════════════════════════════
window.addEventListener('load', () => {
    initAmbientCanvas();
    setupSpeechRecognition();

    // Session timer
    setInterval(() => {
        const s = Math.floor((Date.now() - sessionStartTime) / 1000);
        const el = document.getElementById('session-timer');
        if (el) {
            const h = Math.floor(s/3600).toString().padStart(2,'0');
            const m = Math.floor((s%3600)/60).toString().padStart(2,'0');
            const sec = (s%60).toString().padStart(2,'0');
            el.textContent = `${h}:${m}:${sec}`;
        }
    }, 1000);

    // Refresh history panel times every minute
    setInterval(renderHistoryPanel, 60000);

    window.addEventListener('beforeunload', () => {
        if (recognition) { try { recognition.stop(); } catch(e) {} }
    });
});
