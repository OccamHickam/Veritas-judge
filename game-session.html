<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veritas — Game Session</title>
    <script src="keywords.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            --bg: #060609;
            --bg2: #0a0a12;
            --bg3: #0e0e1a;
            --accent: #00a7b5;
            --accent2: #4ecdc4;
            --danger: #ff6b6b;
            --warning: #ffe66d;
            --success: #4ecdc4;
            --border: rgba(0,167,181,0.15);
            --text: #e0e0f0;
            --muted: #555570;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            -webkit-font-smoothing: antialiased;
        }



        /* ══════════════════════════════════════════════════════
           AMBIENT CANVAS
        ══════════════════════════════════════════════════════ */
        #ambient-canvas {
            position: fixed; inset: 0; z-index: 0;
            pointer-events: none;
        }

        /* ══════════════════════════════════════════════════════
           STATUS BAR
        ══════════════════════════════════════════════════════ */
        .status-bar {
            position: fixed; top: 0; left: 0; right: 0; height: 50px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px;
            background: rgba(6,6,9,0.75);
            border-bottom: 1px solid rgba(0,167,181,0.08);
            backdrop-filter: blur(16px);
            z-index: 300;
        }
        .timer {
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px; font-weight: 500;
            color: rgba(0,167,181,0.55);
            letter-spacing: 3px;
        }
        .dispute-counter {
            font-size: 11px; font-weight: 600;
            color: rgba(255,107,107,0.35);
            letter-spacing: 2px; text-transform: uppercase;
            transition: color 0.4s;
        }
        .dispute-counter.active { color: #ff6b6b; }
        .end-btn {
            background: transparent;
            border: 1px solid rgba(255,107,107,0.2); color: rgba(255,107,107,0.4);
            padding: 5px 16px; border-radius: 20px;
            font-size: 10px; text-transform: uppercase;
            letter-spacing: 2px; cursor: pointer;
            transition: all 0.25s; font-family: 'Inter', sans-serif;
        }
        .end-btn:hover { border-color: var(--danger); color: var(--danger); }

        /* ══════════════════════════════════════════════════════
           STANDBY SCREEN
        ══════════════════════════════════════════════════════ */
        #standby-screen {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 1;
        }

        /* ─── The Orb ─── */
        .veritas-orb {
            position: relative;
            width: 168px; height: 168px;
            margin-bottom: 44px;
        }
        .orb-ring {
            position: absolute; inset: 0; border-radius: 50%;
            border: 1px solid rgba(0,167,181,0.13);
            animation: orbRing 9s infinite linear;
        }
        .orb-ring:nth-child(2) {
            inset: 14px; border-color: rgba(0,167,181,0.08);
            animation-duration: 14s; animation-direction: reverse;
        }
        .orb-ring:nth-child(3) {
            inset: 28px; border-color: rgba(0,167,181,0.06);
            animation-duration: 6s;
        }
        @keyframes orbRing {
            from { transform: rotate(0deg) scaleX(1); }
            50%  { transform: rotate(180deg) scaleX(0.82); }
            to   { transform: rotate(360deg) scaleX(1); }
        }
        .orb-core {
            position: absolute;
            inset: 42px; border-radius: 50%;
            background: radial-gradient(circle at 40% 35%,
                rgba(0,167,181,0.16) 0%, rgba(0,60,80,0.06) 55%, transparent 100%);
            border: 1px solid rgba(0,167,181,0.18);
            animation: orbBreath 6s ease-in-out infinite;
        }
        @keyframes orbBreath {
            0%,100% { opacity: 0.55; transform: scale(1); }
            50%      { opacity: 1;    transform: scale(1.05); }
        }
        .orb-dot {
            position: absolute; top: 50%; left: 50%;
            width: 5px; height: 5px; border-radius: 50%;
            background: rgba(0,167,181,0.5);
            transform: translate(-50%,-50%);
            animation: dotPulse 6s ease-in-out infinite;
        }
        @keyframes dotPulse {
            0%,100% { opacity: 0.25; box-shadow: 0 0 0 0 rgba(0,167,181,0); }
            50%      { opacity: 0.9;  box-shadow: 0 0 0 9px rgba(0,167,181,0); }
        }

        /* Orb states */
        .veritas-orb.s-listening  .orb-ring { border-color: rgba(0,167,181,0.13); }
        .veritas-orb.s-listening  .orb-core { border-color: rgba(0,167,181,0.18); }
        .veritas-orb.s-listening  .orb-dot  { background: rgba(0,167,181,0.5); }

        .veritas-orb.s-reconnecting .orb-ring { border-color: rgba(255,180,0,0.18); animation-duration: 18s !important; }
        .veritas-orb.s-reconnecting .orb-core { border-color: rgba(255,180,0,0.22); background: radial-gradient(circle at 40% 35%, rgba(255,180,0,0.1) 0%, transparent 100%); }
        .veritas-orb.s-reconnecting .orb-dot  { background: rgba(255,180,0,0.6); }

        .veritas-orb.s-dead .orb-ring { border-color: rgba(255,107,107,0.18); animation-play-state: paused; }
        .veritas-orb.s-dead .orb-core { border-color: rgba(255,107,107,0.22); background: radial-gradient(circle at 40% 35%, rgba(255,107,107,0.08) 0%, transparent 100%); }
        .veritas-orb.s-dead .orb-dot  { background: rgba(255,107,107,0.5); }

        .veritas-orb.s-paused .orb-ring { border-color: rgba(255,255,255,0.04); animation-duration: 28s !important; }
        .veritas-orb.s-paused .orb-core { border-color: rgba(255,255,255,0.05); background: none; }
        .veritas-orb.s-paused .orb-dot  { background: rgba(255,255,255,0.12); }

        .orb-wordmark {
            font-family: 'Cinzel', serif;
            font-size: 11px; letter-spacing: 9px; text-transform: uppercase;
            color: rgba(0,167,181,0.28);
            margin-bottom: 10px; font-weight: 400;
        }
        .orb-status {
            font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
            color: rgba(255,255,255,0.09);
            animation: labelFade 4s ease-in-out infinite;
        }
        @keyframes labelFade {
            0%,100% { opacity: 0.35; }
            50%      { opacity: 0.75; }
        }

        /* ══════════════════════════════════════════════════════
           WAKE FLASH
        ══════════════════════════════════════════════════════ */
        #wake-flash {
            position: fixed; inset: 0; z-index: 999;
            background: rgba(0,167,181,0.1);
            pointer-events: none; opacity: 0;
        }
        @keyframes wakeFlashAnim {
            0%   { opacity: 1; }
            100% { opacity: 0; }
        }
        #wake-flash.fire { animation: wakeFlashAnim 0.45s ease-out forwards; }

        /* ══════════════════════════════════════════════════════
           CONTROLS STRIP
        ══════════════════════════════════════════════════════ */
        .controls-strip {
            position: fixed; bottom: 0; left: 0; right: 0; height: 50px;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            background: rgba(6,6,9,0.6);
            border-top: 1px solid rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            z-index: 300;
        }
        .ctrl-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.06); color: rgba(255,255,255,0.25);
            padding: 5px 14px; border-radius: 16px;
            font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; transition: all 0.22s;
            font-family: 'Inter', sans-serif; font-weight: 500;
        }
        .ctrl-btn:hover { border-color: rgba(0,167,181,0.4); color: rgba(0,167,181,0.8); }

        /* ══════════════════════════════════════════════════════
           KEYBOARD HINT
        ══════════════════════════════════════════════════════ */
        .kbd-hint {
            position: fixed; bottom: 56px; left: 0; right: 0;
            text-align: center; font-size: 10px;
            color: rgba(255,255,255,0.07); pointer-events: none;
            letter-spacing: 1.5px; text-transform: uppercase;
        }
        kbd {
            font-family: 'JetBrains Mono', monospace; font-size: 9px;
            color: rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 3px; padding: 1px 5px;
        }

        /* ══════════════════════════════════════════════════════
           RULING OVERLAY
        ══════════════════════════════════════════════════════ */
        #ruling-overlay {
            position: fixed; inset: 0;
            background: #07070e;
            display: none; flex-direction: column;
            z-index: 1000; overflow-y: auto; overflow-x: hidden;
            scroll-behavior: smooth;
        }
        #ruling-overlay.show { display: flex; }

        @keyframes rulingAppear {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ─── Judge Stage ─── */
        .judge-stage {
            position: relative;
            width: 100%; min-height: 54vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: flex-end;
            padding-bottom: 0; flex-shrink: 0;
            animation: rulingAppear 0.4s cubic-bezier(0.22,1,0.36,1);
        }
        .judge-stage::before {
            content: '';
            position: absolute; inset: 0;
            background: radial-gradient(ellipse 55% 45% at 50% 82%,
                rgba(0,167,181,0.07) 0%, transparent 70%);
            pointer-events: none;
        }

        /* ─── Judge Figure (pure CSS) ─── */
        .judge-figure {
            position: relative;
            width: 150px; height: 250px;
            margin-bottom: 0;
        }
        .judge-head {
            position: absolute;
            top: 0; left: 50%; transform: translateX(-50%);
            width: 58px; height: 65px;
            background: radial-gradient(ellipse at 50% 40%,
                rgba(0,167,181,0.06) 0%, transparent 70%);
            border-radius: 50% 50% 40% 40%;
            border: 1px solid rgba(0,167,181,0.16);
        }
        .judge-head::after {
            content: '';
            position: absolute;
            top: 20px; left: 10px; right: 10px; bottom: 10px;
            background: rgba(0,0,0,0.88);
            border-radius: 50%;
        }
        .judge-eyes {
            position: absolute;
            top: 32px; left: 50%; transform: translateX(-50%);
            width: 28px; height: 4px; z-index: 2;
        }
        .judge-eyes::before, .judge-eyes::after {
            content: '';
            position: absolute;
            width: 6px; height: 2px; border-radius: 50%;
            background: rgba(0,167,181,0.55);
            box-shadow: 0 0 8px rgba(0,167,181,0.7);
            top: 0;
            animation: eyeGlow 4.5s ease-in-out infinite;
        }
        .judge-eyes::before { left: 0; }
        .judge-eyes::after  { right: 0; }
        @keyframes eyeGlow {
            0%,100% { opacity: 0.4; }
            50%      { opacity: 0.95; }
        }
        .judge-cloak {
            position: absolute;
            top: 52px; left: 0; right: 0; bottom: 0;
            background: linear-gradient(175deg,
                rgba(10,10,22,0.96) 0%,
                rgba(5,5,14,0.99) 55%,
                rgba(0,167,181,0.03) 100%);
            border-radius: 18px 18px 42% 42%;
            border: 1px solid rgba(0,167,181,0.1);
            border-top: none;
        }
        .judge-cloak::before {
            content: '';
            position: absolute;
            top: 8px; bottom: 24px;
            left: 50%; transform: translateX(-50%);
            width: 1px;
            background: linear-gradient(180deg, rgba(0,167,181,0.08) 0%, transparent 100%);
        }
        .judge-cloak::after {
            content: '';
            position: absolute;
            bottom: 0; left: 22%; right: 22%; height: 1px;
            background: rgba(0,167,181,0.15);
            border-radius: 50%;
            box-shadow: 0 0 12px rgba(0,167,181,0.2);
        }

        /* ─── Speech Bubble ─── */
        .judge-bubble {
            position: relative;
            background: rgba(9,10,22,0.98);
            border: 1px solid rgba(0,167,181,0.28);
            border-radius: 20px;
            padding: 24px 30px;
            margin: 0 20px;
            max-width: 700px; width: calc(100% - 40px);
            box-shadow: 0 0 50px rgba(0,167,181,0.07), 0 24px 60px rgba(0,0,0,0.5);
            animation: bubbleIn 0.35s 0.18s cubic-bezier(0.22,1,0.36,1) both;
        }
        @keyframes bubbleIn {
            from { opacity: 0; transform: translateY(14px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        .judge-bubble::before {
            content: '';
            position: absolute;
            top: -10px; left: 50%; transform: translateX(-50%);
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 10px solid rgba(0,167,181,0.28);
        }
        .judge-bubble::after {
            content: '';
            position: absolute;
            top: -8px; left: 50%; transform: translateX(-50%);
            border-left: 9px solid transparent;
            border-right: 9px solid transparent;
            border-bottom: 9px solid rgba(9,10,22,0.98);
        }

        /* Badge row */
        #bubble-badge { margin-bottom: 10px; }
        .dispute-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(255,107,107,0.09);
            border: 1px solid rgba(255,107,107,0.28);
            color: rgba(255,128,128,0.85); font-size: 10px; font-weight: 600;
            letter-spacing: 2px; text-transform: uppercase;
            padding: 3px 10px; border-radius: 20px;
            animation: disputeFlash 0.6s ease;
        }
        @keyframes disputeFlash {
            0%   { background: rgba(255,107,107,0.22); }
            100% { background: rgba(255,107,107,0.09); }
        }
        .level-badge {
            display: inline-block;
            padding: 2px 10px; border-radius: 20px;
            font-size: 9px; font-weight: 600; letter-spacing: 2px;
            text-transform: uppercase; margin-left: 6px;
        }
        .level-badge.basic        { background: rgba(78,205,196,0.12); color: #4ecdc4; border: 1px solid rgba(78,205,196,0.3); }
        .level-badge.intermediate { background: rgba(255,230,109,0.08); color: #ffe66d; border: 1px solid rgba(255,230,109,0.28); }
        .level-badge.advanced     { background: rgba(255,107,107,0.1); color: #ff8080; border: 1px solid rgba(255,107,107,0.3); }

        /* Verdict text */
        .bubble-verdict {
            font-size: 17px; line-height: 1.7;
            color: #dde0f0; font-weight: 400;
        }
        .bubble-verdict strong { color: #fff; font-weight: 600; }
        .bubble-verdict .teal  { color: var(--accent2); }
        .bubble-verdict .gold  { color: var(--warning); }
        .bubble-verdict .red   { color: #ff8888; }

        /* Analogy pill */
        .analogy-pill {
            display: flex; align-items: flex-start; gap: 10px;
            margin-top: 14px;
            background: rgba(0,167,181,0.05);
            border: 1px solid rgba(0,167,181,0.14);
            border-radius: 12px;
            padding: 10px 14px;
        }
        .analogy-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
        .analogy-text {
            font-size: 13px; color: rgba(0,167,181,0.7);
            font-style: italic; line-height: 1.5;
        }

        /* Action pill */
        .action-pill {
            display: flex; align-items: center; gap: 10px;
            margin-top: 10px;
            background: rgba(78,205,196,0.06);
            border: 1px solid rgba(78,205,196,0.16);
            border-radius: 12px; padding: 10px 14px;
        }
        .action-label {
            font-size: 9px; font-weight: 700; letter-spacing: 2px;
            text-transform: uppercase; color: var(--accent2);
            white-space: nowrap;
        }
        .action-text {
            font-size: 13px; color: rgba(200,240,238,0.75); line-height: 1.4;
        }

        /* Scroll hint */
        .scroll-hint {
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            padding: 16px 0 8px; color: rgba(0,167,181,0.28);
            font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
            animation: hintBob 2.2s ease-in-out infinite; flex-shrink: 0;
        }
        @keyframes hintBob {
            0%,100% { transform: translateY(0); opacity: 0.35; }
            50%      { transform: translateY(5px); opacity: 0.65; }
        }
        .scroll-hint svg { width: 15px; height: 15px; }

        /* ─── Details Section ─── */
        .ruling-details {
            background: rgba(0,0,0,0.45);
            border-top: 1px solid rgba(0,167,181,0.08);
            padding: 28px 22px 110px;
            flex-shrink: 0;
            animation: rulingAppear 0.3s 0.3s both;
        }
        .ruling-details-inner { max-width: 700px; margin: 0 auto; }

        /* Layer tabs */
        .layer-tabs {
            display: flex; gap: 4px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 12px; padding: 4px;
        }
        .layer-tab {
            flex: 1; padding: 8px 12px;
            background: transparent; border: none;
            color: rgba(255,255,255,0.25); font-size: 11px;
            font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
            cursor: pointer; border-radius: 9px;
            transition: all 0.2s; font-family: 'Inter', sans-serif;
        }
        .layer-tab.active {
            background: rgba(0,167,181,0.12);
            color: var(--accent);
            border: 1px solid rgba(0,167,181,0.2);
        }
        .layer-panel { display: none; }
        .layer-panel.active { display: block; }

        /* Section label */
        .section-label {
            font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase;
            color: rgba(0,167,181,0.35); font-weight: 700;
            margin-bottom: 12px; padding-bottom: 8px;
            border-bottom: 1px solid rgba(0,167,181,0.07);
        }

        /* Keyword detail card */
        .kw-card {
            background: rgba(255,255,255,0.018);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px; padding: 18px 20px; margin-bottom: 12px;
        }
        .kw-card-name {
            font-size: 12px; font-weight: 700; letter-spacing: 1.5px;
            text-transform: uppercase; color: var(--accent);
            margin-bottom: 4px;
        }
        .kw-card-cat {
            font-size: 10px; color: rgba(255,255,255,0.2);
            text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .kw-card-plain {
            font-size: 14px; line-height: 1.75; color: #bbc; margin-bottom: 12px;
        }
        .kw-card-plain strong { color: #dde; }
        .kw-nuance {
            font-size: 12px; color: rgba(160,160,180,0.7); line-height: 1.6;
            padding-left: 12px;
            border-left: 2px solid rgba(0,167,181,0.18);
            margin-bottom: 6px;
        }
        .kw-ref {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px; color: rgba(0,167,181,0.28);
            margin-top: 10px;
        }

        /* Common mistake box */
        .mistake-box {
            background: rgba(255,107,107,0.06);
            border: 1px solid rgba(255,107,107,0.2);
            border-radius: 10px; padding: 14px 16px; margin-bottom: 14px;
        }
        .mistake-label {
            font-size: 9px; font-weight: 700; letter-spacing: 2px;
            text-transform: uppercase; color: rgba(255,107,107,0.7);
            margin-bottom: 6px;
        }
        .mistake-text { font-size: 13px; color: rgba(220,180,180,0.75); line-height: 1.55; }

        /* What to do box */
        .action-box {
            background: rgba(78,205,196,0.05);
            border: 1px solid rgba(78,205,196,0.18);
            border-radius: 10px; padding: 14px 16px; margin-bottom: 14px;
        }
        .action-box-label {
            font-size: 9px; font-weight: 700; letter-spacing: 2px;
            text-transform: uppercase; color: rgba(78,205,196,0.7);
            margin-bottom: 6px;
        }
        .action-box-text { font-size: 13px; color: rgba(180,230,228,0.75); line-height: 1.55; }

        /* Situations box */
        .situation-item {
            display: flex; align-items: flex-start; gap: 10px;
            padding: 10px 14px; border-radius: 8px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.04);
            margin-bottom: 8px;
        }
        .situation-bullet {
            width: 6px; height: 6px; border-radius: 50%;
            background: rgba(0,167,181,0.4);
            flex-shrink: 0; margin-top: 5px;
        }
        .situation-text { font-size: 13px; color: rgba(180,185,205,0.75); line-height: 1.55; }

        /* CR citation box */
        .cr-box {
            background: rgba(255,255,255,0.015);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 10px; padding: 16px 18px;
        }
        .cr-label {
            font-size: 9px; font-weight: 700; letter-spacing: 2px;
            text-transform: uppercase; color: rgba(255,255,255,0.2);
            margin-bottom: 8px;
        }
        .cr-ref {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px; color: rgba(0,167,181,0.5);
            margin-bottom: 6px;
        }
        .cr-text { font-size: 13px; color: rgba(160,165,185,0.7); line-height: 1.6; }

        /* Chip row */
        .chip-row { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 12px; }
        .kw-chip {
            background: rgba(0,167,181,0.06);
            border: 1px solid rgba(0,167,181,0.2);
            color: rgba(78,205,196,0.75); padding: 4px 13px;
            border-radius: 20px; font-size: 11px; cursor: pointer;
            transition: all 0.2s;
        }
        .kw-chip:hover { background: rgba(0,167,181,0.14); color: var(--accent2); }

        /* General prose */
        .detail-prose { font-size: 14px; color: #99a; line-height: 1.8; }
        .detail-prose strong { color: #cce; }
        .detail-prose .teal  { color: var(--accent2); }
        .detail-prose .gold  { color: var(--warning); }
        .detail-prose .red   { color: #ff8888; }

        /* Example box */
        .example-box {
            background: rgba(255,230,109,0.04);
            border-left: 3px solid rgba(255,230,109,0.3);
            padding: 12px 16px; border-radius: 0 8px 8px 0; margin-bottom: 14px;
        }
        .example-label {
            font-size: 9px; color: rgba(255,230,109,0.6);
            text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 5px; font-weight: 700;
        }
        .example-text { font-size: 13px; color: #aab; line-height: 1.6; }

        /* Verdict banner */
        .verdict-banner {
            display: flex; align-items: center; gap: 14px;
            border-radius: 12px; padding: 14px 18px; margin-bottom: 18px;
        }
        .verdict-banner.yes     { background: rgba(78,205,196,0.07);  border: 1px solid rgba(78,205,196,0.25); }
        .verdict-banner.no      { background: rgba(255,107,107,0.07); border: 1px solid rgba(255,107,107,0.25); }
        .verdict-banner.depends { background: rgba(255,230,109,0.06); border: 1px solid rgba(255,230,109,0.25); }
        .verdict-banner.info    { background: rgba(0,167,181,0.07);   border: 1px solid rgba(0,167,181,0.22); }
        .verdict-icon { font-size: 22px; flex-shrink: 0; }
        .verdict-text .verdict-statement { font-size: 18px; font-weight: 700; line-height: 1.3; }
        .verdict-text .verdict-reason    { font-size: 11px; color: var(--muted); margin-top: 2px; }
        .verdict-banner.yes     .verdict-statement { color: var(--accent2); }
        .verdict-banner.no      .verdict-statement { color: var(--danger); }
        .verdict-banner.depends .verdict-statement { color: var(--warning); }
        .verdict-banner.info    .verdict-statement { color: var(--accent); }

        /* Compare grid */
        .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 14px 0; }
        .compare-col { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 10px; padding: 14px; }
        .compare-col h4 { color: var(--accent); font-size: 13px; margin-bottom: 8px; }
        .compare-col li { font-size: 12px; color: #aab; line-height: 1.8; margin-left: 14px; }
        .compare-verdict { background: rgba(0,167,181,0.06); border: 1px solid rgba(0,167,181,0.18); border-radius: 10px; padding: 12px 16px; font-size: 13px; color: #aab; line-height: 1.6; }
        .compare-verdict strong { color: var(--accent2); }

        /* Multi keyword */
        .multi-kw-item { padding: 14px; margin-bottom: 10px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 10px; }
        .multi-kw-item h3 { color: var(--accent); margin-bottom: 3px; font-size: 15px; }
        .multi-kw-item .ref { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--accent2); margin-bottom: 6px; }
        .multi-kw-item p { font-size: 13px; color: #99a; line-height: 1.6; }

        /* Ruling overlay close btn */
        .close-btn {
            position: fixed; top: 14px; right: 16px;
            background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.25); font-size: 17px; cursor: pointer;
            width: 34px; height: 34px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; z-index: 1010; backdrop-filter: blur(10px);
        }
        .close-btn:hover { border-color: var(--accent); color: var(--accent); }

        /* Card ruling */
        .card-grid { display: grid; grid-template-columns: 210px 1fr; gap: 22px; align-items: start; }
        .card-img-wrap { background: rgba(0,0,0,0.4); border-radius: 12px; padding: 12px; text-align: center; }
        .card-image { max-width: 100%; border-radius: 8px; box-shadow: 0 8px 30px rgba(0,0,0,0.65); }
        .card-details h2 { color: var(--accent); font-size: 20px; margin-bottom: 3px; }
        .card-type { color: #555; font-style: italic; margin-bottom: 12px; font-size: 12px; }
        .oracle-box { background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.05); padding: 12px 14px; border-radius: 8px; margin-bottom: 12px; line-height: 1.65; font-size: 13px; white-space: pre-wrap; color: #99a; }
        .rulings-box { background: rgba(0,167,181,0.03); padding: 12px 14px; border-radius: 8px; }
        .rulings-box h4 { color: var(--accent2); margin-bottom: 6px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .rulings-box li { margin-bottom: 6px; font-size: 12px; color: #888; list-style: none; padding-left: 12px; position: relative; }
        .rulings-box li::before { content: "→"; position: absolute; left: 0; color: var(--accent2); }

        /* ══════════════════════════════════════════════════════
           HISTORY PANEL
        ══════════════════════════════════════════════════════ */
        #history-panel {
            position: fixed; top: 56px; right: 14px;
            display: none; flex-direction: column; gap: 4px;
            z-index: 250; max-width: 190px;
        }
        #history-panel.visible { display: flex; }
        .history-item {
            display: flex; justify-content: space-between; align-items: center; gap: 8px;
            background: rgba(6,6,9,0.88);
            border: 1px solid rgba(0,167,181,0.13);
            border-radius: 8px; padding: 6px 10px;
            cursor: pointer; transition: all 0.2s; backdrop-filter: blur(10px);
        }
        .history-item:hover { border-color: rgba(0,167,181,0.35); }
        .h-label { font-size: 11px; color: rgba(0,167,181,0.65); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-transform: capitalize; }
        .h-time  { font-size: 9px; color: rgba(255,255,255,0.18); white-space: nowrap; flex-shrink: 0; }

        /* ══════════════════════════════════════════════════════
           SESSION SUMMARY MODAL
        ══════════════════════════════════════════════════════ */
        #session-summary {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.94);
            display: none; align-items: center; justify-content: center;
            z-index: 4000; padding: 24px;
        }
        #session-summary.show { display: flex; }
        .summary-card {
            background: linear-gradient(155deg, #0d0d1c 0%, #111125 100%);
            border: 1px solid rgba(0,167,181,0.28);
            border-radius: 20px; padding: 36px;
            max-width: 460px; width: 100%;
            animation: rulingAppear 0.35s cubic-bezier(0.22,1,0.36,1);
        }
        .summary-title {
            font-family: 'Cinzel', serif;
            font-size: 11px; letter-spacing: 6px; text-transform: uppercase;
            color: rgba(0,167,181,0.4); margin-bottom: 24px; text-align: center;
        }
        .summary-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 22px; }
        .summary-stat {
            background: rgba(255,255,255,0.025);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px; padding: 14px; text-align: center;
        }
        .summary-val {
            font-family: 'JetBrains Mono', monospace;
            font-size: 26px; font-weight: 500; color: var(--accent);
        }
        .summary-key {
            font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px;
            color: rgba(255,255,255,0.18); margin-top: 4px;
        }
        .summary-kws { margin-bottom: 22px; }
        .summary-kws-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.18); margin-bottom: 8px; }
        .summary-chips { display: flex; flex-wrap: wrap; gap: 6px; }
        .summary-chip { background: rgba(0,167,181,0.07); border: 1px solid rgba(0,167,181,0.18); color: rgba(78,205,196,0.65); padding: 4px 12px; border-radius: 20px; font-size: 10px; }
        .summary-actions { display: flex; gap: 10px; }
        .summary-btn { flex: 1; padding: 11px; border-radius: 11px; font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif; }
        .summary-primary { background: transparent; border: 1px solid rgba(0,167,181,0.35); color: rgba(0,167,181,0.75); }
        .summary-primary:hover { background: rgba(0,167,181,0.09); }
        .summary-secondary { background: transparent; border: 1px solid rgba(255,255,255,0.06); color: rgba(255,255,255,0.2); }
        .summary-secondary:hover { border-color: rgba(255,255,255,0.18); color: rgba(255,255,255,0.4); }

        /* ══════════════════════════════════════════════════════
           MISC
        ══════════════════════════════════════════════════════ */
        @media (max-width: 600px) {
            .card-grid { grid-template-columns: 1fr; }
            .compare-grid { grid-template-columns: 1fr; }
            .judge-bubble { padding: 18px 18px; }
            .bubble-verdict { font-size: 15px; }
        }
    </style>
</head>

<script>
// ═══════════════════════════════════════════════════════════════════════
// KEYWORDS GUARD — ensures window.KEYWORDS is available
// Falls back to empty object if keywords.js failed to load
// ═══════════════════════════════════════════════════════════════════════
function ensureKeywordsLoaded() {
    if (typeof window.KEYWORDS === 'object' && window.KEYWORDS !== null) return true;
    console.warn('[Veritas] keywords.js not loaded — keyword lookups disabled.');
    window.KEYWORDS = {};
    return false;
}
ensureKeywordsLoaded();

// ═══════════════════════════════════════════════════════════════════════
// MATCH HELPER — word-boundary for single-word keys
// ═══════════════════════════════════════════════════════════════════════
function matchKw(kw, lower) {
    if (kw.includes(' ')) return lower.includes(kw);
    const escaped = kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return new RegExp('\\b' + escaped + '\\b', 'i').test(lower);
}

// ═══════════════════════════════════════════════════════════════════════
// EXPERIENCE LEVEL DETECTION
// ═══════════════════════════════════════════════════════════════════════
function detectExperienceLevel(text) {
    const lower = text.toLowerCase();
    const advancedSignals = [
        /\bstack\b/,/\bresolve[sd]?\b/,/\bpriority\b/,/\blayer[s]?\b/,
        /\btimestamp\b/,/\breplacement effect\b/,/\btrigger.{1,20}stack\b/,
        /\bstate.?based\b/,/\bin response to\b/,/\bdependency\b/,
        /\bsimultaneous(ly)?\b/,/\bcontinuous effect\b/
    ];
    const basicSignals = [
        /\bwhat (does|is)\b/,/\bhow does.+work\b/,/\bexplain\b/,
        /\bcan i\b/,/\bcan it\b/,/\bdoes it\b/
    ];
    const advScore = advancedSignals.filter(r => r.test(lower)).length;
    const basicScore = basicSignals.filter(r => r.test(lower)).length;
    if (advScore >= 2) return 'advanced';
    if (advScore === 1 && basicScore === 0) return 'intermediate';
    return 'basic';
}

// ═══════════════════════════════════════════════════════════════════════
// CONTEXT DETECTION — what are they talking about?
// ═══════════════════════════════════════════════════════════════════════
function detectContext(text) {
    const lower = text.toLowerCase();
    if (/\battack(ing|ed|s)?\b/.test(lower)) return 'attacking';
    if (/\bblock(ing|ed|s)?\b/.test(lower)) return 'blocking';
    if (/\bdeathtouch\b/.test(lower)) return 'deathtouch';
    return null;
}

// ═══════════════════════════════════════════════════════════════════════
// VERDICT BUILDER — conversational spoken+visual text
// Uses tableTalk for voice, first sentence for bubble
// ═══════════════════════════════════════════════════════════════════════
function buildVerdict(analysis) {
    if (!analysis || !analysis.type) {
        return "Veritas heard a dispute but couldn't identify the rule. Say the keyword or card name being argued.";
    }

    if (analysis.type === 'keyword') {
        const kw = analysis.keyword;
        const d = window.KEYWORDS[kw];
        if (!d) return `Here's the ruling on <strong>${kw}</strong> — scroll down for details.`;

        // Prefer tableTalk for conversational delivery
        const spoken = d.tableTalk
            ? d.tableTalk
            : d.plain.replace(/<[^>]+>/g, '').split(/\.\s/)[0];

        const instruction = buildInstruction(kw, d, analysis.context || null);
        return `${spoken}${instruction ? '<br><br>' + instruction : ''}`;
    }

    if (analysis.type === 'semantic') {
        const d = analysis.data;
        if (!d) return 'Check the detailed ruling below.';
        const body = (d.body || '').replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim();
        const firstSentence = body.split(/\.\s/)[0];
        return `Here's what happens: ${firstSentence}.${d.verdict ? '<br><br>' + d.verdict.replace(/<[^>]+>/g, '').trim() : ''}`;
    }

    if (analysis.type === 'multi_keyword') {
        const kws = analysis.keywords.slice(0, 2);
        const parts = kws.map(kw => {
            const d = window.KEYWORDS[kw];
            if (!d) return `<strong>${kw}</strong>`;
            const spoken = d.tableTalk
                ? d.tableTalk.split(/\.\s/)[0]
                : d.plain.replace(/<[^>]+>/g, '').split(/\.\s/)[0].toLowerCase();
            return `<strong>${kw}:</strong> ${spoken}`;
        });
        return parts.join('<br><br>');
    }

    return 'Check the detailed ruling below.';
}

// ═══════════════════════════════════════════════════════════════════════
// INSTRUCTION BUILDER — context-aware "what to do now"
// ═══════════════════════════════════════════════════════════════════════
function buildInstruction(kw, d, context) {
    // Context-specific first
    if (context === 'attacking' && d.whenAttacking)  return `<span class="teal">▶ Attacking:</span> ${d.whenAttacking}`;
    if (context === 'blocking'  && d.whenBlocking)   return `<span class="teal">▶ Blocking:</span> ${d.whenBlocking}`;
    if (context === 'deathtouch' && d.withDeathtouch) return `<span class="teal">▶ With deathtouch:</span> ${d.withDeathtouch}`;

    // Fall back to whatToDo
    if (d.whatToDo) return `<span class="teal">▶ What to do:</span> ${d.whatToDo}`;

    // Static fallbacks
    const fallbacks = {
        'hexproof':       'The hexproof creature cannot be targeted by opponents. Remove targeting spells from the stack.',
        'indestructible': 'Destroy effects do nothing. Use exile, -X/-X to 0 toughness, or sacrifice effects.',
        'deathtouch':     'Any damage from this creature is lethal to other creatures, regardless of toughness.',
        'trample':        'Assign lethal damage to each blocker, then the remaining power goes to the defending player.',
        'lifelink':       'Life gain happens simultaneously with damage. Update life totals now.',
        'flying':         'Only creatures with flying or reach can block this attacker.',
        'first strike':   'This creature deals combat damage first. If the blocker dies, it deals no damage back.',
        'double strike':  'Deals damage in both the first strike step and the regular combat damage step.',
        'vigilance':      'This creature does not tap when it attacks — it stays available to block.',
        'flash':          'Can be cast any time an instant could be cast, including on opponents\' turns.',
        'haste':          'Can attack or use tap abilities the very turn it enters the battlefield.',
        'menace':         'Requires two or more blockers. One blocker alone is not a legal block.',
        'protection':     'Remember DEBT: prevents Damage, Enchanting, Blocking, and Targeting from that quality.',
        'shroud':         'Nobody can target it — not opponents, not you either.',
        'ward':           'The spell targeting it is countered unless the opponent pays the ward cost.',
        'annihilator':    'The defending player must sacrifice permanents immediately — before blockers are declared.',
        'infect':         'Ten poison counters on a player means they lose, regardless of life total.',
        'commander damage': 'Track this separately. Twenty-one combat damage from the same commander equals a loss.',
        'commander tax':  'Add 2 generic mana for each previous cast from the command zone.',
    };
    return fallbacks[kw] ? `<span class="teal">▶</span> ${fallbacks[kw]}` : '';
}

// ═══════════════════════════════════════════════════════════════════════
// BUILD DETAILS HTML — three-layer scrollable section
// Layer 0: Why This Matters (analogy, common mistake, what to do)
// Layer 1: Situations (relatedSituations or nuances as situations)
// Layer 2: Official Ruling (CR citation, full plain text)
// ═══════════════════════════════════════════════════════════════════════
function buildDetailsHtml(analysis, isDispute) {
    // Gather keyword data
    let kwList = [];
    if (analysis.type === 'keyword')       kwList = [analysis.keyword];
    if (analysis.type === 'multi_keyword') kwList = analysis.keywords.slice(0, 4);
    if (analysis.type === 'semantic' && analysis.data?.related) {
        kwList = (analysis.data.related || []).filter(k => window.KEYWORDS[k]).slice(0, 3);
    }

    // ── Layer 0: Why This Matters ──
    let layer0 = '';
    if (kwList.length > 0) {
        const d = window.KEYWORDS[kwList[0]];
        if (d) {
            // Analogy
            if (d.analogy) {
                layer0 += `<div class="section-label">Analogy</div>
                <div class="analogy-pill" style="margin-bottom:16px;">
                    <span class="analogy-icon">💡</span>
                    <span class="analogy-text">${d.analogy}</span>
                </div>`;
            }
            // Common mistake
            if (d.commonMistake) {
                layer0 += `<div class="mistake-box">
                    <div class="mistake-label">⚠ Common Mistake</div>
                    <div class="mistake-text">${d.commonMistake}</div>
                </div>`;
            }
            // What to do
            if (d.whatToDo) {
                layer0 += `<div class="action-box">
                    <div class="action-box-label">▶ What To Do Now</div>
                    <div class="action-box-text">${d.whatToDo}</div>
                </div>`;
            }
            // Context-specific
            const ctxSections = [];
            if (d.whenAttacking) ctxSections.push({ label: 'When Attacking', text: d.whenAttacking });
            if (d.whenBlocking)  ctxSections.push({ label: 'When Blocking',  text: d.whenBlocking });
            if (d.withDeathtouch) ctxSections.push({ label: 'With Deathtouch', text: d.withDeathtouch });
            if (ctxSections.length) {
                layer0 += `<div class="section-label" style="margin-top:16px;">Contextual Guidance</div>`;
                ctxSections.forEach(s => {
                    layer0 += `<div class="situation-item">
                        <div class="situation-bullet"></div>
                        <div class="situation-text"><strong>${s.label}:</strong> ${s.text}</div>
                    </div>`;
                });
            }
        }
    }

    // Semantic body for layer 0 if no keyword
    if (!layer0 && analysis.type === 'semantic' && analysis.data?.body) {
        layer0 += `<div class="detail-prose">${analysis.data.body}</div>`;
    }

    if (!layer0) layer0 = '<div class="detail-prose" style="color:rgba(255,255,255,0.2);">No additional guidance for this topic.</div>';

    // ── Layer 1: Situations ──
    let layer1 = '';
    if (kwList.length > 0) {
        kwList.forEach(kw => {
            const d = window.KEYWORDS[kw];
            if (!d) return;
            layer1 += `<div class="section-label">${kw.toUpperCase()}</div>`;
            // Example
            if (d.example) {
                layer1 += `<div class="example-box">
                    <div class="example-label">📖 At the Table</div>
                    <div class="example-text">${d.example}</div>
                </div>`;
            }
            // Nuances as situations
            if (d.nuances && d.nuances.length) {
                d.nuances.forEach(n => {
                    layer1 += `<div class="situation-item">
                        <div class="situation-bullet"></div>
                        <div class="situation-text">${n}</div>
                    </div>`;
                });
            }
        });
    }
    if (!layer1) {
        layer1 = '<div class="detail-prose" style="color:rgba(255,255,255,0.2);">No specific situations recorded.</div>';
    }

    // ── Layer 2: Official Ruling ──
    let layer2 = '';
    if (kwList.length > 0) {
        kwList.forEach(kw => {
            const d = window.KEYWORDS[kw];
            if (!d) return;
            layer2 += `<div class="cr-box" style="margin-bottom:14px;">
                <div class="cr-label">Comprehensive Rules — ${d.rule}</div>
                <div class="cr-ref">CR ${d.rule} · ${d.category}</div>
                <div class="cr-text">${d.plain}</div>
            </div>`;
            // Related chips
            const related = (d.related || []).filter(r => window.KEYWORDS[r]);
            if (related.length) {
                layer2 += `<div class="chip-row">
                    ${related.map(r => `<span class="kw-chip" onclick="quickLookup('${r}')">${r}</span>`).join('')}
                </div>`;
            }
        });
    }
    if (analysis.type === 'semantic' && analysis.data?.rule) {
        layer2 += `<div class="cr-box">
            <div class="cr-label">Reference</div>
            <div class="cr-ref">CR ${analysis.data.rule}</div>
        </div>`;
    }
    if (!layer2) {
        layer2 = '<div class="detail-prose" style="color:rgba(255,255,255,0.2);">No CR reference available.</div>';
    }

    // ── Assemble with tabs ──
    return `<div class="layer-tabs">
        <button class="layer-tab active" onclick="switchLayer(0,this)">Why This Matters</button>
        <button class="layer-tab" onclick="switchLayer(1,this)">Situations</button>
        <button class="layer-tab" onclick="switchLayer(2,this)">Official Ruling</button>
    </div>
    <div class="layer-panel active" id="layer-panel-0">${layer0}</div>
    <div class="layer-panel" id="layer-panel-1">${layer1}</div>
    <div class="layer-panel" id="layer-panel-2">${layer2}</div>`;
}

function switchLayer(index, btn) {
    document.querySelectorAll('.layer-tab').forEach((t, i) => {
        t.classList.toggle('active', i === index);
    });
    document.querySelectorAll('.layer-panel').forEach((p, i) => {
        p.classList.toggle('active', i === index);
    });
}

// ═══════════════════════════════════════════════════════════════════════
// KNOWN KEYWORD INTERACTIONS
// ═══════════════════════════════════════════════════════════════════════
function getKnownInteraction(a, b) {
    const known = {
        'trample+deathtouch': {
            tag: 'yes', tagLabel: 'Famous Combo',
            title: 'Trample + Deathtouch',
            body: `<p>This is one of the strongest combat combinations in Magic.</p><br>
            <p>With deathtouch, any amount of damage is lethal to a creature. With trample, you only need to assign <span class="teal">lethal damage</span> to blockers before trampling over.</p><br>
            <p>Result: you assign just <strong>1 damage</strong> to each blocker (that's lethal because of deathtouch), and the remaining power tramples to the player.</p>`,
            rule: '702.19b + 702.2b', related: ['trample','deathtouch','first strike']
        },
        'first strike+deathtouch': {
            tag: 'yes', tagLabel: 'Deadly Combo',
            title: 'First Strike + Deathtouch',
            body: `<p>In the first strike damage step, this creature deals damage — and because of deathtouch, <strong>even 1 damage kills any creature</strong>. The blocked creature is dead before it ever deals damage back.</p>`,
            rule: '702.7b + 702.2b', related: ['first strike','deathtouch','double strike']
        },
        'lifelink+double strike': {
            tag: 'yes', tagLabel: 'Strong Synergy',
            title: 'Lifelink + Double Strike',
            body: `<p>Double strike deals damage in two separate steps. Lifelink gains you life equal to damage dealt.</p><br>
            <p>Result: <strong>you gain life twice</strong> — once in the first strike step and once in the regular damage step.</p>`,
            rule: '702.8b + 702.15b', related: ['double strike','lifelink']
        },
        'hexproof+indestructible': {
            tag: 'info', tagLabel: 'Strong Defense',
            title: 'Hexproof + Indestructible',
            body: `<p>Together these cover almost every removal method:</p><br>
            <p>• <span class="teal">Hexproof</span> stops targeted spells and abilities from opponents</p>
            <p>• <span class="teal">Indestructible</span> stops destruction effects and lethal damage</p><br>
            <p>What still works: <strong>exile</strong>, <strong>sacrifice effects</strong>, <strong>toughness reduction to 0</strong>, non-targeting board effects.</p>`,
            rule: '702.11c + 702.12b', related: ['hexproof','indestructible','exile','sacrifice']
        }
    };
    const k1 = `${a}+${b}`, k2 = `${b}+${a}`;
    const data = known[k1] || known[k2];
    if (!data) return null;
    return { type: 'semantic', data };
}

// ═══════════════════════════════════════════════════════════════════════
// ANALYZE INPUT
// ═══════════════════════════════════════════════════════════════════════
function analyzeInput(text, context) {
    const lower = text.toLowerCase().trim();
    const foundKws = Object.keys(window.KEYWORDS)
        .filter(k => matchKw(k, lower))
        .sort((a, b) => b.length - a.length);

    if (foundKws.length >= 2) {
        const interaction = getKnownInteraction(foundKws[0], foundKws[1]);
        if (interaction) return interaction;
        return { type: 'multi_keyword', keywords: foundKws };
    }
    if (foundKws.length === 1) {
        return { type: 'keyword', keyword: foundKws[0], context };
    }
    return { type: 'card', text };
}

// RENDER HELPERS

function renderVerdict(tagType, statement, reason) {
    const icons = { yes: '✓', no: '✗', depends: '⚠', info: 'ℹ' };
    return `<div class="verdict-banner ${tagType || 'info'}">
        <div class="verdict-icon">${icons[tagType] || 'ℹ'}</div>
        <div class="verdict-text">
            <div class="verdict-statement">${statement}</div>
            ${reason ? `<div class="verdict-reason">${reason}</div>` : ''}
        </div>
    </div>`;
}

function renderOfficialRuling(ruleRef, category) {
    return `<div style="margin-top:18px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.04);">
        <div style="font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:#333;margin-bottom:6px;">Official Ruling</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#333;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);border-radius:5px;padding:6px 10px;display:inline-block;">
            ${category ? `<span style="color:#3d3d55;margin-right:8px;">${category}</span>` : ''}CR ${ruleRef}

}

function renderKeywordRuling(kw, d) {
    if (!d) return `<div class="detail-prose">No data found for <strong>${kw}</strong>.</div>`;
    const plainText = d.plain.replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim();
    const firstLine = plainText.split(/\.\s/)[0].replace(/\.$/, '');
    const nuancesHtml = (d.nuances || []).map(n =>
        `<div class="kw-nuance">• ${n}</div>`
    ).join('');
    const relatedChips = (d.related || []).filter(r => window.KEYWORDS[r]).map(r =>
        `<span class="kw-chip" onclick="quickLookup('${r}')">${r}</span>`
    ).join('');
    return `<div>
        ${renderVerdict('info', capitalize(kw), firstLine)}

        <div class="detail-prose">${d.plain}</div>

function renderSemanticAnswer(d) {
    if (d.compareMode) {
        return `<div>
            ${renderVerdict('info', d.title, '')}
            <div class="compare-grid">
                <div class="compare-col"><h4>${d.labelA}</h4><ul>${(d.colA||[]).map(i=>`<li>${i}</li>`).join('')}</ul></div>
                <div class="compare-col"><h4>${d.labelB}</h4><ul>${(d.colB||[]).map(i=>`<li>${i}</li>`).join('')}</ul></div>
            </div>
            ${d.verdict ? `<div class="compare-verdict">${d.verdict}</div>` : ''}
            ${renderOfficialRuling(d.rule || 'Various')}
        </div>`;
    }
    const verdictStatement = d.title || d.tagLabel || 'Ruling';
    const nuanceHtml = d.nuance ? `<div class="kw-card" style="margin-top:12px;">
        <div class="kw-card-name">${d.nuance.title}</div>
        <div class="detail-prose">${d.nuance.text}</div>
    </div>` : '';

        <div class="example-label">📖 Example</div>
        <div class="example-text">${d.example}</div>
    </div>` : '';
    const relatedChips = (d.related || []).filter(r => window.KEYWORDS[r]).map(r =>
        `<span class="kw-chip" onclick="quickLookup('${r}')">${r}</span>`
    ).join('');
    return `<div>
        ${renderVerdict(d.tag || 'info', verdictStatement, d.tagLabel !== d.title ? (d.tagLabel || '') : '')}

        ${renderOfficialRuling(d.rule || 'Various')}

function renderMultiKeyword(kwList) {
    const kwNames = kwList.slice(0,2).map(k => capitalize(k)).join(' + ');
    const items = kwList.slice(0,4).map(kw => {
        const d = window.KEYWORDS[kw];
        if (!d) return '';
        const plain = d.plain.replace(/<[^>]+>/g,'').split(/\.\s/)[0];
        return `<div class="multi-kw-item">
            <h3>${kw.toUpperCase()}</h3>
            <div class="ref">${d.category} · CR ${d.rule}</div>
            <p>${plain}.</p>
        </div>`;
    }).join('');
    return `<div>
        ${renderVerdict('info', kwNames, 'Multiple keywords detected')}
        ${items}
    </div>`;
}

function renderRuling(data) {
    if (!data) return null;
    if (data.type === 'keyword') return renderKeywordRuling(data.keyword, window.KEYWORDS[data.keyword]);
    if (data.type === 'multi_keyword') return renderMultiKeyword(data.keywords);
    if (data.type === 'semantic') return renderSemanticAnswer(data.data);
    return null;
}

// SHOW RULING — main entry point for displaying a ruling
// ═══════════════════════════════════════════════════════════════════════
function showRuling(bodyHtml, analysis, disputeOpts) {
    const overlay  = document.getElementById('ruling-overlay');
    const badgeEl  = document.getElementById('bubble-badge');
    const levelEl  = document.getElementById('bubble-level');
    const verdictEl = document.getElementById('bubble-verdict');
    const analogyEl = document.getElementById('bubble-analogy');
    const actionEl  = document.getElementById('bubble-action');
    const detailsEl = document.getElementById('ruling-details-inner');

    const isDispute   = disputeOpts?.isDispute   || false;
    const isCorrection = disputeOpts?.isCorrection || false;

    // ── Badge ──
    if (isDispute) {
        badgeEl.innerHTML = '<div class="dispute-badge">⚑ Dispute Detected</div>';
    } else if (isCorrection) {
        badgeEl.innerHTML = '<div class="dispute-badge" style="background:rgba(255,230,109,0.08);border-color:rgba(255,230,109,0.28);color:rgba(255,230,109,0.8);">⚠ Correction</div>';
    } else {
        badgeEl.innerHTML = '';
    }

    // ── Experience level badge ──
    if (analysis && analysis.type === 'keyword') {
        const d = window.KEYWORDS[analysis.keyword];
        const lvl = d?.experienceLevel || 'basic';
        levelEl.innerHTML = `<span class="level-badge ${lvl}" style="margin-bottom:8px;display:inline-block;">${lvl}</span>`;
    } else {
        levelEl.innerHTML = '';
    }

    // ── Verdict text (uses tableTalk) ──
    verdictEl.innerHTML = buildVerdict(analysis);

    // ── Analogy pill ──
    if (analysis && analysis.type === 'keyword') {
        const d = window.KEYWORDS[analysis.keyword];
        if (d?.analogy) {
            analogyEl.innerHTML = `<div class="analogy-pill">
                <span class="analogy-icon">💡</span>
                <span class="analogy-text">${d.analogy}</span>
            </div>`;
        } else { analogyEl.innerHTML = ''; }
    } else { analogyEl.innerHTML = ''; }

    // ── Action pill ──
    if (analysis && analysis.type === 'keyword') {
        const d = window.KEYWORDS[analysis.keyword];
        const ctx = analysis.context || null;
        let actionText = '';
        if      (ctx === 'attacking'  && d?.whenAttacking)   actionText = d.whenAttacking;
        else if (ctx === 'blocking'   && d?.whenBlocking)    actionText = d.whenBlocking;
        else if (ctx === 'deathtouch' && d?.withDeathtouch)  actionText = d.withDeathtouch;
        else if (d?.whatToDo)                                 actionText = d.whatToDo;

        if (actionText) {
            actionEl.innerHTML = `<div class="action-pill">
                <span class="action-label">▶ Do This</span>
                <span class="action-text">${actionText}</span>
            </div>`;
        } else { actionEl.innerHTML = ''; }
    } else { actionEl.innerHTML = ''; }

    // ── Details section (three-layer) ──
    if (analysis && analysis.type && analysis.type !== 'card') {
        detailsEl.innerHTML = buildDetailsHtml(analysis, isDispute);
    } else {
        // Card lookup or raw HTML
        detailsEl.innerHTML = bodyHtml || '';
    }

    overlay.scrollTop = 0;
    overlay.classList.add('show');

    // History
    if (analysis && analysis.type && analysis.type !== 'card') {
        lastRuling = { html: bodyHtml, analysis };
        const label = analysis.keyword
            || (analysis.keywords && analysis.keywords.slice(0,2).join('+'))
            || (analysis.data?.title)
            || 'Ruling';
        rulingHistory.unshift({ html: bodyHtml, analysis, label, time: Date.now() });
        if (rulingHistory.length > 5) rulingHistory.pop();
        renderHistoryPanel();
    }
}

function closeRuling() {
    document.getElementById('ruling-overlay').classList.remove('show');
    document.getElementById('ruling-overlay').scrollTop = 0;
}

function renderHistoryPanel() {
    const panel = document.getElementById('history-panel');
    if (!panel) return;
    if (rulingHistory.length === 0) { panel.classList.remove('visible'); return; }
    panel.classList.add('visible');
    panel.innerHTML = rulingHistory.map((r, i) => {
        const mins = Math.floor((Date.now() - r.time) / 60000);
        const timeStr = mins < 1 ? 'now' : `${mins}m`;
        return `<div class="history-item" onclick="showHistoryRuling(${i})">
            <span class="h-label">${r.label}</span>
            <span class="h-time">${timeStr}</span>
        </div>`;
    }).join('');
}

function showHistoryRuling(i) {
    const r = rulingHistory[i];
    if (r) showRuling(r.html, r.analysis);
}

function quickLookup(kw) {
    const d = window.KEYWORDS[kw];
    if (!d) return;
    const analysis = { type: 'keyword', keyword: kw, context: null };
    showRuling('', analysis);
    speak(`${kw}. ${(d.tableTalk || d.plain.replace(/<[^>]+>/g,'')).slice(0,200)}`);
}

    } catch(e) {

// ═══════════════════════════════════════════════════════════════════════
// CONTRADICTION DETECTOR
// ═══════════════════════════════════════════════════════════════════════
const CONTRADICTION_PATTERNS = [
    /\bno[,]? it (does|doesn'?t|did|didn'?t|can|can'?t|is|isn'?t)\b/i,
    /\byes[,]? it (does|doesn'?t|did|didn'?t|can|can'?t|is|isn'?t)\b/i,
    /\bthat'?s? not how (it|that) works?\b/i,
    /\bit (doesn'?t|does not) work like that\b/i,
    /\byou'?re? (wrong|incorrect)\b/i,
    /\bthat'?s? (wrong|incorrect|not right|not true)\b/i,
    /\bthat'?s? not what (the rule|the card|it) (says?|does|means?)\b/i,
    /\byou can'?t (block|tap|sacrifice|target|cast|equip|trigger|attack|respond|do that)\b/i,
    /\bcan'?t target\b/i,
    /\bactually (no|you can'?t|that'?s?)\b/i,
    /\bthat (doesn'?t|does not) trigger\b/i,
    /\bit (doesn'?t|does not) trigger\b/i,
    /\bstate.?based\b/i,
    /\byou can'?t respond to that\b/i,
    /\byou missed (your )?priority\b/i,
    /\bpriority doesn'?t work like that\b/i,
    /\bthat'?s? already on (the )?stack\b/i,
    /\bthat resolves (before|after|first)\b/i,
    /\bthat doesn'?t resolve\b/i,
    /\byou can'?t (counter|stack|play) that\b/i,
    /\bthat'?s? not a (triggered|activated|static) ability\b/i,
    /\bthat'?s? a (triggered|activated|static) ability\b/i,
    /\bask veritas\b/i,
    /\bcheck the ruling\b/i,
    /\bread the card\b/i,
    /\bveritas\b/i
];

function checkForContradiction(text) {
    if (text.trim().split(/\s+/).length < 2) return false;
    return CONTRADICTION_PATTERNS.some(p => p.test(text));
}

function resolveContradictionTopic(text) {
    const lower = text.toLowerCase();

    // 1. Keywords explicitly named in this sentence — highest confidence
    const inSentence = Object.keys(window.KEYWORDS)
        .filter(k => matchKw(k, lower))
        .sort((a, b) => b.length - a.length);

    if (inSentence.length >= 2) {
        const interaction = getKnownInteraction(inSentence[0], inSentence[1]);
        if (interaction) return interaction;
        return { type: 'multi_keyword', keywords: inSentence };
    }
    if (inSentence.length === 1) {
        return { type: 'keyword', keyword: inSentence[0], context: detectContext(lower) };
    }

    // 2. Look only at the single most recent utterance before this one
    //    (i.e. what was JUST being discussed, not the whole session history)
    const immediate = getImmediateContextKeyword();
    if (immediate) return immediate;

    // 3. Last ruling shown — but only if it was a keyword/semantic, not a card
    if (lastRuling?.analysis?.type === 'keyword') return lastRuling.analysis;
    if (lastRuling?.analysis?.type === 'semantic') return lastRuling.analysis;
    if (lastRuling?.analysis?.type === 'multi_keyword') return lastRuling.analysis;

    return null;
}

// ═══════════════════════════════════════════════════════════════════════
// CONVERSATION BUFFER
// ═══════════════════════════════════════════════════════════════════════
const conversationBuffer = [];
const BUFFER_SIZE = 10;

function bufferAdd(text) {
    const lower = text.toLowerCase();
    const foundKws = Object.keys(window.KEYWORDS)
        .filter(k => matchKw(k, lower))
        .sort((a,b) => lower.indexOf(a) - lower.indexOf(b));
    conversationBuffer.push({ text, lower, keywords: foundKws, timestamp: Date.now() });
    if (conversationBuffer.length > BUFFER_SIZE) conversationBuffer.shift();
}

function recentKeywordsFromBuffer(lookback) {
    const recent = conversationBuffer.slice(-lookback).reverse();
    const seen = new Set(), kws = [];
    for (const u of recent) {
        for (const kw of u.keywords) {
            if (!seen.has(kw)) { seen.add(kw); kws.push(kw); }
        }
    }
    return kws;
}

// Returns true if the sentence is a pronoun-only reference with no named subject
// e.g. "can it target?", "does that work?", "is it blocked?"
// These need context from the immediately prior utterance to make sense
function isPronounReference(text) {
    const lower = text.toLowerCase().trim();
    // Must contain a pronoun standing in for a subject AND no keyword of its own
    const pronounPatterns = [
        /^(can|does|is|will|would|could) (it|that|this)\b/i,
        /\b(it|that|this) (work|trigger|apply|count|stack|matter|still)\b/i,
        /^(what does|how does) (it|that|this)\b/i,
        /\b(it|that|this) (can'?t?|doesn'?t?|won'?t?|isn'?t?)\b/i,
        /^so (it|that|this)\b/i,
        /\bright\?$/i,
        /\bcorrect\?$/i,
    ];
    const hasPronoun = pronounPatterns.some(p => p.test(lower));
    if (!hasPronoun) return false;
    // Confirm there's no explicit keyword in this sentence
    const hasOwnKw = Object.keys(window.KEYWORDS).some(k => matchKw(k, lower));
    return !hasOwnKw;
}

// Look ONLY at the single utterance immediately before the current one
// Returns an analysis object if that utterance contained keywords, else null
function getImmediateContextKeyword() {
    // conversationBuffer[-1] is the one just added (current), [-2] is the prior
    if (conversationBuffer.length < 2) return null;
    const prior = conversationBuffer[conversationBuffer.length - 2];
    if (!prior || prior.keywords.length === 0) return null;

    const kws = prior.keywords;
    if (kws.length >= 2) {
        const interaction = getKnownInteraction(kws[0], kws[1]);
        if (interaction) return interaction;
        return { type: 'multi_keyword', keywords: kws };
    }
    return { type: 'keyword', keyword: kws[0], context: detectContext(prior.lower) };
}
