<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veritas — Game Session</title>
    <script>
    // ═══════════════════════════════════════════════════════════════
    // KEYWORDS GUARD — inline fallback if keywords.js fails to load
    // ═══════════════════════════════════════════════════════════════
    function ensureKeywordsLoaded() {
        if (window.KEYWORDS && Object.keys(window.KEYWORDS).length > 0) return true;
        console.warn('[Veritas] keywords.js not loaded — using built-in fallback database.');
        window.KEYWORDS = KEYWORDS_FALLBACK;
        return false;
    }
    </script>
    <!-- Load external keyword database if it exists -->
    <script src="keywords.js" onerror="console.warn('[Veritas] keywords.js not found, using fallback')"></script>
    <style>
        :root {
            --bg: #060609;
            --bg2: #0a0a10;
            --accent: #00a7b5;
            --accent-dim: rgba(0,167,181,0.15);
            --accent-glow: rgba(0,167,181,0.25);
            --danger: #ff6b6b;
            --warning: #ffe66d;
            --success: #4ecdc4;
            --text: #e0e0e0;
            --text-dim: rgba(255,255,255,0.25);
            --border: rgba(0,167,181,0.12);
            --border-mid: rgba(0,167,181,0.25);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh; width: 100vw;
        }

        /* ═══ TABLET ACCEPTANCE SCREEN ═══ */
        #tablet-accept {
            position: fixed; inset: 0;
            background: #07070d;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 2000; gap: 0;
        }
        #tablet-accept.hidden { display: none; }

        .accept-orb {
            position: relative;
            width: 120px; height: 120px;
            margin-bottom: 36px;
        }
        .accept-orb-ring {
            position: absolute; inset: 0;
            border-radius: 50%;
            border: 1px solid rgba(0,167,181,0.2);
            animation: orbRing 8s infinite linear;
        }
        .accept-orb-ring:nth-child(2) {
            inset: 10px;
            border-color: rgba(0,167,181,0.12);
            animation-duration: 12s; animation-direction: reverse;
        }
        .accept-orb-core {
            position: absolute; inset: 28px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 35%, rgba(0,167,181,0.15) 0%, transparent 100%);
            border: 1px solid rgba(0,167,181,0.25);
            animation: orbBreath 4s ease-in-out infinite;
        }
        .accept-title {
            font-size: 13px; letter-spacing: 8px; text-transform: uppercase;
            color: rgba(0,167,181,0.5); margin-bottom: 10px; font-weight: 300;
        }
        .accept-subtitle {
            font-size: 15px; color: rgba(255,255,255,0.25);
            margin-bottom: 48px; letter-spacing: 1px;
            max-width: 320px; text-align: center; line-height: 1.7;
        }
        .accept-btn {
            background: transparent;
            border: 1px solid rgba(0,167,181,0.4);
            color: rgba(0,167,181,0.8);
            padding: 16px 48px; border-radius: 40px;
            font-size: 13px; text-transform: uppercase;
            letter-spacing: 3px; cursor: pointer;
            transition: all 0.3s; font-family: inherit;
        }
        .accept-btn:hover {
            background: rgba(0,167,181,0.08);
            border-color: var(--accent); color: var(--accent);
            box-shadow: 0 0 24px rgba(0,167,181,0.2);
        }
        .accept-hint {
            margin-top: 20px;
            font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
            color: rgba(255,255,255,0.1);
        }

        /* ═══ AMBIENT CANVAS ═══ */
        #ambient-canvas {
            position: fixed; inset: 0;
            z-index: 0; pointer-events: none;
        }

        /* ═══ STATUS BAR ═══ */
        .status-bar {
            position: fixed; top: 0; left: 0; right: 0; height: 52px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px;
            background: rgba(6,6,9,0.7);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
            z-index: 200;
        }
        .timer {
            font-family: 'Courier New', monospace;
            font-size: 17px; font-weight: 600;
            color: rgba(0,167,181,0.6);
            letter-spacing: 2px;
        }
        .dispute-counter {
            font-size: 12px; font-weight: 600;
            color: rgba(255,107,107,0.5);
            letter-spacing: 1px; text-transform: uppercase;
        }
        .dispute-counter.has-disputes { color: var(--danger); }
        .status-bar-right { display: flex; align-items: center; gap: 16px; }
        .end-session-btn {
            background: transparent;
            border: 1px solid rgba(0,167,181,0.25); color: rgba(0,167,181,0.5);
            padding: 6px 16px; border-radius: 20px;
            font-size: 11px; text-transform: uppercase;
            letter-spacing: 2px; cursor: pointer; transition: all 0.3s;
        }
        .end-session-btn:hover {
            border-color: var(--accent); color: var(--accent);
            box-shadow: 0 0 12px rgba(0,167,181,0.2);
        }

        /* ═══ STANDBY SCREEN ═══ */
        #standby-screen {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 1;
        }

        /* ── ORB ── */
        .veritas-orb {
            position: relative;
            width: 160px; height: 160px;
            margin-bottom: 48px;
        }
        .orb-ring {
            position: absolute; inset: 0;
            border-radius: 50%;
            border: 1px solid rgba(0,167,181,0.15);
            animation: orbRing 8s infinite linear;
        }
        .orb-ring:nth-child(2) {
            top: 12px; left: 12px; right: 12px; bottom: 12px;
            border-color: rgba(0,167,181,0.1);
            animation-duration: 12s; animation-direction: reverse;
        }
        .orb-ring:nth-child(3) {
            top: 24px; left: 24px; right: 24px; bottom: 24px;
            border-color: rgba(0,167,181,0.08);
            animation-duration: 6s;
        }
        @keyframes orbRing {
            from { transform: rotate(0deg) scaleX(1); }
            50%  { transform: rotate(180deg) scaleX(0.85); }
            to   { transform: rotate(360deg) scaleX(1); }
        }
        .orb-core {
            position: absolute;
            top: 36px; left: 36px; right: 36px; bottom: 36px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 35%,
                rgba(0,167,181,0.18) 0%, rgba(0,80,90,0.08) 50%, transparent 100%);
            border: 1px solid rgba(0,167,181,0.2);
            animation: orbBreath 6s ease-in-out infinite;
        }
        @keyframes orbBreath {
            0%,100% { opacity: 0.6; transform: scale(1); }
            50%      { opacity: 1;   transform: scale(1.04); }
        }
        .orb-dot {
            position: absolute; top: 50%; left: 50%;
            width: 6px; height: 6px; border-radius: 50%;
            background: rgba(0,167,181,0.5);
            transform: translate(-50%, -50%);
            animation: dotPulse 6s ease-in-out infinite;
        }
        @keyframes dotPulse {
            0%,100% { opacity: 0.3; box-shadow: 0 0 0 0 rgba(0,167,181,0); }
            50%      { opacity: 0.9; box-shadow: 0 0 0 8px rgba(0,167,181,0); }
        }

        /* ORB STATES */
        .veritas-orb.state-listening .orb-ring  { border-color: rgba(0,167,181,0.15); animation-play-state: running; }
        .veritas-orb.state-listening .orb-core  { border-color: rgba(0,167,181,0.2); }
        .veritas-orb.state-listening .orb-dot   { background: rgba(0,167,181,0.5); }
        .veritas-orb.state-reconnecting .orb-ring { border-color: rgba(255,180,0,0.2); animation-duration: 16s !important; }
        .veritas-orb.state-reconnecting .orb-core  { border-color: rgba(255,180,0,0.25); background: radial-gradient(circle at 40% 35%, rgba(255,180,0,0.12) 0%, transparent 100%); }
        .veritas-orb.state-reconnecting .orb-dot   { background: rgba(255,180,0,0.6); }
        .veritas-orb.state-dead .orb-ring { border-color: rgba(255,107,107,0.2); animation-play-state: paused; }
        .veritas-orb.state-dead .orb-core  { border-color: rgba(255,107,107,0.25); background: radial-gradient(circle at 40% 35%, rgba(255,107,107,0.1) 0%, transparent 100%); }
        .veritas-orb.state-dead .orb-dot   { background: rgba(255,107,107,0.5); }
        .veritas-orb.state-paused .orb-ring { border-color: rgba(255,255,255,0.05); animation-duration: 24s !important; }
        .veritas-orb.state-paused .orb-core  { border-color: rgba(255,255,255,0.06); background: none; }
        .veritas-orb.state-paused .orb-dot   { background: rgba(255,255,255,0.15); }

        .veritas-wordmark {
            font-size: 11px; letter-spacing: 8px; text-transform: uppercase;
            color: rgba(0,167,181,0.3); margin-bottom: 12px; font-weight: 300;
        }
        .standby-label {
            font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
            color: rgba(255,255,255,0.1);
            animation: labelFade 4s ease-in-out infinite;
        }
        @keyframes labelFade {
            0%,100% { opacity: 0.4; }
            50%      { opacity: 0.8; }
        }

        /* ═══ CONTROLS STRIP ═══ */
        .controls-strip {
            position: fixed; bottom: 0; left: 0; right: 0; height: 52px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            background: rgba(6,6,9,0.6);
            border-top: 1px solid rgba(255,255,255,0.04);
            backdrop-filter: blur(12px); z-index: 200;
        }
        .ctrl-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.07); color: rgba(255,255,255,0.3);
            padding: 6px 14px; border-radius: 16px;
            font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; transition: all 0.25s;
        }
        .ctrl-btn:hover { border-color: rgba(0,167,181,0.4); color: rgba(0,167,181,0.8); }

        /* ═══ WAKE FLASH ═══ */
        #wake-flash {
            position: fixed; inset: 0; z-index: 999;
            background: rgba(0,167,181,0.12);
            pointer-events: none; opacity: 0;
        }
        @keyframes wakeFlashAnim {
            0%   { opacity: 0.9; }
            100% { opacity: 0; }
        }
        #wake-flash.fire { animation: wakeFlashAnim 0.4s ease-out forwards; }

        /* ═══ RULING OVERLAY ═══ */
        .ruling-overlay {
            position: fixed; inset: 0;
            background: #07070d;
            display: none; flex-direction: column;
            z-index: 1000; overflow-y: auto; overflow-x: hidden;
        }
        .ruling-overlay.show { display: flex; }

        @keyframes rulingAppear {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Judge Stage ── */
        .judge-stage {
            position: relative; width: 100%; min-height: 52vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: flex-end;
            padding-bottom: 0; flex-shrink: 0;
            animation: rulingAppear 0.4s cubic-bezier(0.22,1,0.36,1);
        }
        .judge-stage::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(ellipse 60% 50% at 50% 80%, rgba(0,167,181,0.08) 0%, transparent 70%);
            pointer-events: none;
        }
        .judge-figure { position: relative; width: 160px; height: 260px; margin-bottom: 0; }
        .judge-head {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 62px; height: 70px;
            background: radial-gradient(ellipse at 50% 40%, rgba(0,167,181,0.07) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50% 50% 40% 40%;
            border: 1px solid rgba(0,167,181,0.18);
        }
        .judge-head::after {
            content: ''; position: absolute;
            top: 22px; left: 12px; right: 12px; bottom: 10px;
            background: rgba(0,0,0,0.85); border-radius: 50%;
        }
        .judge-eyes {
            position: absolute; top: 34px; left: 50%; transform: translateX(-50%);
            width: 30px; height: 5px;
            display: flex; justify-content: space-between; z-index: 2;
        }
        .judge-eyes::before, .judge-eyes::after {
            content: ''; width: 7px; height: 3px; border-radius: 50%;
            background: rgba(0,167,181,0.6);
            box-shadow: 0 0 8px rgba(0,167,181,0.8);
            animation: eyeGlow 4s ease-in-out infinite;
        }
        @keyframes eyeGlow {
            0%,100% { opacity: 0.5; }
            50%      { opacity: 1; }
        }
        .judge-cloak {
            position: absolute; top: 56px; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, rgba(10,10,20,0.95) 0%, rgba(5,5,12,0.98) 60%, rgba(0,167,181,0.04) 100%);
            border-radius: 20px 20px 40% 40%;
            border: 1px solid rgba(0,167,181,0.12); border-top: none;
        }
        .judge-cloak::before {
            content: ''; position: absolute;
            top: 10px; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 1px;
            background: linear-gradient(180deg, rgba(0,167,181,0.1) 0%, transparent 100%);
        }
        .judge-cloak::after {
            content: ''; position: absolute;
            bottom: 0; left: 20%; right: 20%; height: 1px;
            background: rgba(0,167,181,0.2); border-radius: 50%;
        }

        /* ── Speech Bubble ── */
        .judge-bubble {
            position: relative;
            background: rgba(10,12,24,0.97);
            border: 1px solid rgba(0,167,181,0.3);
            border-radius: 18px; padding: 22px 28px;
            margin: 0 24px; max-width: 680px; width: calc(100% - 48px);
            box-shadow: 0 0 40px rgba(0,167,181,0.08);
            animation: bubbleIn 0.35s 0.15s cubic-bezier(0.22,1,0.36,1) both;
        }
        @keyframes bubbleIn {
            from { opacity: 0; transform: translateY(12px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        .judge-bubble::before {
            content: ''; position: absolute;
            top: -10px; left: 50%; transform: translateX(-50%);
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 10px solid rgba(0,167,181,0.3);
        }
        .judge-bubble::after {
            content: ''; position: absolute;
            top: -8px; left: 50%; transform: translateX(-50%);
            border-left: 9px solid transparent;
            border-right: 9px solid transparent;
            border-bottom: 9px solid rgba(10,12,24,0.97);
        }
        .bubble-dispute-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.3);
            color: #ff8080; font-size: 10px; font-weight: 700;
            letter-spacing: 1.5px; text-transform: uppercase;
            padding: 3px 10px; border-radius: 20px; margin-bottom: 12px;
        }
        .bubble-verdict {
            font-size: 17px; line-height: 1.65; color: #e8e8f0; font-weight: 400;
        }
        .bubble-verdict strong { color: #fff; font-weight: 600; }
        .bubble-verdict .teal  { color: var(--success); }
        .bubble-verdict .gold  { color: var(--warning); }
        .bubble-verdict .red   { color: #ff8080; }
        .bubble-analogy {
            margin-top: 12px; padding-top: 12px;
            border-top: 1px solid rgba(0,167,181,0.1);
            font-size: 13px; color: rgba(0,167,181,0.5);
            font-style: italic; line-height: 1.5;
        }

        /* Scroll hint */
        .scroll-hint {
            display: flex; flex-direction: column; align-items: center;
            gap: 6px; padding: 18px 0 10px; color: rgba(0,167,181,0.3);
            font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
            animation: hintBob 2s ease-in-out infinite; flex-shrink: 0;
        }
        @keyframes hintBob {
            0%,100% { transform: translateY(0); opacity: 0.4; }
            50%      { transform: translateY(4px); opacity: 0.7; }
        }
        .scroll-hint svg { width: 16px; height: 16px; }

        /* ── Details Section ── */
        .ruling-details {
            background: rgba(0,0,0,0.5);
            border-top: 1px solid rgba(0,167,181,0.1);
            padding: 32px 24px 100px; flex-shrink: 0;
            animation: rulingAppear 0.3s 0.3s both;
        }
        .ruling-details-inner { max-width: 680px; margin: 0 auto; }

        .details-section { margin-bottom: 28px; }
        .details-section-label {
            font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
            color: rgba(0,167,181,0.4); font-weight: 700; margin-bottom: 12px;
            padding-bottom: 8px; border-bottom: 1px solid rgba(0,167,181,0.08);
        }

        /* Interpretation cards */
        .interp-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px; padding: 16px 18px; margin-bottom: 10px;
        }
        .interp-card.danger-card {
            background: rgba(255,107,107,0.05);
            border-color: rgba(255,107,107,0.2);
        }
        .interp-card.success-card {
            background: rgba(78,205,196,0.05);
            border-color: rgba(78,205,196,0.2);
        }
        .interp-card-label {
            font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
            font-weight: 700; margin-bottom: 8px;
        }
        .interp-card.danger-card .interp-card-label { color: rgba(255,107,107,0.6); }
        .interp-card.success-card .interp-card-label { color: rgba(78,205,196,0.6); }
        .interp-card .interp-card-label { color: rgba(0,167,181,0.5); }
        .interp-card-text { font-size: 14px; color: #bbb; line-height: 1.65; }
        .interp-card.danger-card .interp-card-text { color: #cc9090; }
        .interp-card.success-card .interp-card-text { color: #90c8c5; }

        /* Keyword detail card */
        .kw-detail-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px; padding: 18px 20px; margin-bottom: 12px;
        }
        .kw-detail-name {
            font-size: 13px; font-weight: 700; letter-spacing: 1px;
            text-transform: uppercase; color: var(--accent); margin-bottom: 6px;
        }
        .kw-detail-rule { font-size: 14px; line-height: 1.7; color: #bbb; margin-bottom: 10px; }
        .kw-detail-nuances { margin-top: 8px; }
        .kw-detail-nuance {
            font-size: 12px; color: #666; line-height: 1.6;
            padding-left: 12px; border-left: 2px solid rgba(0,167,181,0.2);
            margin-bottom: 6px;
        }
        .kw-detail-ref { font-family: monospace; font-size: 10px; color: rgba(0,167,181,0.3); margin-top: 8px; }

        /* Summary box */
        .ruling-summary-box {
            background: rgba(0,167,181,0.04);
            border: 1px solid rgba(0,167,181,0.15);
            border-radius: 12px; padding: 18px 20px;
        }
        .ruling-summary-box p { font-size: 14px; line-height: 1.75; color: #999; }
        .ruling-summary-box strong { color: #ccc; }

        /* CR footer */
        .official-ruling {
            margin-top: 18px; padding-top: 14px;
            border-top: 1px solid rgba(255,255,255,0.04);
        }
        .official-ruling-label {
            font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px;
            color: #333; font-weight: 600; margin-bottom: 6px;
        }
        .official-ruling-ref {
            font-family: monospace; font-size: 11px; color: #2d2d2d;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 5px; padding: 6px 10px; display: inline-block;
        }

        /* Close btn */
        .close-btn {
            position: fixed; top: 16px; right: 18px;
            background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.3); font-size: 18px; cursor: pointer;
            width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; z-index: 1010; backdrop-filter: blur(8px);
        }
        .close-btn:hover { border-color: var(--accent); color: var(--accent); }

        /* ── Ruling body legacy styles ── */
        .ruling-keyword-badge {
            display: inline-block; background: rgba(0,167,181,0.12);
            border: 1px solid rgba(0,167,181,0.3); color: var(--accent);
            font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
            padding: 3px 10px; border-radius: 20px; margin-bottom: 12px;
        }
        .ruling-title { font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 6px; }
        .ruling-plain { font-size: 16px; line-height: 1.8; color: #ccc; margin-bottom: 22px; }
        .ruling-plain strong { color: #fff; }
        .ruling-example-box {
            background: rgba(255,230,109,0.05);
            border-left: 3px solid rgba(255,230,109,0.4);
            padding: 14px 18px; border-radius: 0 10px 10px 0; margin-bottom: 18px;
        }
        .ruling-example-box .ex-label {
            color: rgba(255,230,109,0.7); font-size: 11px; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 6px; font-weight: 600;
        }
        .ruling-example-box p { font-size: 14px; line-height: 1.6; color: #bbb; }
        .ruling-also { margin-top: 16px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.05); }
        .ruling-also-label { font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .keyword-chips { display: flex; flex-wrap: wrap; gap: 7px; }
        .keyword-chip {
            background: rgba(0,167,181,0.06); border: 1px solid rgba(0,167,181,0.2);
            color: rgba(78,205,196,0.8); padding: 4px 12px; border-radius: 20px;
            font-size: 11px; cursor: pointer; transition: all 0.2s;
        }
        .keyword-chip:hover { background: rgba(0,167,181,0.15); color: var(--success); }
        .ruling-answer-tag {
            display: inline-block; padding: 4px 14px; border-radius: 20px;
            font-size: 11px; font-weight: 700; letter-spacing: 1px;
            text-transform: uppercase; margin-bottom: 14px;
        }
        .ruling-answer-tag.yes     { background: rgba(78,205,196,0.15);  color: var(--success); border: 1px solid rgba(78,205,196,0.4); }
        .ruling-answer-tag.no      { background: rgba(255,107,107,0.15); color: var(--danger);  border: 1px solid rgba(255,107,107,0.4); }
        .ruling-answer-tag.depends { background: rgba(255,230,109,0.1);  color: var(--warning); border: 1px solid rgba(255,230,109,0.35); }
        .ruling-answer-tag.info    { background: rgba(0,167,181,0.12);   color: var(--accent);  border: 1px solid rgba(0,167,181,0.3); }
        .ruling-answer-body { font-size: 15px; line-height: 1.8; color: #ccc; margin-bottom: 20px; }
        .ruling-answer-body .highlight { color: #fff; font-weight: 600; }
        .ruling-answer-body .teal { color: var(--success); }
        .ruling-answer-body .gold { color: var(--warning); }
        .ruling-answer-body .red  { color: #ff8080; }
        .ruling-nuance {
            background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px; padding: 14px 16px;
            font-size: 13px; color: #888; line-height: 1.6; margin-bottom: 14px;
        }
        .ruling-nuance .nuance-title {
            color: var(--accent); font-size: 10px; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 5px; font-weight: 600;
        }
        .card-ruling-grid { display: grid; grid-template-columns: 220px 1fr; gap: 24px; align-items: start; }
        .card-img-wrap { background: rgba(0,0,0,0.4); border-radius: 12px; padding: 12px; text-align: center; }
        .card-image { max-width: 100%; border-radius: 8px; box-shadow: 0 8px 28px rgba(0,0,0,0.6); }
        .card-details h2 { color: var(--accent); font-size: 22px; margin-bottom: 4px; }
        .card-type { color: #666; font-style: italic; margin-bottom: 14px; font-size: 13px; }
        .oracle-box {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
            padding: 14px; border-radius: 8px; margin-bottom: 14px;
            line-height: 1.65; font-size: 14px; white-space: pre-wrap;
        }
        .rulings-box { background: rgba(0,167,181,0.03); padding: 14px; border-radius: 8px; }
        .rulings-box h4 { color: var(--success); margin-bottom: 8px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .rulings-box li { margin-bottom: 7px; font-size: 13px; color: #999; list-style: none; padding-left: 14px; position: relative; }
        .rulings-box li::before { content: "→"; position: absolute; left: 0; color: var(--success); }
        .multi-kw-item { padding: 16px; margin-bottom: 12px; background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; }
        .multi-kw-item h3 { color: var(--accent); margin-bottom: 4px; font-size: 16px; }
        .multi-kw-item .rule-ref { font-family: monospace; font-size: 10px; color: var(--success); margin-bottom: 6px; }
        .multi-kw-item p { font-size: 13px; color: #aaa; line-height: 1.6; }
        .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 18px 0; }
        .compare-col { background: rgba(255,255,255,0.025); border-radius: 10px; padding: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .compare-col h4 { color: var(--accent); margin-bottom: 8px; font-size: 14px; }
        .compare-col ul { padding-left: 14px; }
        .compare-col li { font-size: 12px; color: #bbb; line-height: 1.8; }
        .compare-verdict { background: rgba(0,167,181,0.06); border: 1px solid rgba(0,167,181,0.2); border-radius: 10px; padding: 12px 16px; font-size: 13px; color: #bbb; line-height: 1.6; }
        .compare-verdict strong { color: var(--success); }
        .verdict-banner {
            display: flex; align-items: center; gap: 14px;
            border-radius: 12px; padding: 16px 20px; margin-bottom: 20px;
        }
        .verdict-banner.yes     { background: rgba(78,205,196,0.09);  border: 1px solid rgba(78,205,196,0.3); }
        .verdict-banner.no      { background: rgba(255,107,107,0.09); border: 1px solid rgba(255,107,107,0.3); }
        .verdict-banner.depends { background: rgba(255,230,109,0.07); border: 1px solid rgba(255,230,109,0.3); }
        .verdict-banner.info    { background: rgba(0,167,181,0.08);   border: 1px solid rgba(0,167,181,0.25); }
        .verdict-icon { font-size: 26px; line-height: 1; flex-shrink: 0; }
        .verdict-text { flex: 1; }
        .verdict-statement { font-size: 19px; font-weight: 700; line-height: 1.3; margin-bottom: 3px; }
        .verdict-banner.yes     .verdict-statement { color: var(--success); }
        .verdict-banner.no      .verdict-statement { color: var(--danger); }
        .verdict-banner.depends .verdict-statement { color: var(--warning); }
        .verdict-banner.info    .verdict-statement { color: var(--accent); }
        .verdict-reason { font-size: 12px; color: #666; line-height: 1.4; }
        .ruling-body-text { font-size: 15px; line-height: 1.8; color: #ccc; margin-bottom: 18px; }
        .ruling-body-text .highlight { color: #fff; font-weight: 600; }
        .ruling-body-text .teal { color: var(--success); }
        .ruling-body-text .gold { color: var(--warning); }
        .ruling-body-text .red  { color: #ff8080; }
        .dispute-flag {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255,107,107,0.08); border: 1px solid rgba(255,107,107,0.3);
            border-radius: 10px; padding: 10px 14px; margin-bottom: 18px;
            animation: disputeFlash 0.5s ease;
        }
        @keyframes disputeFlash {
            0%   { background: rgba(255,107,107,0.25); }
            100% { background: rgba(255,107,107,0.08); }
        }
        .dispute-flag-icon { font-size: 16px; }
        .dispute-flag-text { font-size: 12px; color: rgba(255,128,128,0.8); line-height: 1.4; }
        .dispute-flag-text strong { color: var(--danger); font-size: 13px; display: block; margin-bottom: 1px; }

        /* Experience level badge */
        .exp-badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 2px 9px; border-radius: 10px; font-size: 10px;
            letter-spacing: 1px; text-transform: uppercase; font-weight: 600;
            margin-left: 8px; vertical-align: middle;
        }
        .exp-badge.basic    { background: rgba(78,205,196,0.1);  color: rgba(78,205,196,0.6);  border: 1px solid rgba(78,205,196,0.2); }
        .exp-badge.intermediate { background: rgba(255,230,109,0.1); color: rgba(255,230,109,0.6); border: 1px solid rgba(255,230,109,0.2); }
        .exp-badge.advanced { background: rgba(255,107,107,0.1); color: rgba(255,107,107,0.6); border: 1px solid rgba(255,107,107,0.2); }

        /* ═══ RULING HISTORY PANEL ═══ */
        #history-panel {
            position: fixed; top: 58px; right: 16px;
            display: none; flex-direction: column; gap: 4px;
            z-index: 190; max-width: 200px;
        }
        .history-item {
            display: flex; justify-content: space-between; align-items: center; gap: 8px;
            background: rgba(6,6,9,0.85); border: 1px solid rgba(0,167,181,0.15);
            border-radius: 8px; padding: 6px 10px;
            cursor: pointer; transition: all 0.2s; backdrop-filter: blur(8px);
        }
        .history-item:hover { border-color: rgba(0,167,181,0.4); }
        .history-label { font-size: 11px; color: rgba(0,167,181,0.7); text-transform: capitalize; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-time { font-size: 9px; color: rgba(255,255,255,0.2); white-space: nowrap; flex-shrink: 0; }

        /* ═══ KEYBOARD HINT ═══ */
        .keyboard-hint {
            position: fixed; bottom: 58px; left: 0; right: 0;
            text-align: center; font-size: 10px; letter-spacing: 1.5px;
            color: rgba(255,255,255,0.08); pointer-events: none; text-transform: uppercase;
        }
        kbd { font-family: 'Courier New', monospace; font-size: 9px; color: rgba(255,255,255,0.12); background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 3px; padding: 1px 4px; }

        /* ═══ SESSION SUMMARY MODAL ═══ */
        #session-summary {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.92);
            display: none; align-items: center; justify-content: center;
            z-index: 3000; padding: 24px;
        }
        #session-summary.show { display: flex; }
        .summary-card {
            background: linear-gradient(160deg, #0e0e1a 0%, #111122 100%);
            border: 1px solid rgba(0,167,181,0.3);
            border-radius: 20px; padding: 36px; max-width: 480px; width: 100%;
            animation: rulingAppear 0.3s cubic-bezier(0.22,1,0.36,1);
        }
        .summary-title { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: rgba(0,167,181,0.5); margin-bottom: 24px; text-align: center; }
        .summary-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
        .summary-stat { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 16px; text-align: center; }
        .summary-stat-value { font-size: 28px; font-weight: 700; color: var(--accent); font-family: 'Courier New', monospace; }
        .summary-stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.2); margin-top: 4px; }
        .summary-keywords { margin-bottom: 24px; }
        .summary-keywords-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.2); margin-bottom: 10px; }
        .summary-kw-chips { display: flex; flex-wrap: wrap; gap: 6px; }
        .summary-kw-chip { background: rgba(0,167,181,0.08); border: 1px solid rgba(0,167,181,0.2); color: rgba(78,205,196,0.7); padding: 4px 12px; border-radius: 20px; font-size: 11px; }
        .summary-actions { display: flex; gap: 10px; }
        .summary-btn { flex: 1; padding: 12px; border-radius: 12px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; font-family: inherit; }
        .summary-btn-primary { background: transparent; border: 1px solid rgba(0,167,181,0.4); color: rgba(0,167,181,0.8); }
        .summary-btn-primary:hover { background: rgba(0,167,181,0.1); }
        .summary-btn-secondary { background: transparent; border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.2); }
        .summary-btn-secondary:hover { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.4); }

        /* ═══ RESPONSIVE ═══ */
        @media (max-width: 600px) {
            .card-ruling-grid { grid-template-columns: 1fr; }
            .compare-grid { grid-template-columns: 1fr; }
            .ruling-title { font-size: 22px; }
            .veritas-orb { width: 120px; height: 120px; }
            .judge-bubble { padding: 16px 18px; }
            .bubble-verdict { font-size: 15px; }
        }
    </style>
</head>
<body>

    <!-- Tablet Acceptance Screen -->
    <div id="tablet-accept">
        <div class="accept-orb">
            <div class="accept-orb-ring"></div>
            <div class="accept-orb-ring"></div>
            <div class="accept-orb-core"></div>
        </div>
        <div class="accept-title">Veritas</div>
        <div class="accept-subtitle">Place this tablet at the center of the table. Veritas will listen silently and step in when a dispute erupts.</div>
        <button class="accept-btn" onclick="acceptAndStart()">Begin Session</button>
        <div class="accept-hint">Microphone access required</div>
    </div>

    <div id="wake-flash"></div>
    <canvas id="ambient-canvas"></canvas>

    <!-- Status Bar -->
    <div class="status-bar">
        <div class="timer" id="session-timer">00:00:00</div>
        <div class="dispute-counter" id="dispute-counter">0 disputes</div>
        <div class="status-bar-right">
            <button class="end-session-btn" onclick="endSession()">End Session</button>
        </div>
    </div>

    <!-- History Panel -->
    <div id="history-panel"></div>

    <!-- Standby Screen -->
    <div id="standby-screen">
        <div class="veritas-orb">
            <div class="orb-ring"></div>
            <div class="orb-ring"></div>
            <div class="orb-ring"></div>
            <div class="orb-core"></div>
            <div class="orb-dot"></div>
        </div>
        <div class="veritas-wordmark">Veritas</div>
        <div class="standby-label" id="standby-label">Listening</div>
    </div>

    <div class="keyboard-hint">
        <kbd>Esc</kbd> dismiss &nbsp;·&nbsp; <kbd>Ctrl+Space</kbd> pause &nbsp;·&nbsp; <kbd>Ctrl+R</kbd> repeat
    </div>

    <!-- Controls Strip -->
    <div class="controls-strip">
        <button class="ctrl-btn" onclick="togglePause()">⏯ Pause</button>
        <button class="ctrl-btn" onclick="repeatLastRuling()">↩ Repeat</button>
        <button class="ctrl-btn" onclick="showManualSearch()">⌕ Card Lookup</button>
        <button class="ctrl-btn" onclick="showRuleReference()">≡ Keywords</button>
        <button class="ctrl-btn" onclick="testManually()">⚡ Test</button>
    </div>

    <!-- Session Summary Modal -->
    <div id="session-summary">
        <div class="summary-card">
            <div class="summary-title">Session Complete</div>
            <div class="summary-stats" id="summary-stats"></div>
            <div class="summary-keywords" id="summary-keywords"></div>
            <div class="summary-actions">
                <button class="summary-btn summary-btn-primary" onclick="confirmEndSession()">End Session</button>
                <button class="summary-btn summary-btn-secondary" onclick="dismissSummary()">Keep Playing</button>
            </div>
        </div>
    </div>

    <!-- Ruling Overlay -->
    <div class="ruling-overlay" id="ruling-overlay">
        <button class="close-btn" onclick="closeRuling()">✕</button>
        <div class="judge-stage" id="judge-stage">
            <div class="judge-figure">
                <div class="judge-head"><div class="judge-eyes"></div></div>
                <div class="judge-cloak"></div>
            </div>
            <div class="judge-bubble" id="judge-bubble">
                <div id="bubble-badge"></div>
                <div class="bubble-verdict" id="bubble-verdict">Analyzing the dispute…</div>
                <div class="bubble-analogy" id="bubble-analogy" style="display:none;"></div>
            </div>
        </div>
        <div class="scroll-hint" id="scroll-hint">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 5v14M5 12l7 7 7-7"/>
            </svg>
            Scroll for full ruling
        </div>
        <div class="ruling-details" id="ruling-details">
            <div class="ruling-details-inner">
                <div id="ruling-body"></div>
            </div>
        </div>
    </div>

    <script>
    // ═══════════════════════════════════════════════════════════════

    // INITIALIZE KEYWORDS
    // ═══════════════════════════════════════════════════════════════
    let KEYWORDS;
    function initKeywords() {
        ensureKeywordsLoaded();
        KEYWORDS = window.KEYWORDS && Object.keys(window.KEYWORDS).length > 0
            ? window.KEYWORDS
            : KEYWORDS_FALLBACK;
    }

    // ═══════════════════════════════════════════════════════════════
    // KEYWORD MATCH HELPER
    // ═══════════════════════════════════════════════════════════════
    function matchKw(kw, lower) {
        if (kw.includes(' ')) return lower.includes(kw);
        const re = new RegExp('\\b' + kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'i');
        return re.test(lower);
    }

    function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

    // ═══════════════════════════════════════════════════════════════
    // EXPERIENCE LEVEL DETECTION
    // ═══════════════════════════════════════════════════════════════
    function detectExperienceLevel(text) {
        const lower = text.toLowerCase();
        const basicIndicators = [/what (is|does)/i, /how do(es)? .+ work/i, /explain/i, /what'?s? .+ mean/i, /tell me about/i];
        const advancedIndicators = [/interact(ion)?/i, /stack/i, /priority/i, /layer/i, /timestamp/i, /replacement effect/i, /simultaneous/i, /trigger.*trigger/i, /\bcombo\b/i];
        if (advancedIndicators.some(p => p.test(lower))) return 'advanced';
        if (basicIndicators.some(p => p.test(lower))) return 'basic';
        return 'intermediate';
    }

    function buildInteractionAnswer(text) {
        const lower = text.toLowerCase();
        const foundKws = Object.keys(KEYWORDS).filter(k => matchKw(k, lower)).sort((a,b) => b.length - a.length);
        if (foundKws.length >= 2) {
            const interaction = getKnownInteraction(foundKws[0], foundKws[1]);
            if (interaction) return { type: 'semantic', data: interaction };
            return {
                tag: 'depends', tagLabel: 'Depends on Specifics',

    function buildSurvivalAnswer(text) {
        const lower = text.toLowerCase();
        const foundKws = Object.keys(KEYWORDS).filter(k => matchKw(k, lower)).sort((a,b) => b.length - a.length);
        const checks = {
            'indestructible': { survives: ['destroy','damage','lethal'], dies: ['exile','sacrifice','toughness to 0','-X/-X'] },

            'regenerate': { survives: ['destroy','lethal damage'], dies: ['exile','cant regenerate'] },
            'protection': { survives: ['damage from that quality','targeting of that quality'], dies: ['other qualities','exile','sacrifice'] }

        for (const kw of foundKws) {

        return {
            tag: 'depends', tagLabel: 'Depends',
            title: 'Survival Check',

            <p>• <span class="highlight">Hexproof</span> — stops targeted removal, not board wipes</p>

    function buildBlockingAnswer(text) {

    function buildComparisonAnswer(text) {
        const lower = text.toLowerCase();
        const kwPairs = [
            ['hexproof','shroud'],['trample','menace'],['first strike','double strike'],
            ['deathtouch','lifelink'],['exile','destroy'],['haste','vigilance'],

        ];
        for (const [a, b] of kwPairs) {
            if ((matchKw(a, lower) || lower.includes(a)) && (matchKw(b, lower) || lower.includes(b))) {
                return buildSpecificComparison(a, b);
            }
        }
        return {
            tag: 'info', tagLabel: 'Comparison',
            title: 'Comparing Keywords',
            body: `<p>• <span class="highlight">Hexproof vs Shroud</span> — hexproof only stops opponents, shroud stops everyone<br>

    // ═══════════════════════════════════════════════════════════════
    // QUESTION ANALYZER
    // ═══════════════════════════════════════════════════════════════
    function analyzeInput(text) {
        const lower = text.toLowerCase().trim();
        for (const qp of QUESTION_PATTERNS) {
            if (qp.id === 'keyword_explain') continue;
            for (const pattern of qp.patterns) {
                if (pattern.test(text)) {
                    const result = qp.respond(text.match(pattern), text);
                    if (result) return { type: 'semantic', data: result };
                }
            }
        }
        const foundKws = Object.keys(KEYWORDS).filter(k => matchKw(k, lower)).sort((a,b) => b.length - a.length);
        if (foundKws.length >= 2) {
            const interaction = getKnownInteraction(foundKws[0], foundKws[1]);
            if (interaction) return { type: 'semantic', data: interaction };
            return { type: 'multi_keyword', keywords: foundKws };
        }
        if (foundKws.length === 1) return { type: 'keyword', keyword: foundKws[0] };
        return { type: 'card', text };
    }

    // INTERPRETATION LAYER — conversational verdict building

    function buildVerdict(analysis) {
        if (!analysis || !analysis.type) {
            return "Veritas heard a dispute but couldn't identify the rule. Say the keyword or card name being argued.";
        }
        if (analysis.type === 'keyword') {
            const kw = analysis.keyword;
            const d = KEYWORDS[kw];
            if (!d) return `Here's what ${kw} does — check the ruling below.`;
            // Prefer tableTalk for a natural conversational delivery
            if (d.tableTalk) return d.tableTalk;
            const plain = d.plain.replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim();
            const firstLine = plain.split(/\.\s/)[0];
            return `Here's what happens: <strong>${kw}</strong> — ${firstLine}. ${buildInstruction(kw, d)}`;
        }
        if (analysis.type === 'semantic') {
            const d = analysis.data;
            if (!d) return 'Check the detailed ruling below.';
            const body = (d.body || '').replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim();
            const sentence = body.split(/\.\s/)[0];
            return `Here's what happens: ${sentence}. ${d.verdict ? '<br><br>' + d.verdict.replace(/<[^>]+>/g,'').trim() : ''}`;
        }
        if (analysis.type === 'multi_keyword') {
            const kws = analysis.keywords.slice(0,2);
            const parts = kws.map(kw => {
                const d = KEYWORDS[kw];
                if (d?.tableTalk) return d.tableTalk;
                const plain = d?.plain?.replace(/<[^>]+>/g,'').split(/\.\s/)[0].toLowerCase() || kw;
                return `<strong>${kw}</strong> — ${plain}`;
            });
            return parts[0] + (parts[1] ? '<br><br>' + parts[1] : '');
        }
        return 'Check the detailed ruling below.';
    }

    function buildInstruction(kw, d, context) {
        // Use context-specific guidance if available
        if (context && d[context]) return d[context];
        if (d.whatToDo) return d.whatToDo;
        // Fallback built-in instructions
        const instructions = {
            'hexproof':       'The hexproof creature cannot be targeted by opponents. Remove those spells from the stack.',
            'indestructible': 'Destroy effects don\'t work here. Use exile or -X/-X effects instead.',
            'deathtouch':     'Any damage from this creature is lethal regardless of toughness. The blocker dies.',
            'trample':        'Assign lethal damage to blockers first, then the rest goes through to the player.',
            'lifelink':       'The damage dealt also heals the controller by the same amount. Update life totals now.',
            'flying':         'Only creatures with flying or reach can block this. Non-flyers cannot.',
            'first strike':   'This creature deals combat damage first. If the blocker dies, it deals no damage back.',
            'double strike':  'This creature deals damage in both combat steps.',
            'vigilance':      'This creature does not tap when it attacks. It stays untapped.',
            'flash':          'This can be cast any time an instant could be cast, including on opponents\' turns.',
            'haste':          'This creature can attack and use tap abilities the turn it enters.',
            'reach':          'This creature can block flying creatures despite not having flying.',
            'menace':         'This creature requires two or more blockers. One blocker alone is illegal.',
            'protection':     'That spell or ability is countered — DEBT: no Damage, Enchant, Block, or Target from that quality.',
            'shroud':         'Neither player can target this creature with spells or abilities.',
        };
        return instructions[kw] || 'Scroll down for the full official ruling.';
    }
