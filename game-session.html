<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veritas - Game Session</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #060609;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* ═══ AMBIENT CANVAS ═══ */
        #ambient-canvas {
            position: fixed; inset: 0;
            z-index: 0; pointer-events: none;
        }

        /* ═══ STATUS BAR ═══ */
        .status-bar {
            position: fixed; top: 0; left: 0; right: 0; height: 52px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px;
            background: rgba(6,6,9,0.7);
            border-bottom: 1px solid rgba(0,167,181,0.12);
            backdrop-filter: blur(12px);
            z-index: 200;
        }
        .timer {
            font-family: 'Courier New', monospace;
            font-size: 17px; font-weight: 600;
            color: rgba(0,167,181,0.6);
            letter-spacing: 2px;
        }
        .dispute-counter {
            font-size: 12px; font-weight: 600;
            color: rgba(255,107,107,0.5);
            letter-spacing: 1px; text-transform: uppercase;
        }
        .dispute-counter.has-disputes {
            color: #ff6b6b;
        }
        .status-bar-right {
            display: flex; align-items: center; gap: 16px;
        }
        .end-session-btn {
            background: transparent;
            border: 1px solid rgba(0,167,181,0.25); color: rgba(0,167,181,0.5);
            padding: 6px 16px; border-radius: 20px;
            font-size: 11px; text-transform: uppercase;
            letter-spacing: 2px; cursor: pointer;
            transition: all 0.3s;
        }
        .end-session-btn:hover {
            border-color: #00a7b5; color: #00a7b5;
            box-shadow: 0 0 12px rgba(0,167,181,0.2);
        }

        /* ═══ MAIN STANDBY SCREEN ═══ */
        #standby-screen {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 1;
        }

        /* The orb */
        .veritas-orb {
            position: relative;
            width: 160px; height: 160px;
            margin-bottom: 48px;
        }
        .orb-ring {
            position: absolute; inset: 0;
            border-radius: 50%;
            border: 1px solid rgba(0,167,181,0.15);
            animation: orbRing 8s infinite linear;
        }
        .orb-ring:nth-child(2) {
            top: 12px; left: 12px; right: 12px; bottom: 12px;
            border-color: rgba(0,167,181,0.1);
            animation-duration: 12s;
            animation-direction: reverse;
        }
        .orb-ring:nth-child(3) {
            top: 24px; left: 24px; right: 24px; bottom: 24px;
            border-color: rgba(0,167,181,0.08);
            animation-duration: 6s;
        }
        @keyframes orbRing {
            from { transform: rotate(0deg) scaleX(1); }
            50%  { transform: rotate(180deg) scaleX(0.85); }
            to   { transform: rotate(360deg) scaleX(1); }
        }
        .orb-core {
            position: absolute;
            top: 36px; left: 36px; right: 36px; bottom: 36px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 35%,
                rgba(0,167,181,0.18) 0%,
                rgba(0,80,90,0.08) 50%,
                transparent 100%);
            border: 1px solid rgba(0,167,181,0.2);
            animation: orbBreath 6s ease-in-out infinite;
        }
        @keyframes orbBreath {
            0%,100% { opacity: 0.6; transform: scale(1); }
            50%      { opacity: 1;   transform: scale(1.04); }
        }
        .orb-dot {
            position: absolute;
            top: 50%; left: 50%;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: rgba(0,167,181,0.5);
            transform: translate(-50%, -50%);
            animation: dotPulse 6s ease-in-out infinite;
        }
        @keyframes dotPulse {
            0%,100% { opacity: 0.3; box-shadow: 0 0 0 0 rgba(0,167,181,0); }
            50%      { opacity: 0.9; box-shadow: 0 0 0 8px rgba(0,167,181,0); }
        }

        /* Standby wordmark */
        .veritas-wordmark {
            font-size: 11px; letter-spacing: 8px; text-transform: uppercase;
            color: rgba(0,167,181,0.3);
            margin-bottom: 12px;
            font-weight: 300;
        }
        .standby-label {
            font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
            color: rgba(255,255,255,0.1);
            animation: labelFade 4s ease-in-out infinite;
        }
        @keyframes labelFade {
            0%,100% { opacity: 0.4; }
            50%      { opacity: 0.8; }
        }

        /* ═══ CONTROLS STRIP — bottom of screen ═══ */
        .controls-strip {
            position: fixed; bottom: 0; left: 0; right: 0; height: 52px;
            display: flex; align-items: center; justify-content: center;
            gap: 8px;
            background: rgba(6,6,9,0.6);
            border-top: 1px solid rgba(255,255,255,0.04);
            backdrop-filter: blur(12px);
            z-index: 200;
        }
        .ctrl-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.07); color: rgba(255,255,255,0.3);
            padding: 6px 14px; border-radius: 16px;
            font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; transition: all 0.25s;
        }
        .ctrl-btn:hover {
            border-color: rgba(0,167,181,0.4); color: rgba(0,167,181,0.8);
        }

        /* ═══ WAKE FLASH — brief screen flash when Veritas fires ═══ */
        #wake-flash {
            position: fixed; inset: 0; z-index: 999;
            background: rgba(0,167,181,0.12);
            pointer-events: none; opacity: 0;
        }
        @keyframes wakeFlashAnim {
            0%   { opacity: 0.9; }
            100% { opacity: 0; }
        }
        #wake-flash.fire {
            animation: wakeFlashAnim 0.4s ease-out forwards;
        }

        /* ═══ RULING OVERLAY ═══ */
        .ruling-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.92);
            display: none; align-items: center; justify-content: center;
            z-index: 1000; padding: 20px;
        }
        .ruling-overlay.show { display: flex; }
        .ruling-content {
            background: linear-gradient(160deg, #0e0e1a 0%, #111122 100%);
            border: 1px solid rgba(0,167,181,0.35);
            border-radius: 20px; padding: 36px;
            max-width: 820px; width: 100%;
            max-height: 90vh; overflow-y: auto;
            position: relative;
            box-shadow: 0 0 80px rgba(0,167,181,0.15), 0 40px 80px rgba(0,0,0,0.6);
            animation: rulingAppear 0.25s cubic-bezier(0.22,1,0.36,1);
        }
        @keyframes rulingAppear {
            from { opacity: 0; transform: scale(0.96) translateY(16px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }
        .close-btn {
            position: absolute; top: 16px; right: 18px;
            background: none; border: none; color: rgba(255,255,255,0.2);
            font-size: 20px; cursor: pointer; transition: color 0.2s;
            line-height: 1;
        }
        .close-btn:hover { color: #00a7b5; }

        /* ═══ RULING CONTENT ═══ */
        .ruling-keyword-badge {
            display: inline-block;
            background: rgba(0,167,181,0.12);
            border: 1px solid rgba(0,167,181,0.3);
            color: #00a7b5; font-size: 10px;
            letter-spacing: 2px; text-transform: uppercase;
            padding: 3px 10px; border-radius: 20px;
            margin-bottom: 12px;
        }
        .ruling-title {
            font-size: 28px; font-weight: 700;
            color: #fff; margin-bottom: 6px; letter-spacing: 0.5px;
        }
        .ruling-plain {
            font-size: 16px; line-height: 1.8;
            color: #ccc; margin-bottom: 22px;
        }
        .ruling-plain strong { color: #fff; }
        .ruling-example-box {
            background: rgba(255,230,109,0.05);
            border-left: 3px solid rgba(255,230,109,0.4);
            padding: 14px 18px; border-radius: 0 10px 10px 0;
            margin-bottom: 18px;
        }
        .ruling-example-box .ex-label {
            color: rgba(255,230,109,0.7); font-size: 11px;
            text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 6px; font-weight: 600;
        }
        .ruling-example-box p { font-size: 14px; line-height: 1.6; color: #bbb; }
        .ruling-also { margin-top: 16px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.05); }
        .ruling-also-label { font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .keyword-chips { display: flex; flex-wrap: wrap; gap: 7px; }
        .keyword-chip {
            background: rgba(0,167,181,0.06);
            border: 1px solid rgba(0,167,181,0.2);
            color: rgba(78,205,196,0.8); padding: 4px 12px;
            border-radius: 20px; font-size: 11px; cursor: pointer;
            transition: all 0.2s;
        }
        .keyword-chip:hover { background: rgba(0,167,181,0.15); color: #4ecdc4; }
        .ruling-answer-tag {
            display: inline-block; padding: 4px 14px; border-radius: 20px;
            font-size: 11px; font-weight: 700; letter-spacing: 1px;
            text-transform: uppercase; margin-bottom: 14px;
        }
        .ruling-answer-tag.yes     { background: rgba(78,205,196,0.15); color: #4ecdc4; border: 1px solid rgba(78,205,196,0.4); }
        .ruling-answer-tag.no      { background: rgba(255,107,107,0.15); color: #ff6b6b; border: 1px solid rgba(255,107,107,0.4); }
        .ruling-answer-tag.depends { background: rgba(255,230,109,0.1);  color: #ffe66d; border: 1px solid rgba(255,230,109,0.35); }
        .ruling-answer-tag.info    { background: rgba(0,167,181,0.12);   color: #00a7b5; border: 1px solid rgba(0,167,181,0.3); }
        .ruling-answer-body { font-size: 15px; line-height: 1.8; color: #ccc; margin-bottom: 20px; }
        .ruling-answer-body .highlight { color: #fff; font-weight: 600; }
        .ruling-answer-body .teal { color: #4ecdc4; }
        .ruling-answer-body .gold { color: #ffe66d; }
        .ruling-answer-body .red  { color: #ff8080; }
        .ruling-nuance {
            background: rgba(255,255,255,0.025);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px; padding: 14px 16px;
            font-size: 13px; color: #888; line-height: 1.6; margin-bottom: 14px;
        }
        .ruling-nuance .nuance-title {
            color: #00a7b5; font-size: 10px;
            text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 5px; font-weight: 600;
        }
        .card-ruling-grid { display: grid; grid-template-columns: 220px 1fr; gap: 24px; align-items: start; }
        .card-img-wrap { background: rgba(0,0,0,0.4); border-radius: 12px; padding: 12px; text-align: center; }
        .card-image { max-width: 100%; border-radius: 8px; box-shadow: 0 8px 28px rgba(0,0,0,0.6); }
        .card-details h2 { color: #00a7b5; font-size: 22px; margin-bottom: 4px; }
        .card-type { color: #666; font-style: italic; margin-bottom: 14px; font-size: 13px; }
        .oracle-box {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
            padding: 14px; border-radius: 8px; margin-bottom: 14px;
            line-height: 1.65; font-size: 14px; white-space: pre-wrap;
        }
        .rulings-box { background: rgba(0,167,181,0.03); padding: 14px; border-radius: 8px; }
        .rulings-box h4 { color: #4ecdc4; margin-bottom: 8px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .rulings-box li { margin-bottom: 7px; font-size: 13px; color: #999; list-style: none; padding-left: 14px; position: relative; }
        .rulings-box li::before { content: "→"; position: absolute; left: 0; color: #4ecdc4; }
        .multi-kw-item { padding: 16px; margin-bottom: 12px; background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; }
        .multi-kw-item h3 { color: #00a7b5; margin-bottom: 4px; font-size: 16px; }
        .multi-kw-item .rule-ref { font-family: monospace; font-size: 10px; color: #4ecdc4; margin-bottom: 6px; }
        .multi-kw-item p { font-size: 13px; color: #aaa; line-height: 1.6; }
        .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 18px 0; }
        .compare-col { background: rgba(255,255,255,0.025); border-radius: 10px; padding: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .compare-col h4 { color: #00a7b5; margin-bottom: 8px; font-size: 14px; }
        .compare-col ul { padding-left: 14px; }
        .compare-col li { font-size: 12px; color: #bbb; line-height: 1.8; }
        .compare-verdict { background: rgba(0,167,181,0.06); border: 1px solid rgba(0,167,181,0.2); border-radius: 10px; padding: 12px 16px; font-size: 13px; color: #bbb; line-height: 1.6; }
        .compare-verdict strong { color: #4ecdc4; }

        /* ═══ DISPUTE BANNER (inside ruling panel) ═══ */
        .dispute-flag {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255,107,107,0.08);
            border: 1px solid rgba(255,107,107,0.3);
            border-radius: 10px; padding: 10px 14px; margin-bottom: 18px;
            animation: disputeFlash 0.5s ease;
        }
        @keyframes disputeFlash {
            0%   { background: rgba(255,107,107,0.25); }
            100% { background: rgba(255,107,107,0.08); }
        }
        .dispute-flag-icon { font-size: 16px; }
        .dispute-flag-text { font-size: 12px; color: rgba(255,128,128,0.8); line-height: 1.4; }
        .dispute-flag-text strong { color: #ff6b6b; font-size: 13px; display: block; margin-bottom: 1px; }
        .ruling-content.dispute-mode {
            border-color: rgba(255,107,107,0.4);
            box-shadow: 0 0 80px rgba(255,107,107,0.12), 0 40px 80px rgba(0,0,0,0.6);
        }

        /* ═══ VERDICT BANNER ═══ */
        .verdict-banner {
            display: flex; align-items: center; gap: 14px;
            border-radius: 12px; padding: 16px 20px; margin-bottom: 20px;
        }
        .verdict-banner.yes     { background: rgba(78,205,196,0.09);  border: 1px solid rgba(78,205,196,0.3); }
        .verdict-banner.no      { background: rgba(255,107,107,0.09); border: 1px solid rgba(255,107,107,0.3); }
        .verdict-banner.depends { background: rgba(255,230,109,0.07); border: 1px solid rgba(255,230,109,0.3); }
        .verdict-banner.info    { background: rgba(0,167,181,0.08);   border: 1px solid rgba(0,167,181,0.25); }
        .verdict-icon { font-size: 26px; line-height: 1; flex-shrink: 0; }
        .verdict-text { flex: 1; }
        .verdict-statement { font-size: 19px; font-weight: 700; line-height: 1.3; margin-bottom: 3px; }
        .verdict-banner.yes     .verdict-statement { color: #4ecdc4; }
        .verdict-banner.no      .verdict-statement { color: #ff6b6b; }
        .verdict-banner.depends .verdict-statement { color: #ffe66d; }
        .verdict-banner.info    .verdict-statement { color: #00a7b5; }
        .verdict-reason { font-size: 12px; color: #666; line-height: 1.4; }
        .ruling-body-text { font-size: 15px; line-height: 1.8; color: #ccc; margin-bottom: 18px; }
        .ruling-body-text .highlight { color: #fff; font-weight: 600; }
        .ruling-body-text .teal { color: #4ecdc4; }
        .ruling-body-text .gold { color: #ffe66d; }
        .ruling-body-text .red  { color: #ff8080; }
        .official-ruling { margin-top: 18px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 14px; }
        .official-ruling-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; color: #444; font-weight: 600; margin-bottom: 6px; }
        .official-ruling-ref { font-family: monospace; font-size: 11px; color: #383838; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); border-radius: 5px; padding: 6px 10px; display: inline-block; }

        /* ═══ RESPONSIVE ═══ */
        @media (max-width: 600px) {
            .card-ruling-grid { grid-template-columns: 1fr; }
            .compare-grid { grid-template-columns: 1fr; }
            .ruling-content { padding: 22px 16px; }
            .ruling-title { font-size: 22px; }
            .veritas-orb { width: 120px; height: 120px; }
        }
    </style>
</head>
<body>

    <!-- Wake flash overlay -->
    <div id="wake-flash"></div>

    <!-- Ambient canvas -->
    <canvas id="ambient-canvas"></canvas>

    <!-- Status Bar -->
    <div class="status-bar">
        <div class="timer" id="session-timer">00:00:00</div>
        <div class="dispute-counter" id="dispute-counter">0 disputes</div>
        <div class="status-bar-right">
            <button class="end-session-btn" onclick="endSession()">End Session</button>
        </div>
    </div>

    <!-- Standby screen -->
    <div id="standby-screen">
        <div class="veritas-orb">
            <div class="orb-ring"></div>
            <div class="orb-ring"></div>
            <div class="orb-ring"></div>
            <div class="orb-core"></div>
            <div class="orb-dot"></div>
        </div>
        <div class="veritas-wordmark">Veritas</div>
        <div class="standby-label" id="standby-label">Listening</div>
    </div>

    <!-- Controls strip -->
    <div class="controls-strip">
        <button class="ctrl-btn" onclick="togglePause()">⏯ Pause</button>
        <button class="ctrl-btn" onclick="repeatLastRuling()">↩ Repeat</button>
        <button class="ctrl-btn" onclick="showManualSearch()">⌕ Card Lookup</button>
        <button class="ctrl-btn" onclick="showRuleReference()">≡ Keywords</button>
        <button class="ctrl-btn" onclick="testManually()">⚡ Test</button>
    </div>

    <!-- Ruling Overlay -->
    <div class="ruling-overlay" id="ruling-overlay" onclick="closeRuling(event)">
        <div class="ruling-content" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeRuling()">✕</button>
            <div id="ruling-body"></div>
        </div>
    </div>

    <script>
    // ═══════════════════════════════════════════════════════════════
    // KEYWORD MATCH HELPER
    // Uses word boundaries for single-word keys to prevent false matches
    // on verb forms like 'destroying', 'scrying', 'milling'
    // Multi-word keys (e.g. 'first strike') use plain includes
    // ═══════════════════════════════════════════════════════════════
    function matchKw(kw, lower) {
        if (kw.includes(' ')) return lower.includes(kw);
        const re = new RegExp('\\b' + kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'i');
        return re.test(lower);
    }

    // ═══════════════════════════════════════════════════════════════
    // KEYWORD DATABASE — 50+ entries, context-aware plain English
    // ═══════════════════════════════════════════════════════════════
    const KEYWORDS = {
        // ── Evasion ──
        'flying': {
            rule: '702.9b', category: 'Evasion',
            plain: '<strong>Flying creatures can only be blocked by other flying creatures or creatures with reach.</strong> If no blocker has flying or reach, they simply cannot block it — the damage goes through.',
            nuances: [
                'A creature can have both flying and reach, but that\'s redundant.',
                'Flying doesn\'t help you block non-flying creatures — you can still do that normally.',
                'Some spells give flying temporarily (like Giant Growth variants), which matters for blocking.'
            ],
            example: 'Your 3/3 flier attacks into a board of 10/10 ground creatures. None can block unless they have flying or reach.',
            related: ['reach','shadow','skulk','fear','intimidate']
        },
        'reach': {
            rule: '702.17b', category: 'Evasion',
            plain: '<strong>Reach lets a ground creature block flying creatures.</strong> That\'s it — it doesn\'t give the creature flying itself, so it can\'t block shadow or other special evasion, and it can\'t attack as if it had flying.',
            nuances: ['Reach only matters when blocking, not when attacking.','A creature with reach can still be blocked by ground creatures normally.'],
            example: 'Giant Spider (reach) can block your opponent\'s Dragon. But your opponent\'s flying creature cannot be blocked by most of your ground creatures unless they also have reach.',
            related: ['flying']
        },
        'menace': {
            rule: '702.110b', category: 'Evasion',
            plain: '<strong>A creature with menace requires at least two blockers.</strong> Your opponent must block it with two or more creatures, or let it through entirely. They can\'t legally assign just one blocker.',
            nuances: ['If your opponent only has one creature, it can\'t block menace at all — it must let it through.','Menace doesn\'t help if the blocker is removed after being declared.'],
            example: 'You attack with a 4/4 with menace. Your opponent has a 3/3 and a 1/1. They must commit both or neither.',
            related: ['trample','intimidate','fear']
        },
        'trample': {
            rule: '702.19b', category: 'Evasion',
            plain: '<strong>With trample, you only need to assign lethal damage to blockers — the rest goes to the player.</strong> You don\'t have to waste all your damage on a single 1/1 blocker.',
            nuances: [
                'You must assign at least lethal damage to each blocker before damage can trample over.',
                'If a blocker has deathtouch, 1 damage is "lethal" to it — so 1 tramples over to the player.',
                'Trample doesn\'t interact with the player\'s life total directly — it still counts as combat damage.',
                'If all blockers are removed before damage, trample doesn\'t matter — all damage goes through anyway.'
            ],
            example: 'Your 8/8 trampler is blocked by a 2/2. Assign 2 damage to the blocker (lethal), 6 tramples to the player.',
            related: ['deathtouch','first strike','double strike']
        },
        'shadow': {
            rule: '702.27b', category: 'Evasion',
            plain: '<strong>Shadow creatures can only be blocked by other shadow creatures, and can only block shadow creatures.</strong> They exist in a parallel dimension — ignoring most of the board in both directions.',
            nuances: ['Unlike flying, shadow is two-directional — you can\'t block non-shadow creatures with it either.'],
            example: 'Your 2/1 shadow slips past their entire army unless they also have shadow creatures.',
            related: ['flying','fear','intimidate']
        },
        'fear': {
            rule: '702.36b', category: 'Evasion',
            plain: '<strong>Fear creatures can only be blocked by artifact creatures or black creatures.</strong> Against most decks, this is unblockable. Against black or artifact-heavy decks, it does nothing.',
            nuances: ['Fear is an older mechanic mostly replaced by intimidate and menace in newer cards.'],
            example: 'Black Knight with fear attacks into a white weenie deck — nothing can block it.',
            related: ['intimidate','menace','protection']
        },
        'intimidate': {
            rule: '702.13b', category: 'Evasion',
            plain: '<strong>Intimidate creatures can only be blocked by artifact creatures or creatures that share a color with it.</strong> It\'s a color-based version of fear.',
            nuances: ['A multicolored creature can be blocked if the blocker shares any of its colors.'],

    function buildInteractionAnswer(text) {
        const lower = text.toLowerCase();
        // Check for known keyword pairs
        const foundKws = Object.keys(KEYWORDS).filter(k => matchKw(k, lower)).sort((a,b) => b.length - a.length);

        if (foundKws.length >= 2) {
            const [a, b] = foundKws;
            const interactions = getKnownInteraction(a, b);
            if (interactions) return interactions;

            return {
                tag: 'depends', tagLabel: 'Depends on Specifics',
                title: `${capitalize(a)} + ${capitalize(b)}`,
                body: `<p>Both keywords are in play. Here\'s what matters:</p><br>
                <p>• <span class="highlight">${capitalize(a)}:</span> ${KEYWORDS[a].plain}</p><br>
                <p>• <span class="highlight">${capitalize(b)}:</span> ${KEYWORDS[b].plain}</p><br>
                <p>For the exact interaction, the order of events (timestamps) and which abilities are static vs triggered matters most.</p>`,
                nuance: null,
                example: '',
                rule: 'Various',
                related: [a, b]
            };
        }

        return {
            tag: 'info', tagLabel: 'Interaction',
            title: 'Card Interaction',
            body: `<p>Interactions in Magic depend on:</p><br>
            <p>• <span class="highlight">Timestamps</span> — which effect was applied first</p>
            <p>• <span class="highlight">Layer system</span> — continuous effects apply in a specific order (type, color, P/T, etc.)</p>
            <p>• <span class="highlight">Dependency</span> — if A changes what B does, B applies after A</p>
            <p>• <span class="highlight">Static vs triggered</span> — static effects are always on, triggered effects use the stack</p>`,
            nuance: { title: 'Quick rule', text: 'If in doubt: static effects are always active, triggered abilities use the stack, and the most recent effect wins for same-layer conflicts.' },
            example: 'Ask me about a specific keyword pair or card name and I\'ll give you the precise interaction.',
            rule: '613.1',
            related: ['layers','timestamps','static','triggered']
        };
    }

    function buildSurvivalAnswer(text) {
        const lower = text.toLowerCase();
        const foundKws = Object.keys(KEYWORDS).filter(k => matchKw(k, lower)).sort((a,b) => b.length - a.length);

        const checks = {
            'indestructible': { survives: ['destroy','damage','lethal'], dies: ['exile','sacrifice','toughness to 0','-X/-X'] },
            'hexproof': { survives: ['target','doom blade','path to exile targeting'], dies: ['wrath','board wipe','sacrifice','non-targeting'] },
            'regenerate': { survives: ['destroy','lethal damage'], dies: ['exile','cant regenerate'] },
            'protection': { survives: ['damage from that color','target of that color','enchant of that color'], dies: ['other colors','exile','sacrifice','non-targeting'] }
        };

        for (const kw of foundKws) {
            if (checks[kw]) {
                const c = checks[kw];
                return {
                    tag: 'depends', tagLabel: 'Depends on the Effect',
                    title: `${capitalize(kw)}: What Kills It?`,
                    body: `<p><span class="teal">✓ Survives:</span> ${c.survives.join(', ')}</p><br>
                    <p><span class="red">✗ Doesn\'t survive:</span> ${c.dies.join(', ')}</p><br>
                    <p>${KEYWORDS[kw].plain}</p>`,
                    nuance: null,
                    example: KEYWORDS[kw].example,
                    rule: KEYWORDS[kw].rule,
                    related: KEYWORDS[kw].related
                };
            }
        }

        return {
            tag: 'depends', tagLabel: 'Depends',
            title: 'Survival Check',
            body: `<p>Whether a creature survives depends on what\'s hitting it and what protections it has.</p><br>
            <p>• <span class="highlight">Indestructible</span> — survives lethal damage and destroy effects, dies to exile and toughness reduction</p>
            <p>• <span class="highlight">Hexproof/Shroud</span> — stops targeted removal, doesn\'t stop board wipes</p>
            <p>• <span class="highlight">Protection</span> — prevents damage/enchanting/targeting from the specified quality</p>
            <p>• <span class="highlight">Regeneration</span> — replaces destruction once per activation</p>`,
            nuance: null,
            example: 'Tell me the specific protection ability or creature name for a precise answer.',
            rule: 'Various',
            related: ['indestructible','hexproof','protection','regenerate']
        };
    }

    function buildBlockingAnswer(text) {
        const lower = text.toLowerCase();
        const evasionKws = ['flying','menace','shadow','fear','intimidate','skulk','trample'];

        if (found.length > 0) {
            const kw = found[0];
            const data = KEYWORDS[kw];
            if (data) {
                return {
                    tag: 'info', tagLabel: 'Blocking Rules',
                    title: `Blocking ${capitalize(kw)}`,
                    body: `<p>${data.plain}</p>`,
                    nuance: data.nuances?.length ? { title: 'Key nuance', text: data.nuances[0] } : null,
                    example: data.example,
                    rule: data.rule,
                    related: data.related
                };
            }
        }

        return {
            tag: 'info', tagLabel: 'Blocking',
            title: 'Blocking Rules',
            body: `<p>Blocking has some key rules:</p><br>
            <p>• Any creature can block unless it has <span class="highlight">defender</span> issues or is tapped</p>

        const kwPairs = [

            ['deathtouch','lifelink'],['exile','destroy'],['haste','vigilance'],
            ['flying','reach'],['indestructible','protection'],['embalm','eternalize']

        for (const [a, b] of kwPairs) {
            if (lower.includes(a) && lower.includes(b)) {
                return buildSpecificComparison(a, b);
            }
        }

        return {
            tag: 'info', tagLabel: 'Comparison',
            title: 'Comparing Keywords',
            body: `<p>Common comparisons in Magic:</p><br>
            <p>• <span class="highlight">Hexproof vs Shroud</span> — hexproof only stops opponents, shroud stops everyone</p>

            title: `${capitalize(a)} vs ${capitalize(b)}`,

                   <p><span class="highlight">${capitalize(b)}</span> — ${db?.plain || 'See rule ' + db?.rule}</p>`,
            nuance: null, example: '',
            rule: `${da?.rule} / ${db?.rule}`,
            related: [a, b]
        };
    }

    function getKnownInteraction(a, b) {
        const known = {
            'trample+deathtouch': {
                tag: 'yes', tagLabel: 'Famous Combo',
                title: 'Trample + Deathtouch',
                body: `<p>This is one of the strongest combat combinations in Magic.</p><br>
                <p>With deathtouch, <span class="highlight">any amount of damage is lethal</span> to a creature. With trample, you only need to assign <span class="highlight">lethal damage</span> to blockers before trampling over.</p><br>
                <p>Result: you assign <span class="teal">just 1 damage</span> to each blocker (that\'s lethal because of deathtouch), and the remaining power tramples over to the player.</p>`,
                nuance: { title: 'Example', text: 'Your 6/6 with trample and deathtouch is blocked by three 10/10s. Assign 1 damage to each blocker (lethal because deathtouch), 3 damage tramples to the defending player. All three blockers die.' },
                example: '',
                rule: '702.19b + 702.2b',
                related: ['trample','deathtouch','first strike']
            },
            'first strike+deathtouch': {
                tag: 'yes', tagLabel: 'Deadly Combo',
                title: 'First Strike + Deathtouch',
                body: `<p>A creature with both first strike and deathtouch is an exceptional blocker and attacker.</p><br>
                <p>In the first strike damage step, it deals damage — and because of deathtouch, <span class="highlight">even 1 damage kills any creature</span>. The blocked creature is dead before it ever deals damage back.</p>`,
                nuance: { title: 'Result', text: 'Your first-strike deathtouch creature effectively can\'t be killed in combat by any single non-first-strike attacker, regardless of that creature\'s size.' },
                example: '',
                rule: '702.7b + 702.2b',
                related: ['first strike','deathtouch','double strike']
            },
            'lifelink+double strike': {
                tag: 'yes', tagLabel: 'Strong Synergy',
                title: 'Lifelink + Double Strike',
                body: `<p>Double strike deals damage in two separate combat steps. Lifelink gains you life equal to damage dealt.</p><br>
                <p>Result: <span class="highlight">you gain life twice</span> — once in the first strike step and once in the regular damage step.</p>`,
                nuance: null,
                example: 'A 4/4 with double strike and lifelink deals 4 damage in the first step (gain 4 life) and 4 in the second (gain 4 more life) = 8 life gained in one combat.',
                rule: '702.8b + 702.15b',
                related: ['double strike','lifelink','first strike']
            },
            'hexproof+indestructible': {
                tag: 'info', tagLabel: 'Strong Defense',
                title: 'Hexproof + Indestructible',
                body: `<p>Together, these two abilities cover almost every removal method:</p><br>
                <p>• <span class="teal">Hexproof</span> stops targeted spells and abilities from opponents</p>
                <p>• <span class="teal">Indestructible</span> stops destruction effects and lethal damage</p><br>
                <p>What still works against this combination: <span class="highlight">exile</span>, <span class="highlight">sacrifice effects</span>, <span class="highlight">toughness reduction to 0</span>, and <span class="highlight">non-targeting board effects</span>.</p>`,
                nuance: { title: 'The weakness', text: 'Toxic Deluge (-X/-X to toughness) or "sacrifice a creature" effects (like Dictate of Erebos) are the cleanest answers. Neither targets, and sacrifice bypasses indestructible.' },
                example: '',
                rule: '702.11c + 702.12b',
                related: ['hexproof','indestructible','exile','sacrifice']
            }
        };

        const key1 = `${a}+${b}`;
        const key2 = `${b}+${a}`;
        return known[key1] || known[key2] || null;
    }

    // ═══════════════════════════════════════════════════════════════
    // QUESTION ANALYZER
    // ═══════════════════════════════════════════════════════════════
    function analyzeInput(text) {
        const lower = text.toLowerCase().trim();

        // 1. Try semantic question patterns first
        for (const qp of QUESTION_PATTERNS) {
            if (qp.id === 'keyword_explain') continue; // skip fallthrough
            for (const pattern of qp.patterns) {
                if (pattern.test(text)) {
                    const result = qp.respond(text.match(pattern), text);
                    if (result) return { type: 'semantic', data: result };
                }
            }
        }

        // Sort by length descending so 'flashback' matches before 'flash', 'double strike' before 'strike' etc
        const foundKws = Object.keys(KEYWORDS).filter(k => matchKw(k, lower)).sort((a,b) => b.length - a.length);
        if (foundKws.length >= 2) {
            const interaction = getKnownInteraction(foundKws[0], foundKws[1]);
            if (interaction) return { type: 'semantic', data: interaction };
            return { type: 'multi_keyword', keywords: foundKws };
        }

        // 3. Single keyword lookup
        if (foundKws.length === 1) {
            return { type: 'keyword', keyword: foundKws[0] };
        }

        // 4. Card name lookup
        return { type: 'card', text: text };
    }

    // ═══════════════════════════════════════════════════════════════
    // RULING RENDERER
    // ═══════════════════════════════════════════════════════════════
    function renderRuling(data) {
        // Keyword ruling
        if (data.type === 'keyword') {
            const kw = data.keyword;
            const d = KEYWORDS[kw];
            return renderKeywordRuling(kw, d);
        }
        // Multi-keyword
        if (data.type === 'multi_keyword') {
            return renderMultiKeyword(data.keywords);
        }
        // Semantic / context-aware
        if (data.type === 'semantic') {
            return renderSemanticAnswer(data.data);
        }
        return null;
    }

    // ─── Verdict banner helper ────────────────────────────────────────
    // tagType: 'yes' | 'no' | 'depends' | 'info'
    // statement: short plain-English verdict e.g. "Yes — you can block that"
    // reason: one-line why, shown smaller beneath statement (optional)
    function renderVerdict(tagType, statement, reason) {
        const icons = { yes: '✓', no: '✗', depends: '⚠', info: 'ℹ' };
        return `<div class="verdict-banner ${tagType || 'info'}">
            <div class="verdict-icon">${icons[tagType] || 'ℹ'}</div>
            <div class="verdict-text">
                <div class="verdict-statement">${statement}</div>
                ${reason ? `<div class="verdict-reason">${reason}</div>` : ''}
            </div>
        </div>`;
    }

    // ─── Official ruling footer ───────────────────────────────────────
    function renderOfficialRuling(ruleRef, category) {
        const cat = category ? `<span style="color:#555;margin-right:10px;">${category}</span>` : '';
        return `<div class="official-ruling">
            <div class="official-ruling-label">Official Ruling</div>
            <div class="official-ruling-ref">${cat}Comprehensive Rules — ${ruleRef}</div>
        </div>`;
    }

    // ─── Keyword ruling ───────────────────────────────────────────────
    // Layout: verdict banner → plain explanation → example → nuances → official ruling → related
    function renderKeywordRuling(kw, d) {
        const relatedChips = (d.related || []).filter(r => KEYWORDS[r]).map(r =>
            `<span class="keyword-chip" onclick="quickLookup('${r}')">${r}</span>`
        ).join('');

        const nuancesHtml = (d.nuances || []).map(n =>
            `<p style="margin-bottom:6px; font-size:13px; color:#aaa;">• ${n}</p>`
        ).join('');

        // Build a plain-English verdict statement from the plain field (strip HTML for the headline)
        const plainText = d.plain.replace(/<[^>]+>/g, '').replace(/\s+/g,' ').trim();
        // First sentence only for the verdict reason line
        const firstSentence = plainText.split(/\.\s/)[0].replace(/\.$/, '');

        return `
            <div>
                ${renderVerdict('info', kw.charAt(0).toUpperCase() + kw.slice(1), firstSentence)}
                <div class="ruling-keyword-badge">${d.category}</div>
                <div class="ruling-plain" style="margin-top:4px;">${d.plain}</div>
                <div class="ruling-example-box" style="margin-top:18px;">
                    <div class="ex-label">📖 In Play</div>
                    <p>${d.example}</p>
                </div>
                ${nuancesHtml ? `<div class="ruling-nuance"><div class="nuance-title">Key Nuances</div>${nuancesHtml}</div>` : ''}
                ${renderOfficialRuling(d.rule, d.category)}
                ${relatedChips ? `<div class="ruling-also" style="margin-top:16px;"><div class="ruling-also-label">Related Keywords</div><div class="keyword-chips">${relatedChips}</div></div>` : ''}
            </div>`;
    }

    // ─── Semantic / context answer ────────────────────────────────────
    // Layout: verdict banner → explanation body → example → nuance → official ruling → related
    function renderSemanticAnswer(d) {
        // Compare mode gets its own layout — verdict at top, columns, then official ruling
        if (d.compareMode) {
            const colAItems = d.colA.map(i => `<li>${i}</li>`).join('');
            const colBItems = d.colB.map(i => `<li>${i}</li>`).join('');
            return `<div>
                ${renderVerdict('info', d.title, d.verdict ? d.verdict.replace(/<[^>]+>/g,'').substring(0,120) : '')}
                <div class="compare-grid">
                    <div class="compare-col"><h4>${d.labelA}</h4><ul>${colAItems}</ul></div>
                    <div class="compare-col"><h4>${d.labelB}</h4><ul>${colBItems}</ul></div>
                </div>
                <div class="compare-verdict">${d.verdict}</div>
                ${renderOfficialRuling(d.rule)}
                ${renderRelated(d.related)}
            </div>`;
        }

        // Build verdict statement from tagLabel + title
        const verdictStatement = d.title || d.tagLabel || 'Ruling';
        const verdictReason = d.tagLabel && d.title && d.tagLabel !== d.title ? d.tagLabel : '';

        const nuanceHtml = d.nuance ? `
            <div class="ruling-nuance">
                <div class="nuance-title">${d.nuance.title}</div>
                ${d.nuance.text}
            </div>` : '';

        const exampleHtml = d.example ? `
            <div class="ruling-example-box">
                <div class="ex-label">📖 Example</div>
                <p>${d.example}</p>
            </div>` : '';

        return `<div>
            ${renderVerdict(d.tag || 'info', verdictStatement, verdictReason)}
            <div class="ruling-body-text">${d.body || ''}</div>
            ${exampleHtml}
            ${nuanceHtml}
            ${renderOfficialRuling(d.rule)}
            ${renderRelated(d.related)}
        </div>`;
    }

    function renderRelated(related) {
        if (!related || related.length === 0) return '';
        const chips = related.filter(r => KEYWORDS[r]).map(r =>
            `<span class="keyword-chip" onclick="quickLookup('${r}')">${r}</span>`
        ).join('');
        if (!chips) return '';
        return `<div class="ruling-also" style="margin-top:16px;"><div class="ruling-also-label">Related</div><div class="keyword-chips">${chips}</div></div>`;
    }

    function renderMultiKeyword(kwList) {
        const items = kwList.slice(0, 4).map(kw => {
            const d = KEYWORDS[kw];
            const plainText = d.plain.replace(/<[^>]+>/g,'').split(/\.\s/)[0];
            return `<div class="multi-kw-item">
                <h3>${kw.toUpperCase()}</h3>
                <div class="rule-ref">${d.category}</div>
                <p>${plainText}.</p>
            </div>`;
        }).join('');
        const kwNames = kwList.slice(0,4).map(k => k.charAt(0).toUpperCase()+k.slice(1)).join(' + ');
        return `<div>
            ${renderVerdict('info', kwNames, "Multiple keywords detected — here's each one")}
            ${items}
            <div class="official-ruling" style="margin-top:8px;">
                <div class="official-ruling-label">Official Rulings</div>
                ${kwList.slice(0,4).map(kw => `<div class="official-ruling-ref" style="margin-bottom:6px;">${kw.toUpperCase()} — CR ${KEYWORDS[kw].rule}</div>`).join('')}
            </div>
        </div>`;
    }

    // ═══════════════════════════════════════════════════════════════
    // CONVERSATION CONTEXT WINDOW
    // Tracks the rolling table conversation — last 10 utterances
    // Each entry: { text, timestamp, keywords: [] }
    // ═══════════════════════════════════════════════════════════════
    const conversationBuffer = [];
    const BUFFER_SIZE = 10;

    function bufferAdd(text) {
        const lower = text.toLowerCase();
        // Keywords sorted by position in sentence — preserves mention order
        const foundKws = Object.keys(KEYWORDS)
            .filter(k => matchKw(k, lower))
            .sort((a, b) => lower.indexOf(a) - lower.indexOf(b));
        conversationBuffer.push({ text, lower, keywords: foundKws, timestamp: Date.now() });
        if (conversationBuffer.length > BUFFER_SIZE) conversationBuffer.shift();
    }

    // Scan buffer newest-first so the most recently mentioned keywords
    // are at the front — resolveContradictionTopic picks [0] and [1] as
    // the primary topic so order matters
    function recentKeywordsFromBuffer(lookback = 3) {
        const recent = conversationBuffer.slice(-lookback).reverse();
        const seen = new Set();
        const kws = [];
        for (const utterance of recent) {
            for (const kw of utterance.keywords) {
                if (!seen.has(kw)) { seen.add(kw); kws.push(kw); }
            }
        }
        return kws;
    }

    // ═══════════════════════════════════════════════════════════════
    // STATE
    // ═══════════════════════════════════════════════════════════════
    let lastRuling = null;
    let isPaused = false;
    let disputeCount = 0;
    let sessionStartTime = Date.now();
    let recognition = null;
    let contradictionFired = false;
    let contradictionResetTimer = null; // safety net: clears the flag if handleFinal never arrives
    let rulingCooldown = false;         // prevents same ruling firing multiple times in a row
    let rulingCooldownTimer = null;
    const sessionDisputeLog = [];       // full log of every dispute this session

    // ═══════════════════════════════════════════════════════════════
    // CONTRADICTION DETECTOR
    // Tight patterns — must be clearly a rule disagreement, not casual speech
    // ═══════════════════════════════════════════════════════════════

    const CONTRADICTION_TRIGGERS = [
        // "no/yes it does/doesn't/can/can't/is/isn't"
        /\bno[,]? it (does|doesn'?t|did|didn'?t|can|can'?t|is|isn'?t)\b/i,
        /\byes[,]? it (does|doesn'?t|did|didn'?t|can|can'?t|is|isn'?t)\b/i,
        // "that's not how it works"
        /\bthat'?s? not how (it|that) works?\b/i,
        /\bit (doesn'?t?|does not) work like that\b/i,
        // "you're wrong" / "that's wrong"
        /\byou'?re? (wrong|incorrect)\b/i,
        /\bthat'?s? (wrong|incorrect|not right)\b/i,
        // "that's not what the rule/card says"
        /\bthat'?s? not what (the rule|the card|it) (says?|does|means?)\b/i,
        // "you can't [action] [anything]" — broadened to catch real speech like "you can't target my commander"
        /\byou can'?t (block|tap|sacrifice|target|cast|equip|trigger|attack with)\b/i,
        // "can't target" anywhere in sentence — catches "I can't target your commander"
        /\bcan'?t target\b/i,
        // "that's not true" — common dispute opener
        /\bthat'?s? not true\b/i,
        // "actually no" / "actually you can't"
        /\bactually (no|you can'?t|that'?s?)\b/i,
        // Explicit calls to Veritas
        /\bask veritas\b/i,
        /\bcheck the ruling\b/i,
        /\bread the card\b/i,
        /\bveritas\b/i
    ];

    // Require at least 2 words — "veritas" alone is 1 word and handled separately below
    function checkForContradiction(text) {
        const wordCount = text.trim().split(/\s+/).length;
        if (wordCount < 2) return false;
        return CONTRADICTION_TRIGGERS.some(p => p.test(text));
    }

    // Resolve contradiction topic — NEVER does a card lookup
    // Only returns keyword rules and semantic answers
    function resolveContradictionTopic(text) {
        const lower = text.toLowerCase();

        // 1. Keywords in current sentence
        const inSentence = Object.keys(KEYWORDS).filter(k => matchKw(k, lower)).sort((a,b) => b.length - a.length);
        if (inSentence.length >= 2) {
            const interaction = getKnownInteraction(inSentence[0], inSentence[1]);
            if (interaction) return { type: 'semantic', data: interaction };
            return { type: 'multi_keyword', keywords: inSentence };
        }
        if (inSentence.length === 1) return { type: 'keyword', keyword: inSentence[0] };

        // 2. Scan recent buffer for keywords (last 3 utterances)
        const recentKws = recentKeywordsFromBuffer(3);
        if (recentKws.length >= 2) {
            const interaction = getKnownInteraction(recentKws[0], recentKws[1]);
            if (interaction) return { type: 'semantic', data: interaction };
            return { type: 'multi_keyword', keywords: recentKws };
        }
        if (recentKws.length === 1) return { type: 'keyword', keyword: recentKws[0] };

        // 3. Last ruling shown — but only if it's a keyword/semantic, not a card
        if (lastRuling?.analysis?.type === 'keyword') return lastRuling.analysis;
        if (lastRuling?.analysis?.type === 'semantic') return lastRuling.analysis;
        if (lastRuling?.analysis?.type === 'multi_keyword') return lastRuling.analysis;

        return null; // never falls through to card lookup
    }

    // ═══════════════════════════════════════════════════════════════
    // INTERIM HANDLER — fires on partial speech mid-sentence
    // Only checks for contradiction signals, not full questions
    // ═══════════════════════════════════════════════════════════════
    function handleInterim(partialText) {
        if (isPaused || contradictionFired) return;
        if (!checkForContradiction(partialText)) return;

        // Fire immediately
        contradictionFired = true;

        // Safety net: if handleFinal never arrives (speech restart mid-utterance),
        // auto-reset after 2s so Veritas doesn't go permanently deaf
        clearTimeout(contradictionResetTimer);
        contradictionResetTimer = setTimeout(() => {
            contradictionFired = false;
        }, 2000);

        const topic = resolveContradictionTopic(partialText);
        triggerContradictionRuling(topic, partialText);
    }

    // ═══════════════════════════════════════════════════════════════
    // FINAL HANDLER — fires on completed utterances
    // Handles direct questions, card lookups, keyword lookups
    // ═══════════════════════════════════════════════════════════════
    function handleFinal(text) {
        if (isPaused) return;

        // Always buffer everything — Veritas is always building context silently
        bufferAdd(text);

        // If contradiction already fired on interim, just reset and stay quiet
        if (contradictionFired) {
            clearTimeout(contradictionResetTimer); // cancel safety timer — we got here normally
            contradictionFired = false;
            return;
        }

        // ── Wake word ─────────────────────────────────────────────────────
        // "Veritas" spoken alone OR as part of any sentence invokes Veritas
        if (/\bveritas\b/i.test(text)) {
            const topic = resolveContradictionTopic(text) || (lastRuling && lastRuling.analysis) || null;
            triggerContradictionRuling(topic, text);
            return;
        }

        // ── Contradiction / dispute detection ─────────────────────────────
        // This is the ONLY thing that fires a response during normal play
        if (checkForContradiction(text)) {
            const topic = resolveContradictionTopic(text);
            triggerContradictionRuling(topic, text);
            return;
        }

        // Everything else: stay completely silent
        // The table is playing — Veritas is just listening and building context
    }

    // ═══════════════════════════════════════════════════════════════
    // INTERRUPT SOUND — synthesized via Web Audio API, zero latency
    // A short sharp two-tone chime that cuts through table noise
    // ═══════════════════════════════════════════════════════════════
    function playInterruptChime() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();

            function tone(freq, startTime, duration, gainVal) {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, startTime);
                gain.gain.setValueAtTime(0, startTime);
                gain.gain.linearRampToValueAtTime(gainVal, startTime + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
                osc.start(startTime);
                osc.stop(startTime + duration);
            }

            const now = ctx.currentTime;
            tone(880, now,        0.12, 0.4);  // A5 — sharp attack
            tone(1100, now + 0.1, 0.18, 0.3);  // C#6 — rising second tone
        } catch(e) {
            // Audio not available — silent fail
        }
    }

    // ═══════════════════════════════════════════════════════════════
    // CONTRADICTION RULING — interrupt + flag
    // ═══════════════════════════════════════════════════════════════
    function triggerContradictionRuling(topic, triggerText) {
        // Don't fire if a ruling just fired — prevents rapid repeat triggers
        if (rulingCooldown) return;
        rulingCooldown = true;
        clearTimeout(rulingCooldownTimer);
        rulingCooldownTimer = setTimeout(() => { rulingCooldown = false; }, 3000);

        playInterruptChime();
        wakeFlash();

        disputeCount++;
        const dcEl = document.getElementById('dispute-counter');
        dcEl.textContent = `${disputeCount} dispute${disputeCount !== 1 ? 's' : ''}`;
        if (disputeCount > 0) dcEl.classList.add('has-disputes');
        addLog(`⚑ Contradiction detected: "${triggerText.slice(0, 60)}…"`, 'ruling');

        // Log this dispute for end-of-session save
        sessionDisputeLog.push({
            topic: topic ? (topic.keyword || topic.keywords?.join('+') || topic.type) : 'unknown',
            trigger_text: triggerText.slice(0, 120),
            timestamp: new Date().toISOString()
        });

        const confidence = topic ? 'high' : 'low';

        if (topic) {
            const ruling = renderRuling(topic);
            if (ruling) {
                showRuling(ruling, topic, { isDispute: true, confidence });
                return;
            }
        }

        // Nothing found — prompt
        showRuling(`<div>
            <div class="ruling-title" style="margin-top:8px;">What's the dispute about?</div>
            <div class="ruling-answer-body" style="margin-top:14px;font-size:15px;color:#aaa;">
                Veritas heard a disagreement but couldn't identify the rule.<br><br>
                Say the keyword or card name being disputed and Veritas will pull the ruling immediately.
            </div>
        </div>`, {}, { isDispute: true, confidence: 'low' });
        speak('What rule are you disputing?');
    }

    function getSpokenText(analysis) {
        if (analysis.type === 'keyword') {
            const d = KEYWORDS[analysis.keyword];
            return `${analysis.keyword}. ${d.plain.replace(/<[^>]+>/g,'').replace(/&amp;/g,'and')}`;
        }
        if (analysis.type === 'semantic') {
            const d = analysis.data;
            return d.tagLabel + '. ' + (d.body||'').replace(/<[^>]+>/g,'').replace(/&amp;/g,'and').slice(0,200);
        }
        return null;
    }

    function getRulingLabel(analysis) {
        if (analysis.type === 'keyword') return analysis.keyword;
        if (analysis.type === 'semantic') return analysis.data.title;
        if (analysis.type === 'multi_keyword') return analysis.keywords.join(', ');
        return 'card lookup';
    }

    function extractCardName(text) {
        return text
            .replace(/how does|what does|what is|tell me about|explain|search for|look up|how do i use|how do i play/gi, '')
            .replace(/\b(work|works|do|does|mean|means|use|used|played?)\b/gi, '')
            .replace(/\?/g, '')
            .replace(/\s+/g, ' ')
            .trim();
    }

    // ═══════════════════════════════════════════════════════════════
    // RULING OVERLAY
    // ═══════════════════════════════════════════════════════════════
    function showRuling(html, analysis, disputeOpts) {
        const overlay = document.getElementById('ruling-overlay');
        const content = overlay.querySelector('.ruling-content');
        const body = document.getElementById('ruling-body');

        if (disputeOpts?.isDispute) {
            const confidenceLabel = { high: 'High confidence dispute', medium: 'Possible dispute', low: 'Dispute signal detected' };
            const flagHtml = `<div class="dispute-flag">
                <span class="dispute-flag-icon">⚑</span>
                <div class="dispute-flag-text">
                    <strong>${confidenceLabel[disputeOpts.confidence] || 'Dispute Detected'}</strong>
                    Ruling re-confirmed below — this is the official answer.
                </div>
            </div>`;
            body.innerHTML = flagHtml + html;
            content.classList.add('dispute-mode');
        } else {
            body.innerHTML = html;
            content.classList.remove('dispute-mode');
        }

        overlay.classList.add('show');
        if (analysis && Object.keys(analysis).length) lastRuling = { html, analysis };
    }

    function quickLookup(kw) {
        if (KEYWORDS[kw]) {
            const html = renderKeywordRuling(kw, KEYWORDS[kw]);
            showRuling(html, { type: 'keyword', keyword: kw });
            speak(kw + '. ' + KEYWORDS[kw].plain.replace(/<[^>]+>/g,'').slice(0,150));
        }
    }

    function closeRuling(event) {
        if (!event || event.target.id === 'ruling-overlay' || event.target.classList.contains('close-btn')) {
            document.getElementById('ruling-overlay').classList.remove('show');
        }
    }

    async function showCardRuling(cardName) {
        const overlay = document.getElementById('ruling-overlay');
        const body = document.getElementById('ruling-body');
        body.innerHTML = `<div style="text-align:center;padding:40px;color:#666;">🔍 Looking up <em>${cardName}</em>…</div>`;
        overlay.classList.add('show');

        try {
            const res = await fetch(`https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(cardName)}`);
            if (!res.ok) throw new Error('Not found');
            const card = await res.json();

            let rulingsHtml = '';
            try {
                const rRes = await fetch(card.rulings_uri);
                const rData = await rRes.json();
                if (rData.data.length > 0) {
                    rulingsHtml = `<div class="rulings-box"><h4>Official Rulings</h4><ul>
                        ${rData.data.slice(0,3).map(r=>`<li>${r.comment}</li>`).join('')}
                    </ul></div>`;
                }
            } catch(e) {}

            const img = card.image_uris?.normal || card.card_faces?.[0]?.image_uris?.normal || '';
            const cardAnalysis = { type: 'card', name: card.name };
            showRuling(`
                <div class="card-ruling-grid">
                    <div class="card-img-wrap">
                        ${img ? `<img src="${img}" alt="${card.name}" class="card-image">` : '<div style="height:200px;display:flex;align-items:center;justify-content:center;color:#555;">No image</div>'}
                    </div>
                    <div class="card-details">
                        <h2>${card.name}</h2>
                        <div class="card-type">${card.type_line}</div>
                        <div class="oracle-box">${(card.oracle_text || card.card_faces?.[0]?.oracle_text || 'No oracle text.').replace(/\n/g,'<br>')}</div>
                        ${rulingsHtml}
                    </div>
                </div>`, cardAnalysis);

            speak(`${card.name}. ${card.type_line}. ${(card.oracle_text || '').slice(0,100)}`);
            addLog(`Card: ${card.name}`, 'ruling');
        } catch(e) {
            body.innerHTML = `<div style="padding:30px">
                <div class="ruling-answer-tag no">Not Found</div>
                <div class="ruling-title">Card Not Found</div>
                <p style="color:#999;margin-top:12px;">Couldn't find "<em>${cardName}</em>" — check the spelling or try the manual search.</p>
            </div>`;
        }
    }

    // ═══════════════════════════════════════════════════════════════
    // SPEECH
    // ═══════════════════════════════════════════════════════════════
    function speak(text) {
        if (!('speechSynthesis' in window)) return;
        window.speechSynthesis.cancel();
        const clean = text
            .replace(/<[^>]+>/g, '')        // strip HTML tags
            .replace(/\{[^}]+\}/g, '')       // strip mana symbols {W}{U}{2}{T}
            .replace(/&amp;/g, 'and')
            .replace(/\s+/g, ' ')
            .trim();
        if (!clean) return;
        const utt = new SpeechSynthesisUtterance(clean);
        utt.rate = 0.95;

        // Mute the mic while Veritas is speaking — prevents TTS output
        // from feeding back into speech recognition and re-triggering disputes
        if (recognition) { try { recognition.abort(); } catch(e) {} }

        utt.onend = () => {
            // Small delay so the mic doesn't catch the tail of the audio
            setTimeout(() => { if (!isPaused) startListening(); }, 400);
        };

        window.speechSynthesis.speak(utt);
    }

    // ═══════════════════════════════════════════════════════════════
    // SPEECH RECOGNITION ENGINE
    // Chrome's Web Speech API stops itself on silence regardless of
    // continuous=true. The only reliable approach is to treat each
    // session as disposable: when onend fires, throw the object away
    // and create a fresh one. This avoids InvalidStateError entirely
    // and eliminates the stale-interim-event replay problem.
    // ═══════════════════════════════════════════════════════════════
    function setupSpeechRecognition() {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) {
            addLog('Speech recognition not supported — use Chrome or Edge.', 'system');
            return;
        }
        startListening(SR);
    }

    function startListening(SR) {
        if (isPaused) return;

        // Always discard and recreate — never reuse a stopped recognition object
        if (recognition) {
            recognition.onstart = null;
            recognition.onresult = null;
            recognition.onerror = null;
            recognition.onend = null;
            try { recognition.abort(); } catch(e) {}
        }

        const SR2 = SR || window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SR2();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'en-US';
        recognition.maxAlternatives = 1;

        recognition.onstart = () => {
            const dbg = document.getElementById('debug-info'); if(dbg) dbg.textContent = 'Listening';
        };

        recognition.onresult = (e) => {
            if (isPaused) return;
            if (!e.results || e.results.length === 0) return;
            const result = e.results[e.results.length - 1];
            if (!result || !result[0]) return;
            const transcript = result[0].transcript;
            if (!transcript || !transcript.trim()) return;

            if (result.isFinal) {
                handleFinal(transcript.trim());
            } else {
                handleInterim(transcript.trim());
            }
        };

        recognition.onerror = (e) => {
            // no-speech = normal silence gap, not an error
            // aborted = we called abort() ourselves during restart
            if (e.error === 'no-speech' || e.error === 'aborted') return;
            // not-allowed = mic permission denied — tell the user
            if (e.error === 'not-allowed') {
                addLog('Microphone permission denied. Allow mic access and reload.', 'system');
                const dbg2 = document.getElementById('debug-info'); if(dbg2) dbg2.textContent = 'Mic blocked';
                return;
            }
            addLog('Mic error: ' + e.error, 'system');
        };

        recognition.onend = () => {
            // Chrome fires onend on every silence cutout (~7-10s with no speech).
            // We restart immediately with a fresh object rather than calling start()
            // on the dead one — this is the only way to avoid the beep/gap cycle.
            if (isPaused) {
                
                return;
            }
            // Tiny defer so the browser fully tears down before we create the next session
            setTimeout(() => startListening(SR2), 50);
        };

        try {
            recognition.start();
        } catch(e) {
            // If start fails, retry once after a short delay
            setTimeout(() => startListening(SR2), 300);
        }
    }

    // ═══════════════════════════════════════════════════════════════
    // BUTTONS
    // ═══════════════════════════════════════════════════════════════
    function togglePause() {
        isPaused = !isPaused;
        const lbl = document.getElementById('standby-label');
        if (isPaused) {
            if (lbl) lbl.textContent = 'Paused';
            document.getElementById('debug-info') && (document.getElementById('debug-info').textContent = 'Paused');
            if (recognition) { try { recognition.abort(); } catch(e) {} }
        } else {
            if (lbl) lbl.textContent = 'Listening';
            startListening();
        }
    }

    function repeatLastRuling() {
        if (lastRuling) {
            showRuling(lastRuling.html, lastRuling.analysis);
            const spoken = getSpokenText(lastRuling.analysis);
            if (spoken) speak(spoken);
        } else {
            speak('No previous ruling.');
        }
    }

    function showManualSearch() {
        const name = prompt('Enter card name:');
        if (name?.trim()) showCardRuling(name.trim());
    }

    function showRuleReference() {
        const categories = {};
        for (const [kw, d] of Object.entries(KEYWORDS)) {
            if (!categories[d.category]) categories[d.category] = [];
            categories[d.category].push(kw);
        }
        let html = '<div><div class="ruling-title" style="margin-bottom:20px;">Keyword Reference</div>';
        for (const [cat, kws] of Object.entries(categories)) {
            html += `<div style="margin-bottom:18px;">
                <div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#555;margin-bottom:8px;">${cat}</div>
                <div class="keyword-chips">
                    ${kws.map(k=>`<span class="keyword-chip" onclick="quickLookup('${k}');event.stopPropagation();">${k}</span>`).join('')}
                </div>
            </div>`;
        }
        html += '</div>';
        showRuling(html, {});
    }

    function testManually() {
        // Test by simulating a dispute scenario with a known keyword pair
        // These bypass the silent-only handleFinal and go straight to the ruling
        const topics = [
            { type: 'semantic', data: null, _kw: 'trample+deathtouch' },
            { type: 'keyword', keyword: 'hexproof' },
            { type: 'keyword', keyword: 'indestructible' },
            { type: 'keyword', keyword: 'first strike' },
            { type: 'keyword', keyword: 'commander damage' },
            { type: 'keyword', keyword: 'deathtouch' },
            { type: 'keyword', keyword: 'lifelink' },
            { type: 'keyword', keyword: 'trample' },
        ];
        const pick = topics[Math.floor(Math.random() * topics.length)];
        let topic = pick;
        if (pick._kw) {
            const [a, b] = pick._kw.split('+');
            const interaction = getKnownInteraction(a, b);
            topic = interaction ? { type: 'semantic', data: interaction } : { type: 'keyword', keyword: a };
        }
        triggerContradictionRuling(topic, 'test trigger');
    }

    // ═══════════════════════════════════════════════════════════════
    // END SESSION — save to backend then navigate away
    // ═══════════════════════════════════════════════════════════════
    const BACKEND_URL = 'https://your-railway-app.up.railway.app'; // ← swap this for your Railway URL

    async function endSession() {
        if (recognition) { isPaused = true; recognition.stop(); }

        // Build session summary
        const durationSeconds = Math.floor((Date.now() - sessionStartTime) / 1000);
        const topKeywords = getTopKeywordsFromBuffer();
        const disputeLog = sessionDisputeLog;

        const payload = {
            duration_seconds: durationSeconds,
            dispute_count: disputeCount,
            top_keywords: topKeywords,
            disputes: disputeLog,
            ended_at: new Date().toISOString()
        };

        try {
            await fetch(`${BACKEND_URL}/api/sessions`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        } catch(e) {
            // Save failed — don't block navigation, just log
            console.warn('[Veritas] Session save failed:', e);
        }

        window.location.href = 'index.html';
    }

    // Pull the most-mentioned keywords from the full conversation buffer
    function getTopKeywordsFromBuffer() {
        const counts = {};
        for (const utterance of conversationBuffer) {
            for (const kw of utterance.keywords) {
                counts[kw] = (counts[kw] || 0) + 1;
            }
        }
        return Object.entries(counts)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 5)
            .map(([kw]) => kw);
    }

    function addLog(msg, type = 'system') {
        // Silent — Veritas does not display a running transcript
        // Disputes and rulings are shown in the overlay only
        console.debug('[Veritas]', type, msg);
    }

    function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

    // ═══════════════════════════════════════════════════════════════
    // PARTICLES & INIT
    // ═══════════════════════════════════════════════════════════════
    // ═══════════════════════════════════════════════════════════════
    // AMBIENT CANVAS — slow drifting soft particles in background
    // Communicates "alive and watching" without being distracting
    // ═══════════════════════════════════════════════════════════════
    function initAmbientCanvas() {
        const canvas = document.getElementById('ambient-canvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let W, H, particles;

        function resize() {
            W = canvas.width  = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // Create subtle floating motes
        particles = Array.from({length: 60}, () => ({
            x: Math.random() * W,
            y: Math.random() * H,
            r: Math.random() * 1.5 + 0.3,
            vx: (Math.random() - 0.5) * 0.15,
            vy: (Math.random() - 0.5) * 0.15,
            opacity: Math.random() * 0.12 + 0.02,
            phase: Math.random() * Math.PI * 2,
            speed: Math.random() * 0.008 + 0.003
        }));

        function draw() {
            ctx.clearRect(0, 0, W, H);
            const t = Date.now() / 1000;
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < -5) p.x = W + 5;
                if (p.x > W + 5) p.x = -5;
                if (p.y < -5) p.y = H + 5;
                if (p.y > H + 5) p.y = -5;
                const alpha = p.opacity * (0.6 + 0.4 * Math.sin(t * p.speed * 60 + p.phase));
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0,167,181,${alpha})`;
                ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        draw();
    }

    // Brief teal flash when Veritas wakes
    function wakeFlash() {
        const el = document.getElementById('wake-flash');
        if (!el) return;
        el.classList.remove('fire');
        // Force reflow so the animation restarts if fired twice quickly
        void el.offsetWidth;
        el.classList.add('fire');
    }

    function createParticles() {
        // Replaced by initAmbientCanvas — kept for compatibility
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeRuling();
        if (e.key === ' ' && e.ctrlKey) { e.preventDefault(); togglePause(); }
        if (e.key === 'r' && e.ctrlKey) { e.preventDefault(); repeatLastRuling(); }
    });

    window.addEventListener('load', () => {
        initAmbientCanvas();
        setupSpeechRecognition();
        // Veritas starts silently — no log spam on init

        setInterval(() => {
            const s = Math.floor((Date.now() - sessionStartTime) / 1000);
            const h = Math.floor(s/3600).toString().padStart(2,'0');
            const m = Math.floor((s%3600)/60).toString().padStart(2,'0');
            const sec = (s%60).toString().padStart(2,'0');
            document.getElementById('session-timer').textContent = `${h}:${m}:${sec}`;
        }, 1000);

        window.addEventListener('beforeunload', () => {
            if (recognition) recognition.stop();
        });
    });
    </script>
