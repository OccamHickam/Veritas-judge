    // ═══════════════════════════════════════════════════════════════
    // RULING RENDERER
    // ═══════════════════════════════════════════════════════════════
    function renderVerdict(tagType, statement, reason) {
        const icons = { yes: '✓', no: '✗', depends: '⚠', info: 'ℹ' };
        return `<div class="verdict-banner ${tagType || 'info'}">
            <div class="verdict-icon">${icons[tagType] || 'ℹ'}</div>
            <div class="verdict-text">
                <div class="verdict-statement">${statement}</div>
                ${reason ? `<div class="verdict-reason">${reason}</div>` : ''}
            </div>
        </div>`;
    }

    function renderOfficialRuling(ruleRef, category) {
        const cat = category ? `<span style="color:#555;margin-right:10px;">${category}</span>` : '';
        return `<div class="official-ruling">
            <div class="official-ruling-label">Official Ruling</div>
            <div class="official-ruling-ref">${cat}Comprehensive Rules — ${ruleRef}</div>
        </div>`;
    }

    function renderKeywordRuling(kw, d) {
        const relatedChips = (d.related || []).filter(r => KEYWORDS[r]).map(r =>
            `<span class="keyword-chip" onclick="quickLookup('${r}')">${r}</span>`
        ).join('');
        const nuancesHtml = (d.nuances || []).map(n =>
            `<p style="margin-bottom:6px;font-size:13px;color:#aaa;">• ${n}</p>`
        ).join('');
        const plainText = d.plain.replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim();
        const firstSentence = plainText.split(/\.\s/)[0].replace(/\.$/, '');
        return `<div>
            ${renderVerdict('info', kw.charAt(0).toUpperCase() + kw.slice(1), firstSentence)}
            <div class="ruling-keyword-badge">${d.category}</div>
            <div class="ruling-plain" style="margin-top:4px;">${d.plain}</div>
            <div class="ruling-example-box" style="margin-top:18px;">
                <div class="ex-label">📖 In Play</div>
                <p>${d.example}</p>
            </div>
            ${nuancesHtml ? `<div class="ruling-nuance"><div class="nuance-title">Key Nuances</div>${nuancesHtml}</div>` : ''}
            ${renderOfficialRuling(d.rule, d.category)}
            ${relatedChips ? `<div class="ruling-also" style="margin-top:16px;"><div class="ruling-also-label">Related Keywords</div><div class="keyword-chips">${relatedChips}</div></div>` : ''}
        </div>`;
    }

    function renderSemanticAnswer(d) {
        if (d.compareMode) {
            const colAItems = d.colA.map(i => `<li>${i}</li>`).join('');
            const colBItems = d.colB.map(i => `<li>${i}</li>`).join('');
            return `<div>
                ${renderVerdict('info', d.title, d.verdict ? d.verdict.replace(/<[^>]+>/g,'').substring(0,120) : '')}
                <div class="compare-grid">
                    <div class="compare-col"><h4>${d.labelA}</h4><ul>${colAItems}</ul></div>
                    <div class="compare-col"><h4>${d.labelB}</h4><ul>${colBItems}</ul></div>
                </div>
                <div class="compare-verdict">${d.verdict}</div>
                ${renderOfficialRuling(d.rule)}
                ${renderRelated(d.related)}
            </div>`;
        }
        const verdictStatement = d.title || d.tagLabel || 'Ruling';
        const verdictReason = d.tagLabel && d.title && d.tagLabel !== d.title ? d.tagLabel : '';
        const nuanceHtml = d.nuance ? `<div class="ruling-nuance"><div class="nuance-title">${d.nuance.title}</div>${d.nuance.text}</div>` : '';
        const exampleHtml = d.example ? `<div class="ruling-example-box"><div class="ex-label">📖 Example</div><p>${d.example}</p></div>` : '';
        return `<div>
            ${renderVerdict(d.tag || 'info', verdictStatement, verdictReason)}
            <div class="ruling-body-text">${d.body || ''}</div>
            ${exampleHtml}${nuanceHtml}
            ${renderOfficialRuling(d.rule)}
            ${renderRelated(d.related)}
        </div>`;
    }

    function renderRelated(related) {
        if (!related || related.length === 0) return '';
        const chips = related.filter(r => KEYWORDS[r]).map(r =>
            `<span class="keyword-chip" onclick="quickLookup('${r}')">${r}</span>`
        ).join('');
        if (!chips) return '';
        return `<div class="ruling-also" style="margin-top:16px;"><div class="ruling-also-label">Related</div><div class="keyword-chips">${chips}</div></div>`;
    }

    function renderMultiKeyword(kwList) {
        const items = kwList.slice(0,4).map(kw => {
            const d = KEYWORDS[kw];
            const plainText = d.plain.replace(/<[^>]+>/g,'').split(/\.\s/)[0];
            return `<div class="multi-kw-item">
                <h3>${kw.toUpperCase()}</h3>
                <div class="rule-ref">${d.category}</div>
                <p>${plainText}.</p>
            </div>`;
        }).join('');
        const kwNames = kwList.slice(0,4).map(k => k.charAt(0).toUpperCase()+k.slice(1)).join(' + ');
        return `<div>
            ${renderVerdict('info', kwNames, 'Multiple keywords detected')}
            ${items}
            <div class="official-ruling" style="margin-top:8px;">
                <div class="official-ruling-label">Official Rulings</div>
                ${kwList.slice(0,4).map(kw => `<div class="official-ruling-ref" style="margin-bottom:6px;">${kw.toUpperCase()} — CR ${KEYWORDS[kw].rule}</div>`).join('')}
            </div>
        </div>`;
    }

    function renderRuling(data) {
        if (data.type === 'keyword') return renderKeywordRuling(data.keyword, KEYWORDS[data.keyword]);
        if (data.type === 'multi_keyword') return renderMultiKeyword(data.keywords);
        if (data.type === 'semantic') return renderSemanticAnswer(data.data);
        return null;
    }

    // ═══════════════════════════════════════════════════════════════
    // CONVERSATION CONTEXT BUFFER
    // ═══════════════════════════════════════════════════════════════
    const conversationBuffer = [];
    const BUFFER_SIZE = 10;

    function bufferAdd(text) {
        const lower = text.toLowerCase();
        const foundKws = Object.keys(KEYWORDS)
            .filter(k => matchKw(k, lower))
            .sort((a, b) => lower.indexOf(a) - lower.indexOf(b));
        conversationBuffer.push({ text, lower, keywords: foundKws, timestamp: Date.now() });
        if (conversationBuffer.length > BUFFER_SIZE) conversationBuffer.shift();
    }

    function recentKeywordsFromBuffer(lookback = 3) {
        const recent = conversationBuffer.slice(-lookback).reverse();
        const seen = new Set(); const kws = [];
        for (const utterance of recent) {
            for (const kw of utterance.keywords) {
                if (!seen.has(kw)) { seen.add(kw); kws.push(kw); }
            }
        }
        return kws;
    }

    // ═══════════════════════════════════════════════════════════════
    // STATE
    // ═══════════════════════════════════════════════════════════════
    let lastRuling = null;
    let lastTriggerText = '';
    let isPaused = false;
    let disputeCount = 0;
    let sessionStartTime = Date.now();
    let recognition = null;
    let contradictionFired = false;
    let contradictionResetTimer = null;
    let isSpeaking = false;
    let rulingCooldown = false;
    let rulingCooldownTimer = null;
    const sessionDisputeLog = [];
    const rulingHistory = [];

    // ═══════════════════════════════════════════════════════════════
    // CONTRADICTION DETECTOR
    // ═══════════════════════════════════════════════════════════════
    const CONTRADICTION_TRIGGERS = [
        /\bno[,]? it (does|doesn'?t|did|didn'?t|can|can'?t|is|isn'?t)\b/i,
        /\byes[,]? it (does|doesn'?t|did|didn'?t|can|can'?t|is|isn'?t)\b/i,
        /\bthat'?s? not how (it|that) works?\b/i,
        /\bit (doesn'?t?|does not) work like that\b/i,
        /\byou'?re? (wrong|incorrect)\b/i,
        /\bthat'?s? (wrong|incorrect|not right)\b/i,
        /\bthat'?s? not what (the rule|the card|it) (says?|does|means?)\b/i,
        /\byou can'?t (block|tap|sacrifice|target|cast|equip|trigger|attack with|respond|do that)\b/i,
        /\bcan'?t target\b/i,
        /\bthat'?s? not true\b/i,
        /\bactually (no|you can'?t|that'?s?)\b/i,
        /\bthat (doesn'?t|does not) trigger\b/i,
        /\bit (doesn'?t|does not) trigger\b/i,
        /\bstate.?based action\b/i,
        /\byou can'?t respond to that\b/i,
        /\byou missed (your )?priority\b/i,
        /\bpriority doesn'?t work like that\b/i,
        /\bthat'?s? already on (the )?stack\b/i,
        /\bthe stack doesn'?t\b/i,
        /\byou have to pass priority\b/i,
        /\bthat resolves (before|after|first)\b/i,
        /\bthat doesn'?t resolve\b/i,
        /\byou can'?t (counter|stack|play) that\b/i,
        /\bsimultaneous(ly)?\b/i,
        /\bthat'?s? not a (triggered|activated|static) ability\b/i,
        /\task veritas\b/i,
        /\bcheck the ruling\b/i,
        /\bread the card\b/i,
        /\bveritas\b/i
    ];

    function checkForContradiction(text) {
        const wordCount = text.trim().split(/\s+/).length;
        if (wordCount < 2) return false;
        return CONTRADICTION_TRIGGERS.some(p => p.test(text));
    }

    function resolveContradictionTopic(text) {
        const lower = text.toLowerCase();
        const inSentence = Object.keys(KEYWORDS).filter(k => matchKw(k, lower)).sort((a,b) => b.length - a.length);
        if (inSentence.length >= 2) {
            const interaction = getKnownInteraction(inSentence[0], inSentence[1]);
            if (interaction) return { type: 'semantic', data: interaction };
            return { type: 'multi_keyword', keywords: inSentence };
        }
        if (inSentence.length === 1) return { type: 'keyword', keyword: inSentence[0] };
        const recentKws = recentKeywordsFromBuffer(6);
        if (recentKws.length >= 2) {
            const interaction = getKnownInteraction(recentKws[0], recentKws[1]);
            if (interaction) return { type: 'semantic', data: interaction };
            return { type: 'multi_keyword', keywords: recentKws };
        }
        if (recentKws.length === 1) return { type: 'keyword', keyword: recentKws[0] };
        if (lastRuling?.analysis?.type === 'keyword') return lastRuling.analysis;
        if (lastRuling?.analysis?.type === 'semantic') return lastRuling.analysis;
        if (lastRuling?.analysis?.type === 'multi_keyword') return lastRuling.analysis;
        return null;
    }

    // ═══════════════════════════════════════════════════════════════
    // INTERIM HANDLER
    // ═══════════════════════════════════════════════════════════════
    function handleInterim(partialText) {
        if (isPaused || contradictionFired || isSpeaking) return;
        if (!checkForContradiction(partialText)) return;
        contradictionFired = true;
        clearTimeout(contradictionResetTimer);
        contradictionResetTimer = setTimeout(() => { contradictionFired = false; }, 2000);
        const topic = resolveContradictionTopic(partialText);
        triggerContradictionRuling(topic, partialText);
    }

    // ═══════════════════════════════════════════════════════════════
    // FINAL HANDLER
    // ═══════════════════════════════════════════════════════════════
    function handleFinal(text) {
        if (isPaused || isSpeaking) return;
        bufferAdd(text);
        if (contradictionFired) {
            clearTimeout(contradictionResetTimer);
            contradictionFired = false;
            return;
        }
        if (/\bveritas\b/i.test(text)) {
            const topic = resolveContradictionTopic(text) || (lastRuling && lastRuling.analysis) || null;
            triggerContradictionRuling(topic, text);
            return;
        }
        if (checkForContradiction(text)) {
            const topic = resolveContradictionTopic(text);
            triggerContradictionRuling(topic, text);
            return;
        }
    }

    // ═══════════════════════════════════════════════════════════════
    // INTERRUPT CHIME
    // ═══════════════════════════════════════════════════════════════
    function playInterruptChime() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            function tone(freq, startTime, duration, gainVal) {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.type = 'sine'; osc.frequency.setValueAtTime(freq, startTime);
                gain.gain.setValueAtTime(0, startTime);
                gain.gain.linearRampToValueAtTime(gainVal, startTime + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
                osc.start(startTime); osc.stop(startTime + duration);
            }
            const now = ctx.currentTime;
            tone(880, now, 0.12, 0.4);
            tone(1100, now + 0.1, 0.18, 0.3);
        } catch(e) {}
    }

    // ═══════════════════════════════════════════════════════════════
    // CONTRADICTION RULING
    // ═══════════════════════════════════════════════════════════════
    function triggerContradictionRuling(topic, triggerText) {
        if (rulingCooldown) return;
        rulingCooldown = true;
        clearTimeout(rulingCooldownTimer);
        rulingCooldownTimer = setTimeout(() => { rulingCooldown = false; }, 3000);

        lastTriggerText = triggerText || '';
        playInterruptChime();
        wakeFlash();

        disputeCount++;
        const dcEl = document.getElementById('dispute-counter');
        dcEl.textContent = `${disputeCount} dispute${disputeCount !== 1 ? 's' : ''}`;
        if (disputeCount > 0) dcEl.classList.add('has-disputes');

        sessionDisputeLog.push({
            topic: topic ? (topic.keyword || topic.keywords?.join('+') || topic.type) : 'unknown',
            trigger_text: (triggerText || '').slice(0, 120),
            timestamp: new Date().toISOString()
        });

        if (topic) {
            const ruling = renderRuling(topic);
            if (ruling) {
                showRuling(ruling, topic, { isDispute: true });
                const spoken = getSpokenText(topic);
                if (spoken) speak(spoken);
                return;
            }
        }

        showRuling(`<div>
            <div class="ruling-title" style="margin-top:8px;">What's the dispute about?</div>
            <div class="ruling-answer-body" style="margin-top:14px;font-size:15px;color:#aaa;">
                Veritas heard a disagreement but couldn't identify the rule.<br><br>
                Say the keyword or card name being disputed and Veritas will pull the ruling immediately.
            </div>
        </div>`, {}, { isDispute: true });
        speak('What rule are you disputing?');
    }

    function getSpokenText(analysis) {
        if (!analysis) return null;
        if (analysis.type === 'keyword') {
            const d = KEYWORDS[analysis.keyword];
            // Prefer tableTalk for spoken delivery — it's written conversationally
            if (d?.tableTalk) return d.tableTalk.replace(/<[^>]+>/g,'');
            return `${analysis.keyword}. ${d?.plain?.replace(/<[^>]+>/g,'').replace(/&amp;/g,'and') || ''}`;
        }
        if (analysis.type === 'semantic') {
            const d = analysis.data;
            return d.tagLabel + '. ' + (d.body||'').replace(/<[^>]+>/g,'').replace(/&amp;/g,'and').slice(0,200);
        }
        return null;
    }

    // ═══════════════════════════════════════════════════════════════
    // SHOW RULING OVERLAY
    // ═══════════════════════════════════════════════════════════════
    function showRuling(html, analysis, disputeOpts) {
        const overlay = document.getElementById('ruling-overlay');
        const body = document.getElementById('ruling-body');
        const verdictEl = document.getElementById('bubble-verdict');
        const badgeEl = document.getElementById('bubble-badge');
        const analogyEl = document.getElementById('bubble-analogy');

        const isDispute = disputeOpts?.isDispute || false;

        if (isDispute) {
            badgeEl.innerHTML = '<div class="bubble-dispute-badge">⚑ Dispute Detected</div>';
        } else {
            badgeEl.innerHTML = '';
        }

        // Build speech bubble verdict text from tableTalk or natural language
        const verdictText = buildVerdict(analysis);
        verdictEl.innerHTML = verdictText;

        // Show analogy in bubble if available for single keyword
        if (analysis?.type === 'keyword' && KEYWORDS[analysis.keyword]?.analogy) {
            analogyEl.textContent = KEYWORDS[analysis.keyword].analogy;
            analogyEl.style.display = 'block';
        } else {
            analogyEl.style.display = 'none';
        }

        // Build details section
        if (analysis && Object.keys(analysis).length) {
            body.innerHTML = buildDetailsHtml(analysis, isDispute);
        } else {
            body.innerHTML = html;
        }

        overlay.scrollTop = 0;
        overlay.classList.add('show');

        if (analysis && Object.keys(analysis).length) {
            lastRuling = { html, analysis };
            const label = analysis.keyword || (analysis.keywords && analysis.keywords.join('+')) ||
                          (analysis.data && analysis.data.title) || 'Ruling';
            rulingHistory.unshift({ html, analysis, label, time: Date.now() });
            if (rulingHistory.length > 5) rulingHistory.pop();
            renderHistoryPanel();
        }
    }

    function renderHistoryPanel() {
        const panel = document.getElementById('history-panel');
        if (!panel) return;
        if (rulingHistory.length === 0) { panel.style.display = 'none'; return; }
        panel.style.display = 'flex';
        panel.innerHTML = rulingHistory.map((r, i) => {
            const mins = Math.floor((Date.now() - r.time) / 60000);
            const timeStr = mins < 1 ? 'just now' : `${mins}m ago`;
            return `<div class="history-item" onclick="showHistoryRuling(${i})">
                <span class="history-label">${r.label}</span>
                <span class="history-time">${timeStr}</span>
            </div>`;
        }).join('');
    }

    function showHistoryRuling(index) {
        const r = rulingHistory[index];
        if (!r) return;
        showRuling(r.html, r.analysis);
    }

    function quickLookup(kw) {
        if (KEYWORDS[kw]) {
            const html = renderKeywordRuling(kw, KEYWORDS[kw]);
            showRuling(html, { type: 'keyword', keyword: kw });
            const spoken = getSpokenText({ type: 'keyword', keyword: kw });
            if (spoken) speak(spoken.slice(0, 200));
        }
    }

    function closeRuling() {
        document.getElementById('ruling-overlay').classList.remove('show');
        document.getElementById('ruling-overlay').scrollTop = 0;
    }

    async function showCardRuling(cardName) {
        const overlay = document.getElementById('ruling-overlay');
        const body = document.getElementById('ruling-body');
        const verdictEl = document.getElementById('bubble-verdict');
        const analogyEl = document.getElementById('bubble-analogy');
        document.getElementById('bubble-badge').innerHTML = '';
        verdictEl.innerHTML = `Looking up <em>${cardName}</em>…`;
        analogyEl.style.display = 'none';
        body.innerHTML = `<div style="text-align:center;padding:40px;color:#666;">🔍 Fetching from Scryfall…</div>`;
        overlay.scrollTop = 0;
        overlay.classList.add('show');

        try {
            const res = await fetch(`https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(cardName)}`);
            if (!res.ok) throw new Error('Not found');
            const card = await res.json();

            let rulingsHtml = '';
            try {
                const rRes = await fetch(card.rulings_uri);
                const rData = await rRes.json();
                if (rData.data.length > 0) {
                    rulingsHtml = `<div class="rulings-box"><h4>Official Rulings</h4><ul>
                        ${rData.data.slice(0,3).map(r=>`<li>${r.comment}</li>`).join('')}
                    </ul></div>`;
                }
            } catch(e) {}

            const img = card.image_uris?.normal || card.card_faces?.[0]?.image_uris?.normal || '';
            const cardAnalysis = { type: 'card', name: card.name };

            verdictEl.innerHTML = `<strong>${card.name}</strong> — ${card.type_line}`;
            body.innerHTML = `
                <div class="card-ruling-grid">
                    <div class="card-img-wrap">
                        ${img ? `<img src="${img}" alt="${card.name}" class="card-image">` : '<div style="height:200px;display:flex;align-items:center;justify-content:center;color:#555;">No image</div>'}
                    </div>
                    <div class="card-details">
                        <h2>${card.name}</h2>
                        <div class="card-type">${card.type_line}</div>
                        <div class="oracle-box">${(card.oracle_text || card.card_faces?.[0]?.oracle_text || 'No oracle text.').replace(/\n/g,'<br>')}</div>
                        ${rulingsHtml}
                    </div>
                </div>`;

            lastRuling = { html: body.innerHTML, analysis: cardAnalysis };
            speak(`${card.name}. ${card.type_line}. ${(card.oracle_text || '').slice(0,100)}`);
        } catch(e) {
            verdictEl.innerHTML = `Card not found: <em>${cardName}</em>`;
            body.innerHTML = `<div style="padding:30px">
                <div class="ruling-answer-tag no">Not Found</div>
                <div class="ruling-title">Card Not Found</div>
                <p style="color:#999;margin-top:12px;">Couldn't find "<em>${cardName}</em>" — check the spelling or try the manual search.</p>
            </div>`;
        }
    }

    // ═══════════════════════════════════════════════════════════════
    // SPEECH SYNTHESIS
    // ═══════════════════════════════════════════════════════════════
    function speak(text) {
        if (!('speechSynthesis' in window)) return;
        window.speechSynthesis.cancel();
        const clean = text
            .replace(/<[^>]+>/g, '').replace(/\{[^}]+\}/g, '')
            .replace(/&amp;/g, 'and').replace(/\s+/g, ' ').trim();
        if (!clean) return;
        const utt = new SpeechSynthesisUtterance(clean);
        utt.rate = 0.95;
        isSpeaking = true;
        utt.onend = () => { setTimeout(() => { isSpeaking = false; }, 600); };
        window.speechSynthesis.speak(utt);
    }

    // ═══════════════════════════════════════════════════════════════
    // SPEECH RECOGNITION — persistent object, no beep on restart
    // ═══════════════════════════════════════════════════════════════
    function acceptAndStart() {
        const screen = document.getElementById('tablet-accept');
        if (screen) screen.classList.add('hidden');
        setupSpeechRecognition();
    }

    function setupSpeechRecognition() {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) {
            setOrbState('dead');
            return;
        }
        recognition = new SR();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'en-US';
        recognition.maxAlternatives = 1;

        recognition.onstart = () => { setOrbState('listening'); };

        recognition.onresult = (e) => {
            if (isPaused) return;
            if (!e.results || e.results.length === 0) return;
            const result = e.results[e.results.length - 1];
            if (!result || !result[0]) return;
            const transcript = result[0].transcript;
            if (!transcript || !transcript.trim()) return;
            if (result.isFinal) { handleFinal(transcript.trim()); }
            else { handleInterim(transcript.trim()); }
        };

        recognition.onerror = (e) => {
            if (e.error === 'no-speech' || e.error === 'aborted') return;
            if (e.error === 'not-allowed') { setOrbState('dead'); showMicDenied(); return; }
        };

        recognition.onend = () => {
            if (isPaused) { setOrbState('paused'); return; }
            setOrbState('reconnecting');
            setTimeout(() => {
                if (!isPaused) { try { recognition.start(); } catch(e) {} }
            }, 100);
        };

        try { recognition.start(); }
        catch(e) { setTimeout(() => { try { recognition.start(); } catch(e2) {} }, 300); }
    }

    function startListening() {
        if (!recognition) { setupSpeechRecognition(); return; }
        if (isPaused) return;
        try { recognition.start(); } catch(e) {}
        setOrbState('listening');
    }

    // ═══════════════════════════════════════════════════════════════
    // BUTTON HANDLERS
    // ═══════════════════════════════════════════════════════════════
    function togglePause() {
        isPaused = !isPaused;
        const lbl = document.getElementById('standby-label');
        if (isPaused) {
            if (lbl) lbl.textContent = 'Paused';
            if (recognition) { try { recognition.abort(); } catch(e) {} }
            setOrbState('paused');
        } else {
            if (lbl) lbl.textContent = 'Listening';
            startListening();
            setOrbState('listening');
        }
    }

    function repeatLastRuling() {
        if (lastRuling) {
            showRuling(lastRuling.html, lastRuling.analysis);
            const spoken = getSpokenText(lastRuling.analysis);
            if (spoken) speak(spoken);
        } else {
            speak('No previous ruling.');
        }
    }

    function showManualSearch() {
        const name = prompt('Enter card name:');
        if (name?.trim()) showCardRuling(name.trim());
    }

    function showRuleReference() {
        const categories = {};
        for (const [kw, d] of Object.entries(KEYWORDS)) {
            if (!categories[d.category]) categories[d.category] = [];
            categories[d.category].push(kw);
        }
        let html = '<div><div class="ruling-title" style="margin-bottom:20px;">Keyword Reference</div>';
        for (const [cat, kws] of Object.entries(categories)) {
            html += `<div style="margin-bottom:18px;">
                <div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#555;margin-bottom:8px;">${cat}</div>
                <div class="keyword-chips">
                    ${kws.map(k=>`<span class="keyword-chip" onclick="quickLookup('${k}');event.stopPropagation();">${k}</span>`).join('')}
                </div>
            </div>`;
        }
        html += '</div>';
        showRuling(html, {});
    }

    function testManually() {
        const topics = [
            { type: 'keyword', keyword: 'trample' },
            { type: 'keyword', keyword: 'hexproof' },
            { type: 'keyword', keyword: 'first strike' },
            { type: 'keyword', keyword: 'deathtouch' },
            { type: 'keyword', keyword: 'commander damage' },
            { type: 'keyword', keyword: 'indestructible' },
            { type: 'keyword', keyword: 'lifelink' },
            { type: 'keyword', keyword: 'flying' },
        ];
        const pick = topics[Math.floor(Math.random() * topics.length)];
        lastTriggerText = 'test trigger';
        triggerContradictionRuling(pick, 'test trigger');
    }

    // ═══════════════════════════════════════════════════════════════
    // END SESSION
    // ═══════════════════════════════════════════════════════════════
    const BACKEND_URL = 'https://your-railway-app.up.railway.app'; // ← swap for your Railway URL

    function endSession() {
        if (recognition) { isPaused = true; try { recognition.stop(); } catch(e) {} }
        const durationSeconds = Math.floor((Date.now() - sessionStartTime) / 1000);
        const h = Math.floor(durationSeconds / 3600).toString().padStart(2,'0');
        const m = Math.floor((durationSeconds % 3600) / 60).toString().padStart(2,'0');
        const s = (durationSeconds % 60).toString().padStart(2,'0');
        const topKeywords = getTopKeywordsFromBuffer();

        document.getElementById('summary-stats').innerHTML = `
            <div class="summary-stat">
                <div class="summary-stat-value">${h}:${m}:${s}</div>
                <div class="summary-stat-label">Duration</div>
            </div>
            <div class="summary-stat">
                <div class="summary-stat-value">${disputeCount}</div>
                <div class="summary-stat-label">Disputes Resolved</div>
            </div>`;

        const kwHtml = topKeywords.length > 0
            ? topKeywords.map(k => `<span class="summary-kw-chip">${k}</span>`).join('')
            : '<span style="color:rgba(255,255,255,0.15);font-size:12px;">No keywords detected</span>';
        document.getElementById('summary-keywords').innerHTML = `
            <div class="summary-keywords-label">Top Keywords This Session</div>
            <div class="summary-kw-chips">${kwHtml}</div>`;
        document.getElementById('session-summary').classList.add('show');
    }

    function dismissSummary() {
        document.getElementById('session-summary').classList.remove('show');
        isPaused = false;
        try { recognition.start(); } catch(e) {}
        setOrbState('listening');
    }

    async function confirmEndSession() {
        const durationSeconds = Math.floor((Date.now() - sessionStartTime) / 1000);
        const topKeywords = getTopKeywordsFromBuffer();
        const payload = {
            duration_seconds: durationSeconds, dispute_count: disputeCount,
            top_keywords: topKeywords, disputes: sessionDisputeLog,
            ended_at: new Date().toISOString()
        };
        try {
            await fetch(BACKEND_URL + '/api/sessions', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        } catch(e) { console.warn('[Veritas] Session save failed:', e); }
        window.location.href = 'index.html';
    }

    function getTopKeywordsFromBuffer() {
        const counts = {};
        for (const utterance of conversationBuffer) {
            for (const kw of utterance.keywords) { counts[kw] = (counts[kw] || 0) + 1; }
        }
        return Object.entries(counts).sort((a,b) => b[1]-a[1]).slice(0,5).map(([kw]) => kw);
    }

    // ═══════════════════════════════════════════════════════════════
    // ORB STATE
    // ═══════════════════════════════════════════════════════════════
    function setOrbState(state) {
        const orb = document.querySelector('.veritas-orb');
        const lbl = document.getElementById('standby-label');
        if (!orb) return;
        orb.classList.remove('state-listening','state-reconnecting','state-dead','state-paused');
        orb.classList.add(`state-${state}`);
        const labels = { listening: 'Listening', reconnecting: 'Reconnecting', dead: 'Mic unavailable', paused: 'Paused' };
        if (lbl) lbl.textContent = labels[state] || state;
    }

    function showMicDenied() {
        const screen = document.getElementById('tablet-accept');
        if (screen) {
            screen.classList.remove('hidden');
            screen.innerHTML = `
                <div class="accept-orb">
                    <div class="accept-orb-ring" style="border-color:rgba(255,107,107,0.3)"></div>
                    <div class="accept-orb-ring" style="border-color:rgba(255,107,107,0.2)"></div>
                    <div class="accept-orb-core" style="border-color:rgba(255,107,107,0.3);background:radial-gradient(circle,rgba(255,107,107,0.1),transparent)"></div>
                </div>
                <div class="accept-title" style="color:rgba(255,107,107,0.6)">Mic Blocked</div>
                <div class="accept-subtitle">
                    Veritas needs microphone access.<br><br>
                    1. Click the lock icon in the address bar<br>
                    2. Set Microphone to <strong style="color:#fff">Allow</strong><br>
                    3. Reload the page
                </div>
                <button class="accept-btn" style="border-color:rgba(255,107,107,0.4);color:rgba(255,107,107,0.8)" onclick="location.reload()">Reload Page</button>`;
        }
    }

    // ═══════════════════════════════════════════════════════════════
    // AMBIENT CANVAS
    // ═══════════════════════════════════════════════════════════════
    function initAmbientCanvas() {
        const canvas = document.getElementById('ambient-canvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let W, H, particles;

        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', resize);

        particles = Array.from({length: 60}, () => ({
            x: Math.random() * window.innerWidth,
            y: Math.random() * window.innerHeight,
            r: Math.random() * 1.5 + 0.3,
            vx: (Math.random() - 0.5) * 0.15,
            vy: (Math.random() - 0.5) * 0.15,
            opacity: Math.random() * 0.12 + 0.02,
            phase: Math.random() * Math.PI * 2,
            speed: Math.random() * 0.008 + 0.003
        }));

        function draw() {
            ctx.clearRect(0, 0, W, H);
            const t = Date.now() / 1000;
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if (p.x < -5) p.x = W + 5; if (p.x > W + 5) p.x = -5;
                if (p.y < -5) p.y = H + 5; if (p.y > H + 5) p.y = -5;
                const alpha = p.opacity * (0.6 + 0.4 * Math.sin(t * p.speed * 60 + p.phase));
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0,167,181,${alpha})`; ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        draw();
    }

    function wakeFlash() {
        const el = document.getElementById('wake-flash');
        if (!el) return;
        el.classList.remove('fire');
        void el.offsetWidth;
        el.classList.add('fire');
    }

    // ═══════════════════════════════════════════════════════════════
    // KEYBOARD SHORTCUTS
    // ═══════════════════════════════════════════════════════════════
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeRuling();
        if (e.key === ' ' && e.ctrlKey) { e.preventDefault(); togglePause(); }
        if (e.key === 'r' && e.ctrlKey) { e.preventDefault(); repeatLastRuling(); }
    });

    // ═══════════════════════════════════════════════════════════════
    // INIT
    // ═══════════════════════════════════════════════════════════════
    window.addEventListener('load', () => {
        initKeywords();
        initAmbientCanvas();

        setInterval(() => {
            const s = Math.floor((Date.now() - sessionStartTime) / 1000);
            const h = Math.floor(s/3600).toString().padStart(2,'0');
            const m = Math.floor((s%3600)/60).toString().padStart(2,'0');
            const sec = (s%60).toString().padStart(2,'0');
            const el = document.getElementById('session-timer');
            if (el) el.textContent = `${h}:${m}:${sec}`;
        }, 1000);

        window.addEventListener('beforeunload', () => { if (recognition) recognition.stop(); });
    });
    </script>
</body>
