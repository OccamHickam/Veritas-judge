<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veritas - Game Session</title>
    <style>
        /* ═══ BACKGROUND ═══ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #00a7b5;
            border-radius: 50%;
            opacity: 0.3;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            from { transform: translateY(100vh) translateX(0); }
            to { transform: translateY(-100vh) translateX(100px); }
        }

        /* ═══ LAYOUT ═══ */
        #game-session {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px 20px 40px;
        }

        /* ═══ TOP BAR ═══ */
        .status-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #00a7b5;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .timer {
            font-size: 24px;
            font-weight: bold;
            color: #00a7b5;
            font-family: 'Courier New', monospace;
        }

        .dispute-counter {
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        .debug-info {
            font-size: 12px;
            color: #666;
            font-family: monospace;
        }

        .end-session-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(10, 10, 15, 0.9);
            border: 2px solid #00a7b5;
            color: #00a7b5;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            z-index: 20;
        }

        .end-session-btn:hover {
            background: #00a7b5;
            color: white;
            transform: translateY(-2px);
        }

        /* ═══ QUICK ACTIONS ═══ */
        .quick-actions-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .quick-action-btn {
            background: rgba(0, 167, 181, 0.1);
            border: 1px solid #00a7b5;
            color: #00a7b5;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .quick-action-btn:hover {
            background: #00a7b5;
            color: white;
            transform: translateY(-2px);
        }

        /* ═══ LISTENING INDICATOR ═══ */
        .listening-container {
            text-align: center;
            padding: 40px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            margin-bottom: 30px;
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .listening-container.active {
            border-color: #00a7b5;
            box-shadow: 0 0 30px rgba(0, 167, 181, 0.3);
        }

        .listening-pulse {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(0, 167, 181, 0.2);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .listening-container.active .listening-pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
        }

        .mic-icon {
            font-size: 32px;
            color: #00a7b5;
        }

        .status-text {
            font-size: 24px;
            color: #00a7b5;
            margin-bottom: 10px;
        }

        .status-subtext {
            font-size: 14px;
            color: #666;
        }

        /* ═══ CONFIDENCE INDICATOR ═══ */
        .confidence-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(10, 10, 15, 0.9);
            border: 1px solid #333;
            padding: 15px;
            border-radius: 10px;
            display: none;
            z-index: 100;
        }

        .confidence-indicator.show {
            display: block;
        }

        .confidence-indicator.high {
            border-color: #4ecdc4;
            box-shadow: 0 0 20px rgba(78, 205, 196, 0.5);
        }

        .confidence-indicator.medium {
            border-color: #ffe66d;
            box-shadow: 0 0 20px rgba(255, 230, 109, 0.5);
        }

        .confidence-indicator.low {
            border-color: #ff6b6b;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
        }

        /* ═══ LOG ═══ */
        .log-container {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            padding: 20px;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 20px;
        }

        .log-entry {
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            font-size: 14px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .log-entry.player {
            background: rgba(0, 167, 181, 0.1);
            border-left: 3px solid #00a7b5;
        }

        .log-entry.system {
            background: rgba(255, 255, 255, 0.05);
            border-left: 3px solid #666;
            font-style: italic;
        }

        .log-entry.ruling {
            background: rgba(78, 205, 196, 0.1);
            border-left: 3px solid #4ecdc4;
        }

        /* ═══ RULING OVERLAY ═══ */
        .ruling-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .ruling-overlay.show {
            display: flex;
        }

        .ruling-content {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 2px solid #00a7b5;
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 0 50px rgba(0, 167, 181, 0.3);
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: #00a7b5;
            font-size: 24px;
            cursor: pointer;
        }

        /* ═══ KEYWORD RULING ═══ */
        .keyword-ruling h2 {
            color: #00a7b5;
            margin-bottom: 20px;
            font-size: 32px;
        }

        .keyword-rule {
            background: rgba(0, 167, 181, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
            color: #4ecdc4;
        }

        .keyword-description {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .keyword-example {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #ffe66d;
        }

        .keyword-example h4 {
            color: #ffe66d;
            margin-bottom: 10px;
        }

        /* ═══ CARD RULING ═══ */
        .card-ruling {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 30px;
        }

        .card-image-container {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }

        .card-image {
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .card-details h2 {
            color: #00a7b5;
            margin-bottom: 10px;
        }

        .card-type {
            color: #666;
            margin-bottom: 20px;
            font-style: italic;
        }

        .oracle-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .rulings-box {
            background: rgba(0, 167, 181, 0.05);
            padding: 20px;
            border-radius: 10px;
        }

        .rulings-box h4 {
            color: #4ecdc4;
            margin-bottom: 10px;
        }

        /* ═══ COMBO DISPLAY ═══ */
        .combo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .combo-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            border: 1px solid #333;
            transition: all 0.3s;
        }

        .combo-card:hover {
            border-color: #00a7b5;
            transform: translateY(-5px);
        }

        /* ═══ RESPONSIVE ═══ */
        @media (max-width: 768px) {
            .card-ruling {
                grid-template-columns: 1fr;
            }
            
            .status-bar {
                flex-direction: column;
                gap: 10px;
                padding: 10px;
            }
            
            .timer {
                font-size: 18px;
            }
            
            .end-session-btn {
                position: relative;
                top: auto;
                right: auto;
                margin-top: 10px;
            }
        }
    </style>
    <base target="_blank">
<base target="_blank">
</head>
<body>
    <!-- End Session Button -->
    <button class="end-session-btn" onclick="endSession()">← End Session</button>

    <!-- Background -->
    <div id="particles"></div>

    <!-- Status Bar -->
    <div class="status-bar">
        <div class="timer" id="session-timer">00:00:00</div>
        <div class="dispute-counter" id="dispute-counter">Disputes: 0</div>
        <div class="debug-info" id="debug-info">Ready</div>
    </div>

    <!-- Main Session -->
    <div id="game-session">
        <!-- Quick Actions -->
        <div class="quick-actions-bar">
            <button class="quick-action-btn" onclick="togglePause()">⏯️ Pause/Resume</button>
            <button class="quick-action-btn" onclick="repeatLastRuling()">🔄 Repeat Last</button>
            <button class="quick-action-btn" onclick="showManualSearch()">🔍 Manual Search</button>
            <button class="quick-action-btn" onclick="showRuleReference()">📚 Rule Reference</button>
            <button class="quick-action-btn" onclick="testManually()">🧪 Test</button>
        </div>

        <!-- Confidence Indicator -->
        <div class="confidence-indicator" id="confidence-indicator">
            <div>Confidence: <span id="confidence-level">-</span></div>
        </div>

        <!-- Listening Indicator -->
        <div class="listening-container active" id="listening-container">
            <div class="listening-pulse">
                <div class="mic-icon">🎤</div>
            </div>
            <div class="status-text" id="status-text">Listening...</div>
            <div class="status-subtext" id="status-subtext">Speak a card name or ask a question</div>
        </div>
    </div>

    <!-- Log -->
    <div class="log-container" id="log-container"></div>

    <!-- Ruling Overlay -->
    <div class="ruling-overlay" id="ruling-overlay" onclick="closeRuling(event)">
        <div class="ruling-content" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeRuling()">✕</button>
            <div id="ruling-body"></div>
        </div>
    </div>

    <script>
        console.log('🎮 Veritas Game Session Loading...');

        // ═══════════════════════════════════════
        // KEYWORD DATABASE
        // ═══════════════════════════════════════
        const keywords = {
            'trample': {
                rule: '702.19b',
                description: 'The controller of an attacking creature with trample first assigns damage to the creature(s) blocking it. Once all those blocking creatures are assigned lethal damage, any excess damage is assigned as its controller chooses among those blocking creatures and the player or planeswalker the creature is attacking.',
                example: 'You attack with a 6/6 creature with trample. It is blocked by a 2/2 creature. You assign 2 damage to the blocker (lethal) and the remaining 4 damage tramples over to the defending player.'
            },
            'hexproof': {
                rule: '702.11c',
                description: '"Hexproof" on a permanent means "This permanent can\'t be the target of spells or abilities your opponents control."',
                example: 'Your opponent cannot cast Doom Blade on your hexproof creature, but they can still destroy it with board wipes like Wrath of God that don\'t target.'
            },
            'deathtouch': {
                rule: '702.2b',
                description: 'A creature with toughness greater than 0 that\'s been dealt damage by a source with deathtouch since the last time state-based actions were checked is destroyed as a state-based action.',
                example: 'A 1/1 creature with deathtouch blocks a 10/10 creature. Both deal damage, and both are destroyed because 1 damage is lethal from deathtouch.'
            },
            'flying': {
                rule: '702.9b',
                description: 'A creature with flying can\'t be blocked except by creatures with flying and/or reach.',
                example: 'Your creature with flying can attack past ground creatures, but can be blocked by other flying creatures or creatures with reach.'
            },
            'haste': {
                rule: '702.10b',
                description: 'A creature with haste can attack and tap as soon as it comes under its controller\'s control.',
                example: 'You can cast a creature with haste and attack with it immediately, or use its tap ability right away.'
            },
            'vigilance': {
                rule: '702.20b',
                description: 'Attacking doesn\'t cause creatures with vigilance to tap.',
                example: 'A creature with vigilance can attack and still be able to block on your opponent\'s turn, or use tap abilities after attacking.'
            },
            'first strike': {
                rule: '702.7b',
                description: 'If at least one attacking or blocking creature has first strike or double strike as the combat damage step begins, the only creatures that assign combat damage in that step are those with first strike or double strike.',
                example: 'A 2/2 with first strike blocks a 3/3 without first strike. The 2/2 deals damage first, killing the 3/3 before it can deal damage back.'
            },
            'double strike': {
                rule: '702.8b',
                description: 'A creature with double strike deals damage during the first combat damage step in addition to the second combat damage step.',
                example: 'A 3/3 with double strike deals 3 damage in the first strike damage step, then 3 more in the normal damage step, for 6 total damage.'
            },
            'reach': {
                rule: '702.17b',
                description: 'A creature with reach can block creatures with flying as though it had flying.',
                example: 'Your creature with reach can block flying creatures, but doesn\'t have flying itself for purposes of being blocked.'
            },
            'indestructible': {
                rule: '702.12b',
                description: 'A permanent with indestructible can\'t be destroyed. Such permanents aren\'t destroyed by lethal damage, and they ignore the "destroy" effect of state-based actions.',
                example: 'Your indestructible creature can survive Wrath of God and combat with larger creatures, but can still be exiled, bounced, or have toughness reduced to 0.'
            },
            'lifelink': {
                rule: '702.15b',
                description: 'Damage dealt by a source with lifelink causes that source\'s controller to gain that much life.',
                example: 'A 5/5 with lifelink deals 5 damage to a creature. You gain 5 life at the same time the damage is dealt.'
            },
            'menace': {
                rule: '702.110b',
                description: 'A creature with menace can\'t be blocked except by two or more creatures.',
                example: 'Your 3/3 with menace attacks. Your opponent must block with at least two creatures, or let it through unblocked.'
            },
            'flash': {
                rule: '702.8a',
                description: 'Flash is a static ability that functions in any zone from which you could play the card it\'s on. "Flash" means "You may play this card any time you could cast an instant."',
                example: 'You can cast a creature with flash during your opponent\'s combat phase to block, or at end of their turn to avoid sorcery-speed removal.'
            },
            'protection': {
                rule: '702.16e',
                description: 'Any damage that would be dealt by sources that have the stated quality to a permanent or player with protection is prevented.',
                example: 'A creature with protection from red can\'t be damaged, enchanted, blocked, or targeted by anything red.'
            },
            'shroud': {
                rule: '702.18b',
                description: '"Shroud" means "This permanent or player can\'t be the target of spells or abilities."',
                example: 'Unlike hexproof, shroud prevents targeting by anyone, including you. You can\'t equip it or target it with your own spells.'
            },
            'defender': {
                rule: '702.3b',
                description: 'A creature with defender can\'t attack.',
                example: 'Walls and other creatures with defender can block normally but cannot attack. Some have special abilities that trigger when they block.'
            },
            'prowess': {
                rule: '702.107a',
                description: 'Prowess is a triggered ability. "Prowess" means "Whenever you cast a noncreature spell, this creature gets +1/+1 until end of turn."',
                example: 'You cast an instant. Your creature with prowess gets +1/+1 until end of turn. Cast another spell, it gets another +1/+1.'
            },
            'enchant': {
                rule: '702.5a',
                description: 'Enchant is a static ability, written "Enchant [object or player]." The enchant ability restricts what an Aura can target and what an Aura can enchant.',
                example: 'An Aura with "Enchant creature" can only target and attach to creatures. If the enchanted creature leaves play, the Aura goes to the graveyard.'
            },
            'equip': {
                rule: '702.6a',
                description: 'Equip is an activated ability of Equipment cards. "Equip [cost]" means "[Cost]: Attach this permanent to target creature you control."',
                example: 'You pay the equip cost to attach the Equipment to one of your creatures. You can move it to another creature by paying the cost again.'
            },
            'fight': {
                rule: '701.12',
                description: 'When two creatures fight, each deals damage equal to its power to the other.',
                example: 'Your 3/3 fights their 2/2. Your 3/3 deals 3 damage to the 2/2 (killing it), and their 2/2 deals 2 damage to your 3/3 (leaving it as a 3/1).'
            },
            'sacrifice': {
                rule: '701.15a',
                description: 'To sacrifice a permanent, its controller moves it from the battlefield directly to its owner\'s graveyard.',
                example: 'You cast a spell that says "Sacrifice a creature." You choose one of your creatures and put it into your graveyard. You don\'t get any "dies" triggers.'
            },
            'counter': {
                rule: '701.5a',
                description: 'To counter a spell or ability means to cancel it, removing it from the stack.',
                example: 'You cast Counterspell targeting their Lightning Bolt. When Counterspell resolves, Lightning Bolt is removed from the stack and does nothing.'
            },
            'exile': {
                rule: '406.3',
                description: 'Exile is a game zone outside the field of play. It is essentially a holding area for objects.',
                example: 'Path to Exile exiles a creature. The creature doesn\'t die, so "dies" triggers don\'t happen. It can return with effects like flicker.'
            },
            'mill': {
                rule: '701.13a',
                description: 'To mill a number of cards, a player puts that many cards from the top of their library into their graveyard.',
                example: 'You cast a spell that says "Target player mills 3 cards." They put the top 3 cards of their library into their graveyard.'
            },
            'scry': {
                rule: '701.18a',
                description: 'To scry N, look at the top N cards of your library, then put any number of them on the bottom of your library in any order and the rest on top in any order.',
                example: 'You scry 2. Look at the top 2 cards. Put one on the bottom, one back on top (or both on bottom, or keep both on top in any order).'
            },
            ' surveil': {
                rule: '701.42a',
                description: 'To surveil N, look at the top N cards of your library, then you may put any number of them into your graveyard and the rest on top of your library in any order.',
                example: 'You surveil 2. Look at top 2 cards. You can mill 0, 1, or 2 of them, putting the rest back on top in any order you choose.'
            },
            'explore': {
                rule: '701.40a',
                description: 'To explore, reveal the top card of your library. If it\'s a land, put it into your hand. Otherwise, put a +1/+1 counter on the exploring creature, then you may put the revealed card into your graveyard.',
                example: 'Your creature explores. Reveal top card. If land: take it. If not: +1/+1 counter, then choose to keep or mill the card.'
            },
            'commander': {
                rule: '903.3',
                description: 'Each deck has a legendary creature designated as its commander. The commander begins the game in the command zone.',
                example: 'Your commander is in the command zone. You can cast it from there. Each time it dies or is exiled, you can return it to the command zone.'
            },
            'commander tax': {
                rule: '903.8',
                description: 'A player may cast their commander from the command zone. Each time they do, it costs {2} more for each previous time they\'ve cast it from the command zone that game.',
                example: 'Your commander costs {1}{G}{W} normally. First cast from command zone: {1}{G}{W}. Second cast: {3}{G}{W}. Third cast: {5}{G}{W}, and so on.'
            }
        };

        // ═══════════════════════════════════════
        // SEMANTIC QUESTION PATTERNS
        // ═══════════════════════════════════════
        const questionPatterns = {
            bypass: {
                patterns: [
                    /if i (sacrifice|sac|kill|destroy) .+ does .+ (get|have|gain) .+ (damage|power|toughness|\+|counter)/i,
                    /if .+ dies? does .+ (get|have|gain|trigger)/i,
                    /when .+ dies? does .+ (get|have|gain|trigger)/i,
                    /does .+ (trigger|work|happen) if .+ (die|dies|sacrificed|destroyed)/i
                ],
                response: (matches) => {
                    return {
                        type: 'bypass_answer',
                        answer: 'YES - This will work as you expect. When a creature dies or is sacrificed, any triggered abilities that look for that condition will trigger normally. The game checks the last known information of the creature to determine if it had the relevant ability.',
                        explanation: 'Death triggers and sacrifice synergies work because the game uses "last known information" - it looks at what the creature had when it was last on the battlefield.',
                        rule: '603.10',
                        related: ['sacrifice', 'dies', 'trigger']
                    };
                }
            },
            prevention: {
                patterns: [
                    /can i (prevent|stop|avoid) .+ (damage|combat|attacking)/i,
                    /how (do|can) i (prevent|stop) .+ (damage|combat)/i,
                    /what (prevents|stops) .+ (damage|combat|attacking)/i,
                    /does .+ (prevent|stop) .+ (damage|combat)/i
                ],
                response: (matches) => {
                    return {
                        type: 'prevention_answer',
                        answer: 'Prevention effects apply before damage is dealt. You can prevent damage using protection, prevention spells like Fog, or by removing the source. Note that "prevent all damage" effects won\'t stop abilities that don\'t deal damage (like "destroy target creature").',
                        explanation: 'Damage prevention creates a replacement effect that modifies how damage is dealt. It can reduce damage to 0, but won\'t stop non-damage effects.',
                        rule: '615.1',
                        related: ['protection', 'fog', 'prevention']
                    };
                }
            },
            interaction: {
                patterns: [
                    /how does .+ (interact|work|combine) with .+/i,
                    /what happens when .+ (meets|fights|blocks|attacks into) .+/i,
                    /do .+ and .+ (work|combine|interact) (together)?/i,
                    /can .+ (block|target|affect) .+/i
                ],
                response: (matches) => {
                    return {
                        type: 'interaction_answer',
                        answer: 'To give you a precise answer, I need to know the specific cards involved. Each interaction depends on timestamps, layers, and specific wording. Common interactions: Protection prevents damage/enchanting/targeting. Deathtouch makes any damage lethal. First strike changes combat order.',
                        explanation: 'Magic interactions depend on the specific cards, their abilities, and the game state. Layer system determines how continuous effects apply.',
                        rule: '613.1',
                        related: ['layers', 'interaction', 'protection']
                    };
                }

        // ═══════════════════════════════════════
        // DISPUTE DETECTOR
        // ═══════════════════════════════════════
        class ImprovedDisputeDetector {
            constructor() {
                this.disputePatterns = [
                    /\b(no|wait|hold on|stop|that's not right|incorrect|wrong|actually|but|hang on)\b/i,
                    /\b(i think|don't you mean|are you sure|check again|verify)\b/i,
                    /\b(dispute|challenge|objection|appeal)\b/i,
                    /(\?.*\?)/,
                    /\b(but|however|although)\s+(that|this|it)\s+(isn't|is not|doesn't|does not)\b/i
                ];
                this.confidenceLevels = {
                    HIGH: 'high',
                    MEDIUM: 'medium',
                    LOW: 'low'
                };
            }

            analyze(text) {
                const matches = this.disputePatterns.filter(pattern => pattern.test(text));
                const confidence = this.calculateConfidence(matches, text);
                
                return {
                    detected: matches.length > 0,
                    confidence: confidence,
                    matches: matches.length,
                    timestamp: new Date().toISOString()
                };
            }

            calculateConfidence(matches, text) {
                if (matches.length >= 3) return this.confidenceLevels.HIGH;
                if (matches.length === 2) return this.confidenceLevels.MEDIUM;
                if (matches.length === 1 && text.length > 50) return this.confidenceLevels.MEDIUM;
                return this.confidenceLevels.LOW;
            }
        }

                }
            },
            
            getLast(type) {
                for (let i = this.history.length - 1; i >= 0; i--) {
                    if (this.history[i].type === type) {
                        return this.history[i];
                    }
                }
                return null;
            },
            
            clear() {
                this.history = [];
            }
        };

        // ═══════════════════════════════════════
        // QUESTION ANALYSIS
        // ═══════════════════════════════════════
        function analyzeQuestion(text) {
            const lowerText = text.toLowerCase();
            
            // Check for semantic patterns first
            for (const [type, data] of Object.entries(questionPatterns)) {
                for (const pattern of data.patterns) {
                    if (pattern.test(text)) {
                        console.log('✅ Semantic pattern matched:', type);
                        return data.response(text.match(pattern));
                    }
                }
            }

            // Check for multiple keywords
            const foundKeywords = [];
            for (const [keyword, data] of Object.entries(keywords)) {
                if (lowerText.includes(keyword)) {
                    foundKeywords.push({ keyword, data });
                }
            }

            if (foundKeywords.length > 1) {
                return {
                    type: 'multiple_keywords',
                    keywords: foundKeywords
                };
            }

            if (foundKeywords.length === 1) {
                return {
                    type: 'keyword',
                    keywords: foundKeywords
                };
            }

            // Check for card names
            const cardPatterns = [
                /what does (.+?) do/i,
                /how does (.+?) work/i,
                /tell me about (.+?)(?:\?|$)/i,
                /(.+?) vs (.+)/i,
                /(.+?) and (.+)/i
            ];

            for (const pattern of cardPatterns) {
                const match = text.match(pattern);
                if (match) {
                    const cards = match.slice(1).map(c => c.trim()).filter(c => c.length > 2);
                    if (cards.length > 1) {
                        return {
                            type: 'combo',
                            cards: cards
                        };
                    } else if (cards.length === 1) {
                        return {
                            type: 'card',
                            cards: cards,
                            needsCardName: false
                        };
                    }
                }
            }

            // Generic card reference
            if (lowerText.includes('card') || lowerText.includes('creature') || lowerText.includes('spell')) {
                return {
                    type: 'card',
                    cards: [],
                    needsCardName: true
                };
            }

            return {
                type: 'unknown',
                text: text
            };
        }

        // ═══════════════════════════════════════
        // MAIN SPEECH HANDLER
        // ═══════════════════════════════════════
        function handleSpeech(text) {
            if (isProcessing || isPaused) return;

            console.log('🎤 Speech:', text);
            isProcessing = true;

            addLog('You: ' + text, 'player');
            conversationContext.add('question', text);

            const analysis = analyzeQuestion(text);
            console.log('📊 Analysis:', analysis.type);

            // ═══ KEYWORDS BYPASS DISPUTE DETECTION ═══
            if (analysis.type === 'keyword' || 
                analysis.type === 'multiple_keywords' ||
                analysis.type === 'bypass_answer' || 
                analysis.type === 'prevention_answer' || 
                analysis.type === 'interaction_answer' || 
                analysis.type === 'comparison_answer') {

                console.log('✅ Keyword/semantic detected - processing immediately');

                // Semantic answers
                if (analysis.type === 'bypass_answer' || 
                    analysis.type === 'prevention_answer' || 
                    analysis.type === 'interaction_answer' || 
                    analysis.type === 'comparison_answer') {
                    showSemanticAnswer(analysis);
                    isProcessing = false;
                    return;
                }

                // Multiple keywords
                if (analysis.type === 'multiple_keywords') {
                    showMultipleKeywords(analysis.keywords);
                    isProcessing = false;
                    return;
                }

                // Single keyword
                if (analysis.type === 'keyword') {
                    showKeywordRuling(analysis.keywords[0].keyword, analysis.keywords[0].data);
                    isProcessing = false;
                    return;
                }
            }

            // ═══ DISPUTE DETECTION ═══
            const disputeCheck = detector.analyze(text);
            if (disputeCheck.detected) {
                console.log('⚠️ Potential dispute detected:', disputeCheck.confidence);
                disputeCount++;
                window.sessionData.disputesDetected = disputeCount;
                document.getElementById('dispute-counter').textContent = `Disputes: ${disputeCount}`;
                
                const indicator = document.getElementById('confidence-indicator');
                const level = document.getElementById('confidence-level');
                indicator.className = 'confidence-indicator show ' + disputeCheck.confidence;
                level.textContent = disputeCheck.confidence;

                setTimeout(() => {
                    indicator.className = 'confidence-indicator';
                }, 3000);
            }

            // ═══ CARD HANDLING ═══
            // Handle combo (multiple cards)
            if (analysis.type === 'combo') {
                showComboRuling(analysis.cards);
                isProcessing = false;
                return;
            }

            // Handle single card
            if (analysis.type === 'card') {
                if (analysis.needsCardName) {
                    expectingCardName = true;
                    speak('What card are you asking about?');
                    setState(States.WAITING);
                } else {
                    showCardRuling(analysis.cards[0]);
                }
                isProcessing = false;
                return;
            }

            // ═══ NO MATCH ═══
            if (disputeCheck.detected) {
                speak('I heard you. Please ask about a specific card or rule.');
            } else {
                speak('I didn\'t understand. Try asking about a keyword like trample or hexproof, or say "help" for options.');
            }
            
            isProcessing = false;
        }

        function setState(state) {
            currentState = state;
            const container = document.getElementById('listening-container');
            const statusText = document.getElementById('status-text');
            const statusSubtext = document.getElementById('status-subtext');
            
            switch(state) {
                case States.LISTENING:
                    container.classList.add('active');
                    statusText.textContent = 'Listening...';
                    statusSubtext.textContent = 'Speak a card name or ask a question';
                    break;
                case States.PROCESSING:
                    container.classList.remove('active');
                    statusText.textContent = 'Processing...';
                    statusSubtext.textContent = 'Analyzing your question';
                    break;
                case States.WAITING:
                    container.classList.remove('active');
                    statusText.textContent = 'Waiting...';
                    statusSubtext.textContent = 'Please provide more information';
                    break;
            }
        }

        function setupSpeechRecognition() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                console.log('❌ Speech recognition not supported');
                addLog('Speech recognition not supported in this browser', 'system');
                return;
            }

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onstart = function() {
                console.log('🟢 Recognition started');
                document.getElementById('debug-info').textContent = 'Listening';
            };

            recognition.onresult = function(event) {
                const transcript = event.results[event.results.length - 1][0].transcript;
                console.log('🗣️ Speech detected:', transcript);
                handleSpeech(transcript);
            };

            recognition.onerror = function(event) {
                console.log('❌ Recognition error:', event.error);
                if (event.error === 'not-allowed') {
                    addLog('Microphone access denied', 'system');
                }
            };

            recognition.onend = function() {
                console.log('⏹️ Recognition ended');
                if (!isPaused && recognition) {
                    recognition.start();
                }
            };

            recognition.start();
        }

            setInterval(() => {
                const elapsed = Math.floor((Date.now() - sessionStartTime) / 1000);
                const hours = Math.floor(elapsed / 3600).toString().padStart(2, '0');
                const minutes = Math.floor((elapsed % 3600) / 60).toString().padStart(2, '0');
                const seconds = (elapsed % 60).toString().padStart(2, '0');
                document.getElementById('session-timer').textContent = `${hours}:${minutes}:${seconds}`;
            }, 1000);

            // Test keyword detection
            const testText = "how does hexproof work";
            const result = analyzeQuestion(testText);
            console.log('Test result for "' + testText + '":', result);

            // Save session data on unload
            window.addEventListener('beforeunload', () => {
                window.sessionData.endTime = new Date().toISOString();
                localStorage.setItem('veritas_session', JSON.stringify(window.sessionData));
            });
        });

        console.log('✅ Script loaded successfully');
    </script>
