    ],
    'trample': [
        { pattern: /all (the )?damage (goes?|gets?) through|doesn'?t need (to|a) block/i,
          correction: 'Trample still requires assigning lethal damage to each blocker first — only the excess goes to the player.' },
        { pattern: /ignores? blockers?/i,
          correction: 'Trample doesn\'t ignore blockers — it assigns lethal damage to them first, then the rest tramples over.' },
    ],
    'indestructible': [
        { pattern: /can'?t be (removed|killed|exiled|destroyed by anything|touched)/i,
          correction: 'Indestructible stops destroy effects and lethal damage, but exile, -X/-X to 0 toughness, and sacrifice all still work.' },
        { pattern: /nothing can (kill|destroy|remove|stop) it/i,
          correction: 'Indestructible doesn\'t make it unkillable — exile it, reduce its toughness to 0, or make someone sacrifice it.' },
    ],
    'first strike': [
        { pattern: /deals? damage twice|attacks? twice|hits? twice/i,
          correction: 'First strike deals damage once, in the first combat step. Double strike deals damage twice. These are different abilities.' },
    ],
    'deathtouch': [
        { pattern: /kills? (the )?player|any damage (to|kills?) (the )?player/i,
          correction: 'Deathtouch only applies to creatures — any amount of damage from a deathtouch creature destroys other creatures. Players take normal damage.' },
        { pattern: /one damage kills (anything|everything)/i,
          correction: 'Deathtouch makes any damage lethal to creatures only. Indestructible creatures survive deathtouch damage.' },
    ],
    'lifelink': [
        { pattern: /triggers? (separately|twice|again|multiple)/i,
          correction: 'Multiple instances of lifelink don\'t stack — you still only gain life once per damage event.' },
        { pattern: /gain life (before|after) damage/i,
          correction: 'Lifelink causes life gain simultaneously with damage, not before or after.' },
    ],
    'flying': [
        { pattern: /nothing|nobody|no creature can block/i,
          correction: 'Flying creatures can be blocked by other creatures with flying OR reach.' },
    ],
    'protection': [
        { pattern: /stops? everything|can'?t be (affected|hit) by anything/i,
          correction: 'Protection is DEBT: prevents Damage, Enchanting, Blocking, and Targeting from the specified quality. Non-targeting effects and sacrifice still work.' },
    ],
    'double strike': [
        { pattern: /same as first strike|like first strike but/i,
          correction: 'Double strike deals damage in BOTH combat steps — the first strike step AND the regular damage step. First strike only deals in the first step.' },
    ],
    'ward': [
        { pattern: /same as hexproof|like hexproof/i,
          correction: 'Ward doesn\'t stop targeting — it counters the spell or ability unless the opponent pays the ward cost. Hexproof prevents targeting entirely.' },
    ],
    'shroud': [
        { pattern: /same as hexproof|like hexproof|you can (still|also) target/i,
          correction: 'Shroud stops ALL targeting — including your own spells. Unlike hexproof, you cannot target your own shroud creatures either.' },
    ],
};

function checkClaimAgainstKeyword(text, keyword) {
    const patterns = KNOWN_WRONG_CLAIMS[keyword];
    if (!patterns) return null;
    for (const entry of patterns) {
        if (entry.pattern.test(text)) {
            return entry.correction;
        }
    }
    return null; // claim seems fine
}

// ── CARD CLAIM PIPELINE ──────────────────────────────────────────────
// When a player says something about a specific card, fetch it from
// Scryfall and reason about whether their claim is correct.

async function handleCardClaim(cardName, originalText) {
    // Show checking state
    playInterruptChime();
    wakeFlash();
    document.getElementById('bubble-badge').innerHTML = '<div class="dispute-badge" style="background:rgba(0,167,181,0.08);border-color:rgba(0,167,181,0.3);color:rgba(0,167,181,0.8);">⟳ Checking…</div>';
    document.getElementById('bubble-level').innerHTML = '';
    document.getElementById('bubble-verdict').innerHTML = `<span style="color:rgba(255,255,255,0.35);">Looking up <em>${cardName}</em>…</span>`;
    document.getElementById('bubble-analogy').innerHTML = '';
    document.getElementById('bubble-action').innerHTML = '';
    document.getElementById('ruling-details-inner').innerHTML = '';
    document.getElementById('ruling-overlay').classList.add('show');

    let card = null;
    try {
        // Try fuzzy match first, fall back to full-text search
        let res = await fetch(`https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(cardName)}`);
        if (!res.ok) {
            res = await fetch(`https://api.scryfall.com/cards/search?q=${encodeURIComponent(cardName)}&limit=1`);
            if (res.ok) {
                const data = await res.json();
                if (data.data && data.data.length > 0) card = data.data[0];
            }
        } else {
            card = await res.json();
        }
    } catch(e) {}

    if (!card) {
        document.getElementById('bubble-badge').innerHTML = '';
        document.getElementById('bubble-verdict').innerHTML = `Couldn't find <em>${cardName}</em> — check the spelling.`;
        return;
    }

    const oracleText = card.oracle_text || card.card_faces?.map(f => f.oracle_text).join(' // ') || '';
    const typeLine = card.type_line || '';
    const cardImg = card.image_uris?.normal || card.card_faces?.[0]?.image_uris?.normal || '';
    const manaCost = card.mana_cost || card.card_faces?.[0]?.mana_cost || '';

    // Reason about the claim using our built-in keyword knowledge
    // Check if any keywords mentioned in the claim are about this card's actual abilities
    const claimKws = extractKeywords(originalText);
    const cardKws = extractKeywords(oracleText + ' ' + typeLine);

    // Check each keyword the player claimed against known wrong patterns
    let correction = null;
    let verdict = 'question'; // default: treat as informational
    for (const kw of claimKws) {
        const wrong = checkClaimAgainstKeyword(originalText, kw);
        if (wrong) {
            correction = wrong;
            verdict = 'wrong';
            break;
        }
    }

    // Check if player claimed the card has an ability it doesn't actually have
    const claimedAbility = claimKws.find(kw => !cardKws.includes(kw));
    if (claimedAbility && claimKws.length > 0) {
        // Player said the card has e.g. hexproof but oracle text doesn't mention it
        const hasAbilityInText = oracleText.toLowerCase().includes(claimedAbility.toLowerCase());
        if (!hasAbilityInText && verdict === 'question') {
            correction = `${card.name} doesn't have ${claimedAbility} — check the oracle text below.`;
            verdict = 'wrong';
        }
    }

    // Render the result
    let badgeHtml = '';
    if (verdict === 'wrong') {
        badgeHtml = '<div class="dispute-badge">⚑ Incorrect — Ruling Below</div>';
        disputeCount++;
        const dcEl = document.getElementById('dispute-counter');
        if (dcEl) { dcEl.textContent = `${disputeCount} Dispute${disputeCount !== 1 ? 's' : ''}`; dcEl.classList.add('active'); }
        sessionDisputeLog.push({ topic: card.name, trigger: originalText.slice(0, 120), timestamp: new Date().toISOString() });
    } else {
        badgeHtml = '<div class="dispute-badge" style="background:rgba(0,167,181,0.08);border-color:rgba(0,167,181,0.3);color:rgba(0,167,181,0.8);">📋 Card Ruling</div>';
    }

    const spokenText = correction || `Here is ${card.name}. ${oracleText.slice(0, 120)}`;
    document.getElementById('bubble-badge').innerHTML = badgeHtml;
    document.getElementById('bubble-verdict').innerHTML = correction
        ? `<strong>${card.name}:</strong> ${correction}`
        : `<strong>${card.name}</strong> — here's the oracle text.`;

    document.getElementById('ruling-details-inner').innerHTML = `
        <div style="display:grid;grid-template-columns:${cardImg ? '160px 1fr' : '1fr'};gap:18px;align-items:start;">
            ${cardImg ? `<div style="background:rgba(0,0,0,0.4);border-radius:10px;padding:10px;text-align:center;">
                <img src="${cardImg}" alt="${card.name}" style="max-width:100%;border-radius:6px;box-shadow:0 6px 20px rgba(0,0,0,0.6);">
            </div>` : ''}
            <div>
                <div style="font-size:16px;font-weight:700;color:var(--accent);margin-bottom:3px;">${card.name}</div>
                <div style="font-size:11px;color:#555;font-style:italic;margin-bottom:12px;">${typeLine}${manaCost ? ' · ' + manaCost : ''}</div>
                <div style="background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.05);padding:11px 13px;border-radius:8px;font-size:13px;color:#99a;line-height:1.65;white-space:pre-wrap;margin-bottom:12px;">${oracleText}</div>
                ${correction ? `<div style="background:rgba(255,107,107,0.06);border:1px solid rgba(255,107,107,0.2);border-radius:8px;padding:11px 13px;font-size:13px;color:rgba(220,180,180,0.8);line-height:1.65;">
                    <div style="font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,107,107,0.6);margin-bottom:6px;">Correction</div>
                    ${correction}
                </div>` : ''}
            </div>
        </div>`;

    speak(spokenText);
    rulingHistory.unshift({ html: '', analysis: { type: 'card', name: card.name }, label: card.name, time: Date.now() });
    if (rulingHistory.length > 5) rulingHistory.pop();
    renderHistoryPanel();
    rulingCooldown = true;
    clearTimeout(rulingCooldownTimer);
    rulingCooldownTimer = setTimeout(() => { rulingCooldown = false; }, 4000);
}

// ── MAIN REASONING FUNCTION ──────────────────────────────────────────
// Called by handleFinal for every utterance.
// Returns what Veritas should do, or null if it should stay silent.

function reason(text) {
    const intent = classifyIntent(text);
    const keywords = extractKeywords(text);
    const concepts = keywords.length === 0 ? extractConcepts(text) : [];
    const allKws = keywords.length > 0 ? keywords : concepts;
    const cardName = extractPossibleCardName(text);
    const ctx = detectContext(text.toLowerCase());

    // ── DISPUTE ──────────────────────────────────────────────────────
    if (intent === 'dispute') {
        // If current sentence has keywords, answer immediately
        if (allKws.length > 0) {
            return { action: 'dispute', keywords: allKws, context: ctx };
        }
        // If a card name was mentioned, pull the card
        if (cardName) {
            return { action: 'card', cardName, originalText: text };
        }
        // No keyword or card — look at the immediately prior utterance
        const priorKws = getPriorKeywords();
        if (priorKws.length > 0) {
            return { action: 'dispute', keywords: priorKws, context: ctx };
        }
        // Truly unknown dispute — ask
        return { action: 'ask' };
    }

    // ── CLAIM ────────────────────────────────────────────────────────
    if (intent === 'claim') {
        // Card-specific claim: "Snapcaster lets me cast for free"
        if (cardName && allKws.length > 0) {
            return { action: 'card', cardName, originalText: text };
        }
        if (cardName) {
            return { action: 'card', cardName, originalText: text };
        }
        // Keyword claim — check if it sounds wrong
        if (allKws.length > 0) {
            const kw = allKws[0];
            const correction = checkClaimAgainstKeyword(text, kw);
            if (correction) {
                return { action: 'correct', keywords: allKws, correction, context: ctx };
            }
            // Claim sounds correct — stay silent, just buffer
        }
        return null;
    }

    // ── QUESTION ─────────────────────────────────────────────────────
    if (intent === 'question') {
        if (allKws.length > 0) {
            return { action: 'question', keywords: allKws, context: ctx };
        }
        if (cardName) {
            return { action: 'card', cardName, originalText: text };
        }
        // Pronoun question ("does it work?") — check prior utterance
        if (isPronounReference(text)) {
            const priorKws = getPriorKeywords();
            if (priorKws.length > 0) {
                return { action: 'question', keywords: priorKws, context: ctx };
            }
        }
        return null; // can't answer without knowing what they're asking about
    }

    // ── CHATTER ──────────────────────────────────────────────────────
    return null;
}

function getPriorKeywords() {
    if (transcriptWindow.length < 2) return [];
    const prior = transcriptWindow[transcriptWindow.length - 2];
    if (!prior) return [];
    const kws = extractKeywords(prior.text);
    return kws.length > 0 ? kws : extractConcepts(prior.text);
}

// ── ACT ON REASONING RESULT ──────────────────────────────────────────
function actOnReason(result, originalText) {
    if (!result) return;

    if (result.action === 'card') {
        if (rulingCooldown) return;
        handleCardClaim(result.cardName, result.originalText || originalText);
        return;
    }

    if (result.action === 'ask') {
        if (rulingCooldown) return;
        rulingCooldown = true;
        clearTimeout(rulingCooldownTimer);
        rulingCooldownTimer = setTimeout(() => { rulingCooldown = false; }, 3000);
        playInterruptChime();
        wakeFlash();
        disputeCount++;
        const dcEl = document.getElementById('dispute-counter');
        if (dcEl) { dcEl.textContent = `${disputeCount} Dispute${disputeCount !== 1 ? 's' : ''}`; dcEl.classList.add('active'); }
        document.getElementById('bubble-badge').innerHTML = '<div class="dispute-badge">⚑ Dispute Detected</div>';
        document.getElementById('bubble-level').innerHTML = '';
        document.getElementById('bubble-verdict').innerHTML = "Got it — what&#39;s the rule being disputed? Name the keyword or card.";
        document.getElementById('bubble-analogy').innerHTML = '';
        document.getElementById('bubble-action').innerHTML = '';
        document.getElementById('ruling-details-inner').innerHTML = `<div class="detail-prose" style="color:rgba(255,255,255,0.3);padding:20px 0;">Listening for the rule…</div>`;
        document.getElementById('ruling-overlay').classList.add('show');
        speak('What is the rule being disputed?');
        sessionDisputeLog.push({ topic: 'unknown', trigger: originalText.slice(0, 120), timestamp: new Date().toISOString() });
        enterClarificationMode();
        return;
    }

    // Build topic from keywords
    const kws = result.keywords || [];
    let topic = null;
    if (kws.length >= 2) {
        const interaction = getKnownInteraction(kws[0], kws[1]);
        topic = interaction || { type: 'multi_keyword', keywords: kws };
    } else if (kws.length === 1) {
        topic = { type: 'keyword', keyword: kws[0], context: result.context || null };
    }
    if (!topic) return;

    if (result.action === 'dispute') {
        if (rulingCooldown) return;
        rulingCooldown = true;
        clearTimeout(rulingCooldownTimer);
        rulingCooldownTimer = setTimeout(() => { rulingCooldown = false; }, 3000);
        playInterruptChime();
        wakeFlash();
        disputeCount++;
        const dcEl = document.getElementById('dispute-counter');
        if (dcEl) { dcEl.textContent = `${disputeCount} Dispute${disputeCount !== 1 ? 's' : ''}`; dcEl.classList.add('active'); }
        sessionDisputeLog.push({ topic: kws[0], trigger: originalText.slice(0, 120), timestamp: new Date().toISOString() });
        const html = renderRuling(topic);
        if (html) { showRuling(html, topic, { isDispute: true }); speak(buildSpokenText(topic)); }
    }

    else if (result.action === 'correct') {
        if (rulingCooldown) return;
        triggerDirectRuling(topic, originalText, true, result.correction);
    }

    else if (result.action === 'question') {
        if (rulingCooldown) return;
        triggerDirectRuling(topic, originalText, false, null);
    }
}


// ─────────────────────────────────────────────────────────────────────
// INTERIM HANDLER — instant hard-trigger disputes only
// Fires mid-sentence on the most unambiguous contradiction phrases.
// The full reason() engine runs on the completed sentence in handleFinal.
// ─────────────────────────────────────────────────────────────────────
function handleInterim(text) {
    if (isPaused || contradictionFired || isSpeaking || rulingCooldown) return;
    const hardTriggers = [
        /\bno it (doesn'?t|can'?t|won'?t|isn'?t)\b/i,
        /\bthat'?s? (wrong|not right|incorrect)\b/i,
        /\byou'?re? wrong\b/i,
        /\bask veritas\b/i,
        /\bveritas\b/i,
        /\bcheck the ruling\b/i,
        /\bread the card\b/i,
    ];
    if (!hardTriggers.some(p => p.test(text))) return;
    contradictionFired = true;
    clearTimeout(contradictionResetTimer);
    contradictionResetTimer = setTimeout(() => { contradictionFired = false; }, 2500);
    // Run reasoning on partial text — best effort
    const result = reason(text);
    if (result) {
        actOnReason(result, text);
    } else {
        // Fire the dispute UI immediately, clarify after
        playInterruptChime();
        wakeFlash();
        document.getElementById('bubble-badge').innerHTML = '<div class="dispute-badge">⚑ Dispute Detected</div>';
        document.getElementById('bubble-level').innerHTML = '';
        document.getElementById('bubble-verdict').innerHTML = '<span style="color:rgba(255,255,255,0.3);">One moment…</span>';
        document.getElementById('bubble-analogy').innerHTML = '';
        document.getElementById('bubble-action').innerHTML = '';
        document.getElementById('ruling-details-inner').innerHTML = '';
        document.getElementById('ruling-overlay').classList.add('show');
    }
}

// ─────────────────────────────────────────────────────────────────────
// FINAL HANDLER — full reasoning on every completed utterance
// ─────────────────────────────────────────────────────────────────────
function handleFinal(text) {
    if (isPaused || isSpeaking) return;

    bufferAdd(text);
    transcriptAdd(text);

    // ── 0. Clarification mode — bypass all filters, treat as direct answer ──
    if (waitingForClarification) {
        exitClarificationMode();
        rulingCooldown = false;
        clearTimeout(rulingCooldownTimer);
        const result = reason(text);
        if (result && result.action !== 'ask') {
            actOnReason(result, text);
        } else {
            // Try keyword resolvers as last resort
            const topic = resolveContradictionTopic(text) || resolveQuestion(text);
            if (topic) {
                const html = renderRuling(topic);
                if (html) { showRuling(html, topic, { isDispute: true }); speak(buildSpokenText(topic)); }
            } else {
                // Still nothing — try Scryfall on the raw text
                const possibleCard = extractPossibleCardName(text);
                if (possibleCard) handleCardClaim(possibleCard, text);
            }
        }
        return;
    }

    // ── 1. Interim already fired — complete sentence may resolve the topic ──
    if (contradictionFired) {
        clearTimeout(contradictionResetTimer);
        contradictionFired = false;
        // If the overlay is already showing "one moment", resolve it now
        const overlay = document.getElementById('ruling-overlay');
        if (overlay.classList.contains('show')) {
            const result = reason(text);
            if (result && result.action !== 'ask') {
                rulingCooldown = false; // allow the resolution to fire
                actOnReason(result, text);
            }
        }
        return;
    }

    // ── 2. Run the full reasoning engine ──
    const result = reason(text);
    actOnReason(result, text);
}

// ─────────────────────────────────────────────────────────────────────
// RESOLVE QUESTION — turn a sentence into an analysis object
// ─────────────────────────────────────────────────────────────────────
function resolveQuestion(text) {
    const lower = text.toLowerCase();
    const ctx = detectContext(lower);

    // 1. Direct keyword match in this sentence
    const foundKws = Object.keys(window.KEYWORDS)
        .filter(k => matchKw(k, lower))
        .sort((a, b) => b.length - a.length);

    if (foundKws.length >= 2) {
        const interaction = getKnownInteraction(foundKws[0], foundKws[1]);
        if (interaction) return interaction;
        return { type: 'multi_keyword', keywords: foundKws };
    }
    if (foundKws.length === 1) {
        return { type: 'keyword', keyword: foundKws[0], context: ctx };
    }

    // 2. No exact keyword — infer from concepts in the sentence
    // e.g. "can you target it" → hexproof/shroud/ward/protection
    const inferred = inferKeywordsFromConcepts(lower);
    if (inferred.length >= 2) {
        const interaction = getKnownInteraction(inferred[0], inferred[1]);
        if (interaction) return interaction;
        return { type: 'multi_keyword', keywords: inferred };
    }
    if (inferred.length === 1) {
        return { type: 'keyword', keyword: inferred[0], context: ctx };
    }

    return null;
}

// ─────────────────────────────────────────────────────────────────────
// DETECT INCORRECT CLAIM
// Basic heuristic: does the sentence say something that contradicts
// the most common mistake for that keyword?
// ─────────────────────────────────────────────────────────────────────
function detectIncorrectClaim(text, kw, d) {
    const lower = text.toLowerCase();

    // Specific known-wrong claim patterns per keyword
    const wrongClaims = {
        'trample': [
            /all (the )?damage goes? (through|to (the )?player)/i,   // wrong: must still assign lethal
            /trample (means?|lets?) (all|every)/i,
        ],
        'hexproof': [
            /hexproof (means?|makes?) (it )?untargetable/i,          // partly wrong — own spells still work
            /nobody can target/i,                                      // wrong — YOU can still target
        ],
        'indestructible': [
            /can'?t be (removed|killed|exiled|destroyed by anything)/i, // wrong — exile still works
            /nothing can (kill|destroy|remove) it/i,
        ],
        'first strike': [
            /deals? damage twice/i,                                    // wrong — that's double strike
            /attacks? twice/i,
        ],
        'deathtouch': [
            /kills? (the )?player/i,                                   // wrong — only creatures
            /any damage (to|kills?) (the )?player/i,
        ],
        'lifelink': [
            /triggers? (separately|twice|again)/i,                    // wrong — multiple instances don't stack
        ],
        'flying': [
            /nothing can block (it|flying)/i,                          // wrong — reach blocks flying
        ],
    };

    const patterns = wrongClaims[kw];
    if (!patterns) return false;
    return patterns.some(p => p.test(lower));
}

// ─────────────────────────────────────────────────────────────────────
// TRIGGER DIRECT RULING — non-dispute answer
// Softer than a contradiction ruling — no chime, no flash, just answers
// ─────────────────────────────────────────────────────────────────────
function triggerDirectRuling(topic, originalText, isCorrection, correctionNote) {
    if (rulingCooldown) return;
    rulingCooldown = true;
    clearTimeout(rulingCooldownTimer);
    rulingCooldownTimer = setTimeout(() => { rulingCooldown = false; }, 2500);

    if (isCorrection) {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sine'; osc.frequency.value = 660;
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.18, audioCtx.currentTime + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.22);
            osc.start(); osc.stop(audioCtx.currentTime + 0.22);
        } catch(e) {}
    }

    if (!topic) {
        document.getElementById('bubble-badge').innerHTML = '';
        document.getElementById('bubble-level').innerHTML = '';
        document.getElementById('bubble-verdict').innerHTML = "I heard you — could you name the specific keyword or card you're asking about?";
        document.getElementById('bubble-analogy').innerHTML = '';
        document.getElementById('bubble-action').innerHTML = '';
        document.getElementById('ruling-details-inner').innerHTML = `<div class="detail-prose" style="color:rgba(255,255,255,0.25);">
            Say a keyword name like "trample", "hexproof", or "deathtouch" and Veritas will pull the ruling.
        </div>`;
        document.getElementById('ruling-overlay').scrollTop = 0;
        document.getElementById('ruling-overlay').classList.add('show');
        speak("Could you name the specific keyword or card?");
        return;
    }

    const html = renderRuling(topic);
    if (html) {
        showRuling(html, topic, { isDispute: false, isCorrection });
        // If Claude provided a specific correction note, inject it into the bubble
        if (correctionNote && isCorrection) {
            const verdictEl = document.getElementById('bubble-verdict');
            if (verdictEl) {
                verdictEl.innerHTML += `<div style="margin-top:10px;padding:8px 12px;background:rgba(255,230,109,0.07);border:1px solid rgba(255,230,109,0.2);border-radius:8px;font-size:13px;color:rgba(255,230,109,0.75);">
                    ⚠ ${correctionNote}
                </div>`;
            }
        }
        const spoken = buildSpokenText(topic);
        if (spoken) speak(isCorrection && correctionNote ? correctionNote + '. ' + spoken : spoken);
    }
}

// ═══════════════════════════════════════════════════════════════════════
// SPEECH RECOGNITION
// ═══════════════════════════════════════════════════════════════════════
function setupSpeechRecognition() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
        addLog('Speech recognition not supported — use Chrome or Edge.', 'system');
        setOrbState('dead');
        return;
    }

    recognition = new SR();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = 'en-US';
    recognition.maxAlternatives = 1;

    recognition.onstart = () => { setOrbState('listening'); };

    recognition.onresult = (e) => {
        if (isPaused || !e.results || e.results.length === 0) return;
        const result = e.results[e.results.length - 1];
        if (!result || !result[0]) return;
        const transcript = result[0].transcript;
        if (!transcript?.trim()) return;
        if (result.isFinal) handleFinal(transcript.trim());
        else handleInterim(transcript.trim());
    };

    recognition.onerror = (e) => {
        if (e.error === 'no-speech' || e.error === 'aborted') return;
        if (e.error === 'not-allowed') { setOrbState('dead'); showMicDenied(); return; }
        addLog('Mic error: ' + e.error, 'system');
    };

    recognition.onend = () => {
        if (isPaused) { setOrbState('paused'); return; }
        setOrbState('reconnecting');
        setTimeout(() => {
            if (!isPaused) {
                try { recognition.start(); } catch(e) {}
            }
        }, 120);
    };

    try { recognition.start(); }
    catch(e) { setTimeout(() => { try { recognition.start(); } catch(e2) {} }, 350); }
}

function startListening() {
    if (!recognition) { setupSpeechRecognition(); return; }
    if (isPaused) return;
    try { recognition.start(); } catch(e) {}
    setOrbState('listening');
}

// ═══════════════════════════════════════════════════════════════════════
// SPEECH SYNTHESIS
// ═══════════════════════════════════════════════════════════════════════
function speak(text) {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const clean = text
        .replace(/<[^>]+>/g, '')
        .replace(/\{[^}]+\}/g, '')
        .replace(/&amp;/g, 'and')
        .replace(/▶/g, '')
        .replace(/\s+/g, ' ')
        .trim();
    if (!clean) return;
    const utt = new SpeechSynthesisUtterance(clean);
    utt.rate = 0.95;
    isSpeaking = true;
    utt.onend = () => { setTimeout(() => { isSpeaking = false; }, 600); };
    window.speechSynthesis.speak(utt);
}

    if (lbl) lbl.textContent = labels[state] || state;
}

// ═══════════════════════════════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════════════════════════════
function togglePause() {
    isPaused = !isPaused;
    if (isPaused) {
        if (recognition) { try { recognition.abort(); } catch(e) {} }
        setOrbState('paused');
    } else {
        startListening();
        setOrbState('listening');
    }
}

function repeatLastRuling() {
    if (lastRuling) {
        showRuling(lastRuling.html, lastRuling.analysis);
        const spoken = buildSpokenText(lastRuling.analysis);
        if (spoken) speak(spoken);
    } else {
        speak('No previous ruling to repeat.');
    }
}

function showManualSearch() {
    const name = prompt('Enter card name:');
    if (name?.trim()) showCardRuling(name.trim());
}

function showRuleReference() {
    const categories = {};
    for (const [kw, d] of Object.entries(window.KEYWORDS)) {
        const cat = d.category || 'Other';
        if (!categories[cat]) categories[cat] = [];
        categories[cat].push(kw);
    }
    let inner = '<div style="margin-bottom:20px;font-size:20px;font-weight:700;color:#dde;">Keyword Reference</div>';
    for (const [cat, kws] of Object.entries(categories)) {
        inner += `<div style="margin-bottom:18px;">
            <div style="font-size:9px;text-transform:uppercase;letter-spacing:2px;color:#333;margin-bottom:8px;">${cat}</div>
            <div class="chip-row">
                ${kws.map(k=>`<span class="kw-chip" onclick="quickLookup('${k}');event.stopPropagation();">${k}</span>`).join('')}
            </div>
        </div>`;
    }
    // Set the overlay directly without analysis
    document.getElementById('bubble-badge').innerHTML = '';
    document.getElementById('bubble-level').innerHTML = '';
    document.getElementById('bubble-verdict').innerHTML = 'All 60+ keywords — tap any to view the ruling.';
    document.getElementById('bubble-analogy').innerHTML = '';
    document.getElementById('bubble-action').innerHTML = '';
    document.getElementById('ruling-details-inner').innerHTML = inner;
    document.getElementById('ruling-overlay').scrollTop = 0;
    document.getElementById('ruling-overlay').classList.add('show');
}

function testManually() {
    const pool = [
        { type: 'semantic', data: getKnownInteraction('trample','deathtouch')?.data },
        { type: 'keyword', keyword: 'hexproof', context: null },
        { type: 'keyword', keyword: 'indestructible', context: null },
        { type: 'keyword', keyword: 'first strike', context: null },
        { type: 'keyword', keyword: 'commander damage', context: null },
        { type: 'keyword', keyword: 'trample', context: 'attacking' },
        { type: 'keyword', keyword: 'deathtouch', context: 'blocking' },
        { type: 'keyword', keyword: 'lifelink', context: null },
        { type: 'keyword', keyword: 'annihilator', context: null },
        { type: 'keyword', keyword: 'infect', context: null },
    ];
    const pick = pool[Math.floor(Math.random() * pool.length)];
    if (pick.type === 'semantic' && !pick.data) {
        const kw = ['trample','deathtouch','hexproof','indestructible'][Math.floor(Math.random()*4)];
        triggerContradictionRuling({ type: 'keyword', keyword: kw, context: null }, 'test trigger');
    } else {
        triggerContradictionRuling(pick, 'test trigger');
    }
}

// ═══════════════════════════════════════════════════════════════════════
// SESSION MANAGEMENT
// ═══════════════════════════════════════════════════════════════════════
function endSession() {
    isPaused = true;
    if (recognition) { try { recognition.stop(); } catch(e) {} }

    const elapsed = Math.floor((Date.now() - sessionStartTime) / 1000);
    const h = Math.floor(elapsed / 3600).toString().padStart(2,'0');
    const m = Math.floor((elapsed % 3600) / 60).toString().padStart(2,'0');
    const s = (elapsed % 60).toString().padStart(2,'0');
    const topKws = getTopKeywordsFromBuffer();

    document.getElementById('summary-stats').innerHTML = `
        <div class="summary-stat">
            <div class="summary-val">${h}:${m}:${s}</div>
            <div class="summary-key">Duration</div>
        </div>
        <div class="summary-stat">
            <div class="summary-val">${disputeCount}</div>
            <div class="summary-key">Disputes Resolved</div>
        </div>`;

    const chips = topKws.length > 0
        ? topKws.map(k => `<span class="summary-chip">${k}</span>`).join('')
        : '<span style="color:rgba(255,255,255,0.12);font-size:11px;">No keywords detected</span>';
    document.getElementById('summary-keywords').innerHTML = `
        <div class="summary-kws-label">Top Keywords This Session</div>
        <div class="summary-chips">${chips}</div>`;

    document.getElementById('session-summary').classList.add('show');
}

function dismissSummary() {
    document.getElementById('session-summary').classList.remove('show');
    isPaused = false;
    try { recognition.start(); } catch(e) {}
    setOrbState('listening');
}

async function confirmEndSession() {
    const payload = {
        duration_seconds: Math.floor((Date.now() - sessionStartTime) / 1000),
        dispute_count: disputeCount,
        top_keywords: getTopKeywordsFromBuffer(),
        disputes: sessionDisputeLog,
        ended_at: new Date().toISOString()
    };
    try {
        await fetch(BACKEND_URL + '/api/sessions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
    } catch(e) { console.warn('[Veritas] Session save failed:', e); }
    window.location.href = 'index.html';
}

function getTopKeywordsFromBuffer() {
    const counts = {};
    for (const u of conversationBuffer) {
        for (const kw of u.keywords) counts[kw] = (counts[kw] || 0) + 1;
    }
    return Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([k])=>k);
}

function addLog(msg, type) { console.debug('[Veritas]', type, msg); }
function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

// ═══════════════════════════════════════════════════════════════════════
// AMBIENT CANVAS
// ═══════════════════════════════════════════════════════════════════════
function initAmbientCanvas() {
    const canvas = document.getElementById('ambient-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let W, H, particles;

    function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    particles = Array.from({ length: 55 }, () => ({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        r: Math.random() * 1.4 + 0.25,
        vx: (Math.random() - 0.5) * 0.13,
        vy: (Math.random() - 0.5) * 0.13,
        opacity: Math.random() * 0.1 + 0.02,
        phase: Math.random() * Math.PI * 2,
        speed: Math.random() * 0.007 + 0.003
    }));

    function draw() {
        ctx.clearRect(0, 0, W, H);
        const t = Date.now() / 1000;
        particles.forEach(p => {
            p.x += p.vx; p.y += p.vy;
            if (p.x < -5) p.x = W + 5;
            if (p.x > W+5) p.x = -5;
            if (p.y < -5) p.y = H + 5;
            if (p.y > H+5) p.y = -5;
            const alpha = p.opacity * (0.55 + 0.45 * Math.sin(t * p.speed * 60 + p.phase));
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(0,167,181,${alpha})`;
            ctx.fill();
        });
        requestAnimationFrame(draw);
    }
    draw();
}

// ═══════════════════════════════════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
    if (e.key === 'Escape')                   closeRuling();
    if (e.key === ' ' && e.ctrlKey)           { e.preventDefault(); togglePause(); }
    if ((e.key === 'r' || e.key === 'R') && e.ctrlKey) { e.preventDefault(); repeatLastRuling(); }
});

// ═══════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════
window.addEventListener('load', () => {
    initAmbientCanvas();
    setupSpeechRecognition();

    // Session timer
    setInterval(() => {
        const s = Math.floor((Date.now() - sessionStartTime) / 1000);
        const el = document.getElementById('session-timer');
        if (el) {
            const h = Math.floor(s/3600).toString().padStart(2,'0');
            const m = Math.floor((s%3600)/60).toString().padStart(2,'0');
            const sec = (s%60).toString().padStart(2,'0');
            el.textContent = `${h}:${m}:${sec}`;
        }
    }, 1000);

    // Refresh history panel times every minute
    setInterval(renderHistoryPanel, 60000);

    window.addEventListener('beforeunload', () => {
        if (recognition) { try { recognition.stop(); } catch(e) {} }
    });
});
</script>
